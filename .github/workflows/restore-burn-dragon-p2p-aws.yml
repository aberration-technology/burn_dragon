name: restore burn_dragon_p2p aws

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment suffix. Example: `production` for the `burn-dragon-p2p-production` GitHub Environment."
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      terraform_workspace:
        description: "Terraform workspace name to restore. Example: `mainnet` for the live stack or `dr-drill` for a restore drill workspace."
        required: true
        default: mainnet
        type: string
      aws_region:
        description: "Target AWS region for the restored control plane. Example: `us-west-2` for warm-DR failover. Leave empty to use the GitHub Environment region, then fall back to `us-east-2`."
        required: false
        default: ""
        type: string
      source_snapshot_region:
        description: "Region to search for restore snapshots. Example: `us-west-2` when using cross-region copied snapshots there. Leave empty to search the target `aws_region`."
        required: false
        default: ""
        type: string
      edge_domain_name:
        description: "Public HTTPS hostname for the restored bootstrap API/auth edge. Example: `edge.dragon.aberration.technology`. Leave empty to use the GitHub Environment value or the built-in default."
        required: false
        default: edge.dragon.aberration.technology
        type: string
      route53_zone_name:
        description: "Public Route53 hosted zone containing the edge record. Example: `aberration.technology`. Leave empty to use the GitHub Environment value or the built-in default."
        required: false
        default: aberration.technology
        type: string
      bootstrap_install_source:
        description: "How to install `burn_p2p_bootstrap` on the restored hosts. Use `git` for the live browser/auth deployment path so the restored bootstrap stays pinned to the reviewed burn_p2p revision."
        required: true
        default: git
        type: choice
        options:
          - crate
          - git
      bootstrap_version:
        description: "Published `burn_p2p_bootstrap` crate version used when `bootstrap_install_source=crate`. Example: `0.21.0-pre.15`."
        required: false
        default: 0.21.0-pre.15
        type: string
      bootstrap_git_ref:
        description: "Pinned burn_p2p git ref used when `bootstrap_install_source=git`. Example: `main` or a full commit SHA. Leave empty on the normal crate path."
        required: false
        default: ""
        type: string
      restore_from_latest_snapshots:
        description: "Automatically resolve the latest tagged bootstrap data snapshot in `source_snapshot_region` when an explicit snapshot id is not supplied. This is only relevant when retained bootstrap storage is enabled."
        required: true
        default: true
        type: boolean
      bootstrap_primary_restore_snapshot_id:
        description: "Optional explicit EBS snapshot id for the bootstrap data volume. Example: `snap-0123456789abcdef0`. Leave empty to auto-resolve when `restore_from_latest_snapshots=true`. Ignored when retained bootstrap storage is disabled."
        required: false
        default: ""
        type: string
      plan_only:
        description: "Run a disaster-recovery drill without applying. Keep `true` for validation drills; set `false` only when you intend to execute the restore/failover."
        required: true
        default: true
        type: boolean
      force_replace_bootstrap:
        description: "Force bootstrap instance replacement during the restore plan/apply. Usually keep `false`; use `true` only when you intentionally want a fresh host replacement in an existing workspace."
        required: true
        default: false
        type: boolean
      next_disaster_recovery_region:
        description: "Optional follow-on warm-DR region for the restored stack. Example: after restoring into `us-west-2`, set `us-east-1` here if you want the restored stack to keep cross-region replication enabled. Leave empty to disable additional warm-DR replication on the restored stack."
        required: false
        default: ""
        type: string
      create_artifact_bucket:
        description: "Whether Terraform should create/manage the restored stack's primary artifact bucket in the target region. Keep `true` for the normal path; set `false` only when reusing an existing bucket."
        required: true
        default: true
        type: boolean
      artifact_bucket_name:
        description: "Optional S3 bucket name for directly published checkpoints and metrics in the target region. Leave empty to auto-derive a stable unique bucket name. Required when `create_artifact_bucket=false`."
        required: false
        default: ""
        type: string
      artifact_bucket_path_prefix:
        description: "Optional key prefix inside the primary artifact bucket. Leave empty to auto-derive `artifacts/<stack>/<workspace>`."
        required: false
        default: ""
        type: string
      create_artifact_replica_bucket:
        description: "Whether Terraform should create/manage the restored stack's warm-DR replica bucket in `next_disaster_recovery_region`."
        required: true
        default: true
        type: boolean
      artifact_replica_bucket_name:
        description: "Optional S3 bucket name for the restored stack's warm-DR replica bucket. Leave empty to auto-derive a stable replica bucket name. Required when `next_disaster_recovery_region` is set and `create_artifact_replica_bucket=false`."
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: restore-burn-dragon-p2p-${{ github.event.inputs.environment }}-${{ github.event.inputs.terraform_workspace }}
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    environment: burn-dragon-p2p-${{ github.event.inputs.environment }}
    env:
      TF_ROOT: crates/burn_dragon_p2p/deploy/terraform/aws
      DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}
      TF_WORKSPACE_NAME: ${{ github.event.inputs.terraform_workspace }}
      AUTH_CLIENT_ID: ${{ secrets.BURN_DRAGON_P2P_AUTH_CLIENT_ID }}
      AUTH_CLIENT_SECRET: ${{ secrets.BURN_DRAGON_P2P_AUTH_CLIENT_SECRET }}
      GITHUB_CLIENT_ID: ${{ secrets.BURN_DRAGON_P2P_GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.BURN_DRAGON_P2P_GITHUB_CLIENT_SECRET }}
      BROWSER_CANARY_CALLBACK_TOKEN: ${{ secrets.BURN_DRAGON_P2P_BROWSER_CANARY_CALLBACK_TOKEN }}
      TRAINER_AUTH_BUNDLE_JSON: ${{ secrets.BURN_DRAGON_P2P_TRAINER_AUTH_BUNDLE_JSON }}
      VALIDATOR_AUTH_BUNDLE_JSON: ${{ secrets.BURN_DRAGON_P2P_VALIDATOR_AUTH_BUNDLE_JSON }}

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: resolve restore settings
        shell: bash
        env:
          VAR_STACK_NAME: ${{ vars.BURN_DRAGON_P2P_STACK_NAME }}
          INPUT_AWS_REGION: ${{ github.event.inputs.aws_region }}
          VAR_AWS_REGION: ${{ vars.BURN_DRAGON_P2P_AWS_REGION }}
          VAR_AWS_ROLE_ARN: ${{ vars.BURN_DRAGON_P2P_AWS_ROLE_ARN }}
          INPUT_EDGE_DOMAIN_NAME: ${{ github.event.inputs.edge_domain_name }}
          VAR_EDGE_DOMAIN_NAME: ${{ vars.BURN_DRAGON_P2P_EDGE_DOMAIN_NAME }}
          INPUT_ROUTE53_ZONE_NAME: ${{ github.event.inputs.route53_zone_name }}
          VAR_ROUTE53_ZONE_NAME: ${{ vars.BURN_DRAGON_P2P_ROUTE53_ZONE_NAME }}
          VAR_BROWSER_APP_BASE_URL: ${{ vars.BURN_DRAGON_P2P_BROWSER_APP_BASE_URL }}
          VAR_AUTH_REDIRECT_BASE_URL: ${{ vars.BURN_DRAGON_P2P_AUTH_REDIRECT_BASE_URL }}
          VAR_ACME_CONTACT_EMAIL: ${{ vars.BURN_DRAGON_P2P_ACME_CONTACT_EMAIL }}
          VAR_BROWSER_APP_PAGES_DOMAIN_TARGET: ${{ vars.BURN_DRAGON_P2P_BROWSER_APP_PAGES_DOMAIN_TARGET }}
          VAR_NETWORK_ID: ${{ vars.BURN_DRAGON_P2P_NETWORK_ID }}
          VAR_PROJECT_FAMILY_ID: ${{ vars.BURN_DRAGON_P2P_PROJECT_FAMILY_ID }}
          VAR_STUDY_ID: ${{ vars.BURN_DRAGON_P2P_STUDY_ID }}
          VAR_RELEASE_TRAIN_HASH: ${{ vars.BURN_DRAGON_P2P_RELEASE_TRAIN_HASH }}
          VAR_NATIVE_TARGET_ARTIFACT_HASH: ${{ vars.BURN_DRAGON_P2P_NATIVE_TARGET_ARTIFACT_HASH }}
          VAR_AUTH_CONNECTOR_KIND: ${{ vars.BURN_DRAGON_P2P_AUTH_CONNECTOR_KIND }}
          VAR_AUTH_AUTHORITY_NAME: ${{ vars.BURN_DRAGON_P2P_AUTH_AUTHORITY_NAME }}
          VAR_AUTH_PRINCIPALS_JSON: ${{ vars.BURN_DRAGON_P2P_AUTH_PRINCIPALS_JSON }}
          VAR_AUTH_AUTHORIZE_BASE_URL: ${{ vars.BURN_DRAGON_P2P_AUTH_AUTHORIZE_BASE_URL }}
          VAR_AUTH_EXCHANGE_URL: ${{ vars.BURN_DRAGON_P2P_AUTH_EXCHANGE_URL }}
          VAR_AUTH_TOKEN_URL: ${{ vars.BURN_DRAGON_P2P_AUTH_TOKEN_URL }}
          VAR_AUTH_API_BASE_URL: ${{ vars.BURN_DRAGON_P2P_AUTH_API_BASE_URL }}
          VAR_AUTH_USERINFO_URL: ${{ vars.BURN_DRAGON_P2P_AUTH_USERINFO_URL }}
          VAR_AUTH_REFRESH_URL: ${{ vars.BURN_DRAGON_P2P_AUTH_REFRESH_URL }}
          VAR_AUTH_REVOKE_URL: ${{ vars.BURN_DRAGON_P2P_AUTH_REVOKE_URL }}
          VAR_AUTH_JWKS_URL: ${{ vars.BURN_DRAGON_P2P_AUTH_JWKS_URL }}
          VAR_AUTH_OIDC_ISSUER: ${{ vars.BURN_DRAGON_P2P_AUTH_OIDC_ISSUER }}
          VAR_AUTH_OAUTH_PROVIDER: ${{ vars.BURN_DRAGON_P2P_AUTH_OAUTH_PROVIDER }}
          VAR_AUTH_EXTERNAL_AUTHORITY: ${{ vars.BURN_DRAGON_P2P_AUTH_EXTERNAL_AUTHORITY }}
          VAR_AUTH_EXTERNAL_TRUSTED_PRINCIPAL_HEADER: ${{ vars.BURN_DRAGON_P2P_AUTH_EXTERNAL_TRUSTED_PRINCIPAL_HEADER }}
          VAR_AUTH_EXTERNAL_TRUSTED_INTERNAL_ONLY: ${{ vars.BURN_DRAGON_P2P_AUTH_EXTERNAL_TRUSTED_INTERNAL_ONLY }}
          VAR_GITHUB_REQUIRED_ORG: ${{ vars.BURN_DRAGON_P2P_GITHUB_REQUIRED_ORG }}
          VAR_GITHUB_REQUIRED_TEAM: ${{ vars.BURN_DRAGON_P2P_GITHUB_REQUIRED_TEAM }}
          VAR_GITHUB_REQUIRED_REPO: ${{ vars.BURN_DRAGON_P2P_GITHUB_REQUIRED_REPO }}
          VAR_GITHUB_ADMIN_REQUIRED_REPO_PERMISSION: ${{ vars.BURN_DRAGON_P2P_GITHUB_ADMIN_REQUIRED_REPO_PERMISSION }}
          VAR_GITHUB_ADMIN_LOGINS: ${{ vars.BURN_DRAGON_P2P_GITHUB_ADMIN_LOGINS }}
          VAR_CLIMBMIX_BROWSER_DATASET_BASE_URL: ${{ vars.BURN_DRAGON_P2P_CLIMBMIX_BROWSER_DATASET_BASE_URL }}
          VAR_DATASET_DOMAIN_NAME: ${{ vars.BURN_DRAGON_P2P_DATASET_DOMAIN_NAME }}
          VAR_DATASET_BUCKET_NAME: ${{ vars.BURN_DRAGON_P2P_DATASET_BUCKET_NAME }}
          VAR_DATASET_BUCKET_PATH_PREFIX: ${{ vars.BURN_DRAGON_P2P_DATASET_BUCKET_PATH_PREFIX }}
          INPUT_BOOTSTRAP_INSTALL_SOURCE: ${{ github.event.inputs.bootstrap_install_source }}
          VAR_BOOTSTRAP_INSTALL_SOURCE: ${{ vars.BURN_DRAGON_P2P_BOOTSTRAP_INSTALL_SOURCE }}
          INPUT_BOOTSTRAP_VERSION: ${{ github.event.inputs.bootstrap_version }}
          VAR_BOOTSTRAP_VERSION: ${{ vars.BURN_DRAGON_P2P_BOOTSTRAP_VERSION }}
          INPUT_BOOTSTRAP_GIT_REF: ${{ github.event.inputs.bootstrap_git_ref }}
          VAR_BOOTSTRAP_GIT_REF: ${{ vars.BURN_DRAGON_P2P_BOOTSTRAP_GIT_REF }}
          VAR_INSTANCE_TYPE: ${{ vars.BURN_DRAGON_P2P_INSTANCE_TYPE }}
          VAR_ROOT_VOLUME_SIZE_GIB: ${{ vars.BURN_DRAGON_P2P_ROOT_VOLUME_SIZE_GIB }}
          VAR_DATA_VOLUME_SIZE_GIB: ${{ vars.BURN_DRAGON_P2P_DATA_VOLUME_SIZE_GIB }}
          VAR_USE_RETAINED_BOOTSTRAP_DATA_VOLUME: ${{ vars.BURN_DRAGON_P2P_USE_RETAINED_BOOTSTRAP_DATA_VOLUME }}
          VAR_MANAGED_TRAINER_DESIRED_CAPACITY: ${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_DESIRED_CAPACITY }}
          VAR_MANAGED_TRAINER_BACKEND: ${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_BACKEND }}
          VAR_MANAGED_TRAINER_EXPERIMENT_KIND: ${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_EXPERIMENT_KIND }}
          VAR_MANAGED_TRAINER_INSTANCE_TYPE: ${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_INSTANCE_TYPE }}
          VAR_MANAGED_TRAINER_MIN_SIZE: ${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_MIN_SIZE }}
          VAR_MANAGED_TRAINER_MAX_SIZE: ${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_MAX_SIZE }}
          VAR_MANAGED_TRAINER_TARGET: ${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_TARGET }}
          VAR_MANAGED_TRAINER_CRATE_VERSION: ${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_CRATE_VERSION }}
          VAR_MANAGED_TRAINER_AUTH_BUNDLE_PARAMETER_NAME: ${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_AUTH_BUNDLE_PARAMETER_NAME }}
          VAR_ENABLE_DATA_VOLUME_SNAPSHOTS: ${{ vars.BURN_DRAGON_P2P_ENABLE_DATA_VOLUME_SNAPSHOTS }}
          VAR_DATA_VOLUME_SNAPSHOT_RETENTION_DAYS: ${{ vars.BURN_DRAGON_P2P_DATA_VOLUME_SNAPSHOT_RETENTION_DAYS }}
          VAR_ENABLE_BOOTSTRAP_STATUS_ALARMS: ${{ vars.BURN_DRAGON_P2P_ENABLE_BOOTSTRAP_STATUS_ALARMS }}
          VAR_ALARM_SNS_TOPIC_ARN: ${{ vars.BURN_DRAGON_P2P_ALARM_SNS_TOPIC_ARN }}
          VAR_ENABLE_CONTROL_PLANE_OPERATIONAL_ALARMS: ${{ vars.BURN_DRAGON_P2P_ENABLE_CONTROL_PLANE_OPERATIONAL_ALARMS }}
          VAR_ENABLE_CONTROL_PLANE_DASHBOARD: ${{ vars.BURN_DRAGON_P2P_ENABLE_CONTROL_PLANE_DASHBOARD }}
          VAR_ENABLE_MANAGED_CONTROL_PLANE_REDIS: ${{ vars.BURN_DRAGON_P2P_ENABLE_MANAGED_CONTROL_PLANE_REDIS }}
          VAR_CREATE_ARTIFACT_BUCKET: ${{ vars.BURN_DRAGON_P2P_CREATE_ARTIFACT_BUCKET }}
          VAR_ARTIFACT_BUCKET_NAME: ${{ vars.BURN_DRAGON_P2P_ARTIFACT_BUCKET_NAME }}
          VAR_ARTIFACT_BUCKET_PATH_PREFIX: ${{ vars.BURN_DRAGON_P2P_ARTIFACT_BUCKET_PATH_PREFIX }}
          VAR_CREATE_ARTIFACT_REPLICA_BUCKET: ${{ vars.BURN_DRAGON_P2P_CREATE_ARTIFACT_REPLICA_BUCKET }}
          VAR_ARTIFACT_REPLICA_BUCKET_NAME: ${{ vars.BURN_DRAGON_P2P_ARTIFACT_REPLICA_BUCKET_NAME }}
          VAR_ARTIFACT_REPLICA_BUCKET_FORCE_DESTROY: ${{ vars.BURN_DRAGON_P2P_ARTIFACT_REPLICA_BUCKET_FORCE_DESTROY }}
          VAR_ENABLE_DISASTER_RECOVERY_SNAPSHOT_COPIES: ${{ vars.BURN_DRAGON_P2P_ENABLE_DISASTER_RECOVERY_SNAPSHOT_COPIES }}
          VAR_DISASTER_RECOVERY_SNAPSHOT_RETENTION_DAYS: ${{ vars.BURN_DRAGON_P2P_DISASTER_RECOVERY_SNAPSHOT_RETENTION_DAYS }}
          VAR_ARTIFACT_BUCKET_FORCE_DESTROY: ${{ vars.BURN_DRAGON_P2P_ARTIFACT_BUCKET_FORCE_DESTROY }}
          VAR_ARTIFACT_BUCKET_SERVER_SIDE_ENCRYPTION: ${{ vars.BURN_DRAGON_P2P_ARTIFACT_BUCKET_SERVER_SIDE_ENCRYPTION }}
          INPUT_CREATE_ARTIFACT_BUCKET: ${{ github.event.inputs.create_artifact_bucket }}
          INPUT_ARTIFACT_BUCKET_NAME: ${{ github.event.inputs.artifact_bucket_name }}
          INPUT_ARTIFACT_BUCKET_PATH_PREFIX: ${{ github.event.inputs.artifact_bucket_path_prefix }}
          INPUT_CREATE_ARTIFACT_REPLICA_BUCKET: ${{ github.event.inputs.create_artifact_replica_bucket }}
          INPUT_ARTIFACT_REPLICA_BUCKET_NAME: ${{ github.event.inputs.artifact_replica_bucket_name }}
          INPUT_SOURCE_SNAPSHOT_REGION: ${{ github.event.inputs.source_snapshot_region }}
          INPUT_RESTORE_FROM_LATEST_SNAPSHOTS: ${{ github.event.inputs.restore_from_latest_snapshots }}
          INPUT_BOOTSTRAP_PRIMARY_RESTORE_SNAPSHOT_ID: ${{ github.event.inputs.bootstrap_primary_restore_snapshot_id }}
          INPUT_NEXT_DISASTER_RECOVERY_REGION: ${{ github.event.inputs.next_disaster_recovery_region }}
          INPUT_PLAN_ONLY: ${{ github.event.inputs.plan_only }}
          GITHUB_ACTOR_CONTEXT: ${{ github.actor }}
          GITHUB_REPOSITORY_OWNER_CONTEXT: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          canonical_stack_name="burn-dragon-p2p-${DEPLOY_ENVIRONMENT}"
          if [ -n "$VAR_STACK_NAME" ] && [ "$VAR_STACK_NAME" != "$canonical_stack_name" ]; then
            echo "BURN_DRAGON_P2P_STACK_NAME is set to '$VAR_STACK_NAME', but managed ${DEPLOY_ENVIRONMENT} restores require '$canonical_stack_name'." >&2
            echo "Update or remove the environment override before rerunning this workflow to avoid duplicate stacks." >&2
            exit 1
          fi
          stack_name="$canonical_stack_name"

          aws_region_input="$INPUT_AWS_REGION"
          aws_region_var="$VAR_AWS_REGION"
          aws_role_arn="$VAR_AWS_ROLE_ARN"
          edge_domain_name_input="$INPUT_EDGE_DOMAIN_NAME"
          edge_domain_name_var="$VAR_EDGE_DOMAIN_NAME"
          route53_zone_name_input="$INPUT_ROUTE53_ZONE_NAME"
          route53_zone_name_var="$VAR_ROUTE53_ZONE_NAME"
          browser_app_base_url_var="$VAR_BROWSER_APP_BASE_URL"
          auth_redirect_base_url_var="$VAR_AUTH_REDIRECT_BASE_URL"
          acme_contact_email_var="$VAR_ACME_CONTACT_EMAIL"
          browser_app_pages_domain_target_var="$VAR_BROWSER_APP_PAGES_DOMAIN_TARGET"
          network_id="$VAR_NETWORK_ID"
          project_family_id="$VAR_PROJECT_FAMILY_ID"
          study_id="$VAR_STUDY_ID"
          release_train_hash="$VAR_RELEASE_TRAIN_HASH"
          native_target_artifact_hash_var="$VAR_NATIVE_TARGET_ARTIFACT_HASH"
          auth_connector_kind="$VAR_AUTH_CONNECTOR_KIND"
          auth_authority_name="$VAR_AUTH_AUTHORITY_NAME"
          auth_principals_json="$VAR_AUTH_PRINCIPALS_JSON"
          auth_authorize_base_url="$VAR_AUTH_AUTHORIZE_BASE_URL"
          auth_exchange_url="$VAR_AUTH_EXCHANGE_URL"
          auth_token_url="$VAR_AUTH_TOKEN_URL"
          auth_api_base_url="$VAR_AUTH_API_BASE_URL"
          auth_userinfo_url="$VAR_AUTH_USERINFO_URL"
          auth_refresh_url="$VAR_AUTH_REFRESH_URL"
          auth_revoke_url="$VAR_AUTH_REVOKE_URL"
          auth_jwks_url="$VAR_AUTH_JWKS_URL"
          auth_oidc_issuer="$VAR_AUTH_OIDC_ISSUER"
          auth_oauth_provider="$VAR_AUTH_OAUTH_PROVIDER"
          auth_external_authority="$VAR_AUTH_EXTERNAL_AUTHORITY"
          auth_external_trusted_principal_header="$VAR_AUTH_EXTERNAL_TRUSTED_PRINCIPAL_HEADER"
          auth_external_trusted_internal_only="$VAR_AUTH_EXTERNAL_TRUSTED_INTERNAL_ONLY"
          github_required_org="$VAR_GITHUB_REQUIRED_ORG"
          github_required_team="$VAR_GITHUB_REQUIRED_TEAM"
          github_required_repo="$VAR_GITHUB_REQUIRED_REPO"
          github_admin_required_repo_permission="$VAR_GITHUB_ADMIN_REQUIRED_REPO_PERMISSION"
          github_admin_logins="$VAR_GITHUB_ADMIN_LOGINS"
          climbmix_dataset_base_url="$VAR_CLIMBMIX_BROWSER_DATASET_BASE_URL"
          dataset_domain_name_var="$VAR_DATASET_DOMAIN_NAME"
          dataset_bucket_name_var="$VAR_DATASET_BUCKET_NAME"
          dataset_bucket_path_prefix_var="$VAR_DATASET_BUCKET_PATH_PREFIX"
          bootstrap_install_source_input="$INPUT_BOOTSTRAP_INSTALL_SOURCE"
          bootstrap_install_source_var="$VAR_BOOTSTRAP_INSTALL_SOURCE"
          bootstrap_version_input="$INPUT_BOOTSTRAP_VERSION"
          bootstrap_version_var="$VAR_BOOTSTRAP_VERSION"
          bootstrap_git_ref_input="$INPUT_BOOTSTRAP_GIT_REF"
          bootstrap_git_ref_var="$VAR_BOOTSTRAP_GIT_REF"
          instance_type="$VAR_INSTANCE_TYPE"
          root_volume_size_gib="$VAR_ROOT_VOLUME_SIZE_GIB"
          data_volume_size_gib="$VAR_DATA_VOLUME_SIZE_GIB"
          use_retained_bootstrap_data_volume="$VAR_USE_RETAINED_BOOTSTRAP_DATA_VOLUME"
          managed_trainer_desired_capacity="$VAR_MANAGED_TRAINER_DESIRED_CAPACITY"
          managed_trainer_backend="$VAR_MANAGED_TRAINER_BACKEND"
          managed_trainer_experiment_kind="$VAR_MANAGED_TRAINER_EXPERIMENT_KIND"
          managed_trainer_instance_type="$VAR_MANAGED_TRAINER_INSTANCE_TYPE"
          managed_trainer_min_size="$VAR_MANAGED_TRAINER_MIN_SIZE"
          managed_trainer_max_size="$VAR_MANAGED_TRAINER_MAX_SIZE"
          managed_trainer_target="$VAR_MANAGED_TRAINER_TARGET"
          managed_trainer_crate_version="$VAR_MANAGED_TRAINER_CRATE_VERSION"
          managed_trainer_auth_bundle_parameter_name="$VAR_MANAGED_TRAINER_AUTH_BUNDLE_PARAMETER_NAME"
          enable_data_volume_snapshots="$VAR_ENABLE_DATA_VOLUME_SNAPSHOTS"
          data_volume_snapshot_retention_days="$VAR_DATA_VOLUME_SNAPSHOT_RETENTION_DAYS"
          enable_disaster_recovery_snapshot_copies="$VAR_ENABLE_DISASTER_RECOVERY_SNAPSHOT_COPIES"
          disaster_recovery_snapshot_retention_days="$VAR_DISASTER_RECOVERY_SNAPSHOT_RETENTION_DAYS"
          enable_bootstrap_status_alarms="$VAR_ENABLE_BOOTSTRAP_STATUS_ALARMS"
          alarm_sns_topic_arn="$VAR_ALARM_SNS_TOPIC_ARN"
          enable_control_plane_operational_alarms="$VAR_ENABLE_CONTROL_PLANE_OPERATIONAL_ALARMS"
          enable_control_plane_dashboard="$VAR_ENABLE_CONTROL_PLANE_DASHBOARD"
          enable_managed_control_plane_redis="$VAR_ENABLE_MANAGED_CONTROL_PLANE_REDIS"
          create_artifact_bucket="$INPUT_CREATE_ARTIFACT_BUCKET"
          artifact_bucket_name="$INPUT_ARTIFACT_BUCKET_NAME"
          artifact_bucket_name_var="$VAR_ARTIFACT_BUCKET_NAME"
          artifact_bucket_path_prefix="$INPUT_ARTIFACT_BUCKET_PATH_PREFIX"
          artifact_bucket_path_prefix_var="$VAR_ARTIFACT_BUCKET_PATH_PREFIX"
          create_artifact_replica_bucket="$INPUT_CREATE_ARTIFACT_REPLICA_BUCKET"
          artifact_replica_bucket_name="$INPUT_ARTIFACT_REPLICA_BUCKET_NAME"
          artifact_replica_bucket_name_var="$VAR_ARTIFACT_REPLICA_BUCKET_NAME"
          artifact_bucket_force_destroy="$VAR_ARTIFACT_BUCKET_FORCE_DESTROY"
          artifact_replica_bucket_force_destroy="$VAR_ARTIFACT_REPLICA_BUCKET_FORCE_DESTROY"
          artifact_bucket_server_side_encryption="$VAR_ARTIFACT_BUCKET_SERVER_SIDE_ENCRYPTION"
          restore_from_latest_snapshots="$INPUT_RESTORE_FROM_LATEST_SNAPSHOTS"
          source_snapshot_region_input="$INPUT_SOURCE_SNAPSHOT_REGION"
          primary_restore_snapshot_id="$INPUT_BOOTSTRAP_PRIMARY_RESTORE_SNAPSHOT_ID"
          next_disaster_recovery_region="$INPUT_NEXT_DISASTER_RECOVERY_REGION"

          aws_region="$aws_region_input"
          if [ -z "$aws_region" ]; then
            aws_region="$aws_region_var"
          fi

          if [ -z "$aws_region" ]; then
            aws_region="us-east-2"
          fi
          : "${aws_role_arn:?missing BURN_DRAGON_P2P_AWS_ROLE_ARN}"
          if [ -z "$network_id" ]; then
            network_id="burn-dragon-mainnet"
          fi
          if [ -z "$project_family_id" ]; then
            project_family_id="burn-dragon-language"
          fi
          if [ -z "$study_id" ]; then
            study_id="burn-dragon-mainnet"
          fi
          if [ -z "$release_train_hash" ]; then
            release_train_hash="burn-dragon-mainnet-train"
          fi

          native_target_artifact_hash="$native_target_artifact_hash_var"
          if [ -z "$native_target_artifact_hash" ]; then
            native_target_artifact_hash="burn-dragon-native"
          fi

          edge_domain_name="$edge_domain_name_input"
          if [ -z "$edge_domain_name" ]; then
            edge_domain_name="$edge_domain_name_var"
          fi
          if [ -z "$edge_domain_name" ]; then
            edge_domain_name="edge.dragon.aberration.technology"
          fi

          route53_zone_name="$route53_zone_name_input"
          if [ -z "$route53_zone_name" ]; then
            route53_zone_name="$route53_zone_name_var"
          fi
          if [ -z "$route53_zone_name" ]; then
            route53_zone_name="aberration.technology"
          fi

          browser_app_base_url="$browser_app_base_url_var"
          if [ -z "$browser_app_base_url" ]; then
            browser_app_base_url="https://dragon.aberration.technology"
          fi
          browser_app_base_url="${browser_app_base_url%/}"

          auth_redirect_base_url="$auth_redirect_base_url_var"
          if [ -z "$auth_redirect_base_url" ] && [ -n "$browser_app_base_url" ]; then
            auth_redirect_base_url="$browser_app_base_url"
          fi
          auth_redirect_base_url="${auth_redirect_base_url%/}"

          acme_contact_email="$acme_contact_email_var"
          if [ -z "$acme_contact_email" ] && [ -n "$route53_zone_name" ]; then
            acme_contact_email="admin@${route53_zone_name%.}"
          fi

          browser_app_pages_domain_target="$browser_app_pages_domain_target_var"
          if [ -z "$browser_app_pages_domain_target" ] && [ -n "$browser_app_base_url" ]; then
            browser_app_pages_domain_target="${GITHUB_REPOSITORY_OWNER_CONTEXT}.github.io"
          fi

          browser_app_host=""
          if [ -n "$browser_app_base_url" ]; then
            browser_app_host="$(python3 -c 'from urllib.parse import urlparse; import sys; print(urlparse(sys.argv[1]).hostname or "")' "$browser_app_base_url")"
          fi

          if [ -z "$auth_connector_kind" ]; then
            auth_connector_kind="github"
          fi
          auth_connector_kind="$(printf '%s' "$auth_connector_kind" | tr '[:upper:]' '[:lower:]' | xargs)"
          if [ -z "$auth_authority_name" ]; then
            auth_authority_name="burn-dragon-auth"
          fi
          if [ -z "$auth_principals_json" ]; then
            auth_principals_json="[]"
          fi
          if [ -z "$auth_external_trusted_principal_header" ]; then
            auth_external_trusted_principal_header="x-forwarded-user"
          fi
          if [ -z "$auth_external_trusted_internal_only" ]; then
            auth_external_trusted_internal_only="true"
          fi
          if [ -z "$github_admin_logins" ] && [ "$auth_connector_kind" = "github" ]; then
            github_admin_logins="$GITHUB_ACTOR_CONTEXT"
          fi
          dataset_domain_name="$dataset_domain_name_var"
          if [ -z "$dataset_domain_name" ]; then
            if [ -n "$browser_app_host" ]; then
              dataset_domain_name="datasets.${browser_app_host}"
            else
              dataset_domain_name="datasets.${edge_domain_name}"
            fi
          fi
          dataset_bucket_name="$dataset_bucket_name_var"
          dataset_bucket_path_prefix="$dataset_bucket_path_prefix_var"
          if [ -z "$dataset_bucket_path_prefix" ]; then
            dataset_bucket_path_prefix="dragon-datasets"
          fi
          if [ -z "$climbmix_dataset_base_url" ]; then
            climbmix_dataset_base_url="https://${dataset_domain_name}/${dataset_bucket_path_prefix}/climbmix-pretraining/climbmix-r1"
          fi
          bootstrap_install_source="$bootstrap_install_source_input"
          if [ -z "$bootstrap_install_source" ]; then
            bootstrap_install_source="$bootstrap_install_source_var"
          fi
          if [ -z "$bootstrap_install_source" ]; then
            bootstrap_install_source="crate"
          fi
          bootstrap_install_source="$(printf '%s' "$bootstrap_install_source" | tr '[:upper:]' '[:lower:]' | xargs)"
          case "$bootstrap_install_source" in
            crate|git) ;;
            *)
              echo "unsupported bootstrap_install_source: $bootstrap_install_source" >&2
              exit 1
              ;;
          esac

          bootstrap_version="$bootstrap_version_input"
          if [ -z "$bootstrap_version" ]; then
            bootstrap_version="$bootstrap_version_var"
          fi
          if [ -z "$bootstrap_version" ]; then
            bootstrap_version="0.21.0-pre.15"
          fi

          bootstrap_git_ref="$bootstrap_git_ref_input"
          if [ -z "$bootstrap_git_ref" ]; then
            bootstrap_git_ref="$bootstrap_git_ref_var"
          fi
          if [ "$bootstrap_install_source" = "git" ] && [ -z "$bootstrap_git_ref" ]; then
            echo "bootstrap_git_ref is required when bootstrap_install_source=git" >&2
            exit 1
          fi
          if [ "$auth_connector_kind" = "github" ] && [ "$bootstrap_install_source" = "crate" ] && [ "$bootstrap_version" = "0.21.0-pre.15" ]; then
            echo "burn_p2p_bootstrap 0.21.0-pre.15 is not deployable with github auth; use bootstrap_install_source=git with a fixed burn_p2p ref or a newer published crate" >&2
            exit 1
          fi
          if [ -z "$managed_trainer_desired_capacity" ]; then
            managed_trainer_desired_capacity="0"
          fi
          if [ -z "$managed_trainer_backend" ]; then
            managed_trainer_backend="cpu"
          fi
          if [ -z "$managed_trainer_experiment_kind" ]; then
            managed_trainer_experiment_kind="nca"
          fi
          if [ -z "$managed_trainer_target" ]; then
            managed_trainer_target="trainer"
          fi
          if [ -z "$managed_trainer_crate_version" ]; then
            managed_trainer_crate_version="0.21.0-pre.15"
          fi
          if [ -z "$managed_trainer_auth_bundle_parameter_name" ]; then
            managed_trainer_auth_bundle_parameter_name="/${stack_name}/${TF_WORKSPACE_NAME}/bootstrap/trainer_auth_bundle_json"
          fi
          if [ -z "$use_retained_bootstrap_data_volume" ]; then
            use_retained_bootstrap_data_volume="false"
          fi
          if [ -z "$enable_managed_control_plane_redis" ]; then
            enable_managed_control_plane_redis="false"
          fi
          managed_trainer_experiment_id="nca-prepretraining"
          managed_trainer_revision_id="nca-r1"
          if [ "$managed_trainer_experiment_kind" = "climbmix" ]; then
            managed_trainer_experiment_id="climbmix-pretraining"
            managed_trainer_revision_id="climbmix-r1"
          fi
          managed_trainer_auth_mode="disabled"
          managed_trainer_principal_id=""
          if [ "$managed_trainer_desired_capacity" != "0" ]; then
            managed_trainer_principal_suffix="$(printf '%s-%s-%s' "$TF_WORKSPACE_NAME" "$managed_trainer_experiment_kind" "$managed_trainer_backend" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
            managed_trainer_principal_id="managed-trainer-${managed_trainer_principal_suffix%-}"
            if [ -n "$TRAINER_AUTH_BUNDLE_JSON" ]; then
              managed_trainer_auth_mode="provided_bundle"
            else
              managed_trainer_auth_mode="bootstrap_static_principal"
              auth_principals_json="$(python3 -c '''import json, sys; principals = json.loads(sys.argv[1] or "[]"); principal_id = sys.argv[2]; experiment_id = sys.argv[3]; network_id = sys.argv[4]; backend = sys.argv[5]; stack_name = sys.argv[6]; environment = sys.argv[7]; trainer_role = "TrainerCpu" if backend == "cpu" else "TrainerGpu"; principal = {"principal_id": principal_id, "display_name": f"burn_dragon managed {experiment_id} {backend} trainer", "org_memberships": [], "group_memberships": [], "granted_roles": {"roles": [trainer_role, "Archive"]}, "granted_scopes": ["Connect", "Discover", {"Train": {"experiment_id": experiment_id}}, {"Archive": {"experiment_id": experiment_id}}], "allowed_networks": [network_id], "custom_claims": {"deployment_profile": environment, "stack": stack_name, "managed_trainer": "true", "managed_trainer_backend": backend, "managed_trainer_experiment_id": experiment_id}}; principals = [item for item in principals if item.get("principal_id") != principal_id]; principals.append(principal); print(json.dumps(principals))''' "$auth_principals_json" "$managed_trainer_principal_id" "$managed_trainer_experiment_id" "$network_id" "$managed_trainer_backend" "$stack_name" "$DEPLOY_ENVIRONMENT")"
            fi
          fi
          dragon_crate_version="$(python3 - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as handle:
              print(tomllib.load(handle)["workspace"]["package"]["version"])
          PY
          )"
          dragon_git_repository="https://github.com/${GITHUB_REPOSITORY}.git"
          dragon_git_ref="${GITHUB_SHA}"
          bootstrap_head_mirror_experiment_id="nca-prepretraining"
          bootstrap_head_mirror_revision_id="nca-r1"
          bootstrap_head_mirror_principal_id="bootstrap-head-mirror-${TF_WORKSPACE_NAME}-nca"
          bootstrap_head_mirror_auth_bundle_parameter_name="${secret_parameter_prefix}/bootstrap_head_mirror_auth_bundle_json"
          auth_principals_json="$(python3 -c '''import json, sys; principals = json.loads(sys.argv[1] or "[]"); principal_id = sys.argv[2]; experiment_id = sys.argv[3]; network_id = sys.argv[4]; stack_name = sys.argv[5]; environment = sys.argv[6]; principal = {"principal_id": principal_id, "display_name": "burn_dragon bootstrap nca head mirror", "org_memberships": [], "group_memberships": [], "granted_roles": {"roles": ["TrainerCpu", "Archive"]}, "granted_scopes": ["Connect", "Discover", {"Train": {"experiment_id": experiment_id}}, {"Archive": {"experiment_id": experiment_id}}], "allowed_networks": [network_id], "custom_claims": {"deployment_profile": environment, "stack": stack_name, "bootstrap_head_mirror": "true", "bootstrap_head_mirror_experiment_id": experiment_id, "admin_capabilities": "register_live_head,rollout_auth_policy"}}; principals = [item for item in principals if item.get("principal_id") != principal_id]; principals.append(principal); print(json.dumps(principals))''' "$auth_principals_json" "$bootstrap_head_mirror_principal_id" "$bootstrap_head_mirror_experiment_id" "$network_id" "$stack_name" "$DEPLOY_ENVIRONMENT")"
          browser_canary_experiment_id="nca-prepretraining"
          browser_canary_revision_id="nca-r1"
          browser_canary_principal_id="browser-canary-${TF_WORKSPACE_NAME}-nca"
          auth_principals_json="$(python3 -c '''import json, sys; principals = json.loads(sys.argv[1] or "[]"); principal_id = sys.argv[2]; principals = [item for item in principals if item.get("principal_id") != principal_id]; print(json.dumps(principals))''' "$auth_principals_json" "$browser_canary_principal_id")"

          snapshot_search_region="$source_snapshot_region_input"
          if [ -z "$snapshot_search_region" ]; then
            snapshot_search_region="$aws_region"
          fi

          admin_logins_json="$(
            python3 -c 'import json, sys; seen=set(); values=[]; [values.append(login) for token in sys.argv[1].replace("\n", ",").split(",") for login in [token.strip().lower()] if login and login not in seen and not seen.add(login)]; print(json.dumps(values))' "$github_admin_logins"
          )"
          admin_logins_csv="$(
            python3 -c 'import json, sys; print(",".join(json.loads(sys.argv[1])))' "$admin_logins_json"
          )"

          resolved_auth_client_id="$AUTH_CLIENT_ID"
          resolved_auth_client_secret="$AUTH_CLIENT_SECRET"
          if [ "$auth_connector_kind" = "github" ]; then
            if [ -z "$resolved_auth_client_id" ]; then
              resolved_auth_client_id="$GITHUB_CLIENT_ID"
            fi
            if [ -z "$resolved_auth_client_secret" ]; then
              resolved_auth_client_secret="$GITHUB_CLIENT_SECRET"
            fi
          fi

          if [ "$auth_connector_kind" = "github" ]; then
            if [ -z "$github_required_repo" ]; then
              github_required_repo="mosure/burn_dragon"
            fi
            : "${admin_logins_csv:?no admin logins resolved for github deployment}"
            : "${resolved_auth_client_id:?missing BURN_DRAGON_P2P_AUTH_CLIENT_ID or BURN_DRAGON_P2P_GITHUB_CLIENT_ID secret}"
            : "${resolved_auth_client_secret:?missing BURN_DRAGON_P2P_AUTH_CLIENT_SECRET or BURN_DRAGON_P2P_GITHUB_CLIENT_SECRET secret}"
            : "${BROWSER_CANARY_CALLBACK_TOKEN:?missing BURN_DRAGON_P2P_BROWSER_CANARY_CALLBACK_TOKEN secret}"
          elif [ "$auth_connector_kind" = "oidc" ] || [ "$auth_connector_kind" = "oauth" ]; then
            : "${resolved_auth_client_id:?missing BURN_DRAGON_P2P_AUTH_CLIENT_ID secret}"
            : "${resolved_auth_client_secret:?missing BURN_DRAGON_P2P_AUTH_CLIENT_SECRET secret}"
          fi

          if [ -z "$artifact_bucket_name" ]; then
            artifact_bucket_name="$artifact_bucket_name_var"
          fi
          if [ -z "$artifact_bucket_path_prefix" ]; then
            artifact_bucket_path_prefix="$artifact_bucket_path_prefix_var"
          fi
          if [ -z "$artifact_replica_bucket_name" ]; then
            artifact_replica_bucket_name="$artifact_replica_bucket_name_var"
          fi
          if [ "$create_artifact_bucket" != "true" ] && [ -z "$artifact_bucket_name" ]; then
            echo "artifact_bucket_name is required when create_artifact_bucket=false" >&2
            exit 1
          fi
          if [ -n "$next_disaster_recovery_region" ] && [ "$create_artifact_replica_bucket" != "true" ] && [ -z "$artifact_replica_bucket_name" ]; then
            echo "artifact_replica_bucket_name is required when next_disaster_recovery_region is set and create_artifact_replica_bucket=false" >&2
            exit 1
          fi

          if [ "$use_retained_bootstrap_data_volume" = "true" ]; then
            if [ "$restore_from_latest_snapshots" = "true" ]; then
              if [ -z "$primary_restore_snapshot_id" ]; then
                primary_restore_snapshot_id="$(aws ec2 describe-snapshots \
                  --region "$snapshot_search_region" \
                  --owner-ids self \
                  --filters \
                    "Name=tag:Stack,Values=$stack_name" \
                    "Name=tag:TerraformWorkspace,Values=$TF_WORKSPACE_NAME" \
                    "Name=tag:NodeRole,Values=primary" \
                    "Name=status,Values=completed" \
                  --query 'reverse(sort_by(Snapshots,&StartTime))[0].SnapshotId' \
                  --output text)"
              fi
            fi

            if [ -z "$primary_restore_snapshot_id" ] || [ "$primary_restore_snapshot_id" = "None" ]; then
              echo "missing bootstrap restore snapshot id; provide one explicitly or enable restore_from_latest_snapshots with matching tagged snapshots" >&2
              exit 1
            fi
          else
            primary_restore_snapshot_id=""
          fi

          secret_parameter_prefix="/${stack_name}/${TF_WORKSPACE_NAME}/bootstrap"

          {
            echo "AWS_REGION=$aws_region"
            echo "AWS_ROLE_ARN=$aws_role_arn"
            echo "STACK_NAME=$stack_name"
            echo "EDGE_DOMAIN_NAME=$edge_domain_name"
            echo "BROWSER_APP_BASE_URL=$browser_app_base_url"
            echo "AUTH_REDIRECT_BASE_URL=$auth_redirect_base_url"
            echo "ACME_CONTACT_EMAIL=$acme_contact_email"
            echo "BROWSER_APP_PAGES_DOMAIN_TARGET=$browser_app_pages_domain_target"
            echo "ROUTE53_ZONE_NAME=$route53_zone_name"
            echo "SECRET_PARAMETER_PREFIX=$secret_parameter_prefix"
            echo "PRIMARY_RESTORE_SNAPSHOT_ID=$primary_restore_snapshot_id"
            echo "SNAPSHOT_SEARCH_REGION=$snapshot_search_region"
            echo "TF_VAR_aws_region=$aws_region"
            echo "TF_VAR_stack_name=$stack_name"
            echo "TF_VAR_environment_name=${DEPLOY_ENVIRONMENT}"
            echo "TF_VAR_route53_zone_name=$route53_zone_name"
            echo "TF_VAR_edge_domain_name=$edge_domain_name"
            echo "TF_VAR_browser_app_base_url=$browser_app_base_url"
            echo "TF_VAR_auth_redirect_base_url=$auth_redirect_base_url"
            echo "TF_VAR_acme_contact_email=$acme_contact_email"
            echo "TF_VAR_browser_app_pages_domain_target=$browser_app_pages_domain_target"
            echo "TF_VAR_secret_parameter_prefix=$secret_parameter_prefix"
            echo "TF_VAR_network_id=$network_id"
            echo "TF_VAR_project_family_id=$project_family_id"
            echo "TF_VAR_study_id=$study_id"
            echo "TF_VAR_release_train_hash=$release_train_hash"
            echo "TF_VAR_bootstrap_install_source=$bootstrap_install_source"
            echo "TF_VAR_bootstrap_crate_version=$bootstrap_version"
            echo "TF_VAR_bootstrap_git_ref=$bootstrap_git_ref"
            echo "TF_VAR_dragon_crate_version=$dragon_crate_version"
            echo "TF_VAR_dragon_git_repository=$dragon_git_repository"
            echo "TF_VAR_dragon_git_ref=$dragon_git_ref"
            echo "TF_VAR_bootstrap_head_mirror_auth_bundle_parameter_name=$bootstrap_head_mirror_auth_bundle_parameter_name"
            echo "TF_VAR_auth_connector_kind=$auth_connector_kind"
            echo "TF_VAR_managed_trainer_desired_capacity=$managed_trainer_desired_capacity"
            echo "TF_VAR_managed_trainer_backend=$managed_trainer_backend"
            echo "TF_VAR_managed_trainer_experiment_kind=$managed_trainer_experiment_kind"
            echo "TF_VAR_managed_trainer_target=$managed_trainer_target"
            echo "TF_VAR_managed_trainer_crate_version=$managed_trainer_crate_version"
            echo "TF_VAR_managed_trainer_auth_bundle_parameter_name=$managed_trainer_auth_bundle_parameter_name"
            echo "TF_VAR_native_target_artifact_hash=$native_target_artifact_hash"
            echo "TF_VAR_auth_authority_name=$auth_authority_name"
            echo "MANAGED_TRAINER_AUTH_MODE=$managed_trainer_auth_mode"
            echo "MANAGED_TRAINER_PRINCIPAL_ID=$managed_trainer_principal_id"
            echo "MANAGED_TRAINER_EXPERIMENT_ID=$managed_trainer_experiment_id"
            echo "MANAGED_TRAINER_REVISION_ID=$managed_trainer_revision_id"
            echo "BOOTSTRAP_HEAD_MIRROR_PRINCIPAL_ID=$bootstrap_head_mirror_principal_id"
            echo "BOOTSTRAP_HEAD_MIRROR_EXPERIMENT_ID=$bootstrap_head_mirror_experiment_id"
            echo "BOOTSTRAP_HEAD_MIRROR_REVISION_ID=$bootstrap_head_mirror_revision_id"
            echo "BROWSER_CANARY_PRINCIPAL_ID=$browser_canary_principal_id"
            echo "BROWSER_CANARY_EXPERIMENT_ID=$browser_canary_experiment_id"
            echo "BROWSER_CANARY_REVISION_ID=$browser_canary_revision_id"
            echo "TF_VAR_create_artifact_bucket=$create_artifact_bucket"
            echo "DATASET_DOMAIN_NAME=$dataset_domain_name"
            echo "DATASET_BUCKET_PATH_PREFIX=$dataset_bucket_path_prefix"
            echo "TF_VAR_dataset_domain_name=$dataset_domain_name"
            echo "TF_VAR_dataset_bucket_path_prefix=$dataset_bucket_path_prefix"
            echo "TF_VAR_create_artifact_replica_bucket=$create_artifact_replica_bucket"
            echo "AUTH_CONNECTOR_KIND=$auth_connector_kind"
          } >>"$GITHUB_ENV"
          {
            echo "TF_VAR_auth_principals_json<<__AUTH_PRINCIPALS_JSON__"
            printf '%s\n' "$auth_principals_json"
            echo "__AUTH_PRINCIPALS_JSON__"
          } >>"$GITHUB_ENV"

          if [ "$auth_connector_kind" = "github" ]; then
            {
              echo "TF_VAR_github_required_org=$github_required_org"
              echo "TF_VAR_github_required_team=$github_required_team"
              echo "TF_VAR_github_required_repo=$github_required_repo"
              echo "TF_VAR_github_browser_canary_principal_id=$browser_canary_principal_id"
              echo "TF_VAR_github_browser_canary_callback_token=$BROWSER_CANARY_CALLBACK_TOKEN"
              echo "TF_VAR_github_admin_logins=$admin_logins_json"
              echo "ADMIN_LOGINS_CSV=$admin_logins_csv"
            } >>"$GITHUB_ENV"
          fi

          if [ -n "$auth_authorize_base_url" ]; then echo "TF_VAR_auth_authorize_base_url=$auth_authorize_base_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_exchange_url" ]; then echo "TF_VAR_auth_exchange_url=$auth_exchange_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_token_url" ]; then echo "TF_VAR_auth_token_url=$auth_token_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_api_base_url" ]; then echo "TF_VAR_auth_api_base_url=$auth_api_base_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_userinfo_url" ]; then echo "TF_VAR_auth_userinfo_url=$auth_userinfo_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_refresh_url" ]; then echo "TF_VAR_auth_refresh_url=$auth_refresh_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_revoke_url" ]; then echo "TF_VAR_auth_revoke_url=$auth_revoke_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_jwks_url" ]; then echo "TF_VAR_auth_jwks_url=$auth_jwks_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_oidc_issuer" ]; then echo "TF_VAR_auth_oidc_issuer=$auth_oidc_issuer" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_oauth_provider" ]; then echo "TF_VAR_auth_oauth_provider=$auth_oauth_provider" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_external_authority" ]; then echo "TF_VAR_auth_external_authority=$auth_external_authority" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_external_trusted_principal_header" ]; then echo "TF_VAR_auth_external_trusted_principal_header=$auth_external_trusted_principal_header" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_external_trusted_internal_only" ]; then echo "TF_VAR_auth_external_trusted_internal_only=$auth_external_trusted_internal_only" >>"$GITHUB_ENV"; fi
          if [ -n "$github_admin_required_repo_permission" ]; then echo "TF_VAR_github_admin_required_repo_permission=$github_admin_required_repo_permission" >>"$GITHUB_ENV"; fi
          if [ -n "$instance_type" ]; then echo "TF_VAR_instance_type=$instance_type" >>"$GITHUB_ENV"; fi
          if [ -n "$root_volume_size_gib" ]; then echo "TF_VAR_root_volume_size_gib=$root_volume_size_gib" >>"$GITHUB_ENV"; fi
          if [ -n "$data_volume_size_gib" ]; then echo "TF_VAR_data_volume_size_gib=$data_volume_size_gib" >>"$GITHUB_ENV"; fi
          if [ -n "$use_retained_bootstrap_data_volume" ]; then echo "TF_VAR_use_retained_bootstrap_data_volume=$use_retained_bootstrap_data_volume" >>"$GITHUB_ENV"; fi
          if [ -n "$managed_trainer_instance_type" ]; then echo "TF_VAR_managed_trainer_instance_type=$managed_trainer_instance_type" >>"$GITHUB_ENV"; fi
          if [ -n "$managed_trainer_min_size" ]; then echo "TF_VAR_managed_trainer_min_size=$managed_trainer_min_size" >>"$GITHUB_ENV"; fi
          if [ -n "$managed_trainer_max_size" ]; then echo "TF_VAR_managed_trainer_max_size=$managed_trainer_max_size" >>"$GITHUB_ENV"; fi
          if [ -n "$enable_data_volume_snapshots" ]; then echo "TF_VAR_enable_data_volume_snapshots=$enable_data_volume_snapshots" >>"$GITHUB_ENV"; fi
          if [ -n "$data_volume_snapshot_retention_days" ]; then echo "TF_VAR_data_volume_snapshot_retention_days=$data_volume_snapshot_retention_days" >>"$GITHUB_ENV"; fi
          if [ -n "$enable_disaster_recovery_snapshot_copies" ]; then echo "TF_VAR_enable_disaster_recovery_snapshot_copies=$enable_disaster_recovery_snapshot_copies" >>"$GITHUB_ENV"; fi
          if [ -n "$disaster_recovery_snapshot_retention_days" ]; then echo "TF_VAR_disaster_recovery_snapshot_retention_days=$disaster_recovery_snapshot_retention_days" >>"$GITHUB_ENV"; fi
          if [ -n "$enable_bootstrap_status_alarms" ]; then echo "TF_VAR_enable_bootstrap_status_alarms=$enable_bootstrap_status_alarms" >>"$GITHUB_ENV"; fi
          if [ -n "$alarm_sns_topic_arn" ]; then echo "TF_VAR_alarm_sns_topic_arn=$alarm_sns_topic_arn" >>"$GITHUB_ENV"; fi
          if [ -n "$enable_control_plane_operational_alarms" ]; then echo "TF_VAR_enable_control_plane_operational_alarms=$enable_control_plane_operational_alarms" >>"$GITHUB_ENV"; fi
          if [ -n "$enable_control_plane_dashboard" ]; then echo "TF_VAR_enable_control_plane_dashboard=$enable_control_plane_dashboard" >>"$GITHUB_ENV"; fi
          if [ -n "$enable_managed_control_plane_redis" ]; then echo "TF_VAR_enable_managed_control_plane_redis=$enable_managed_control_plane_redis" >>"$GITHUB_ENV"; fi
          if [ -n "$artifact_bucket_name" ]; then echo "TF_VAR_artifact_bucket_name=$artifact_bucket_name" >>"$GITHUB_ENV"; fi
          if [ -n "$dataset_bucket_name" ]; then echo "TF_VAR_dataset_bucket_name=$dataset_bucket_name" >>"$GITHUB_ENV"; fi
          if [ -n "$artifact_bucket_path_prefix" ]; then echo "TF_VAR_artifact_bucket_path_prefix=$artifact_bucket_path_prefix" >>"$GITHUB_ENV"; fi
          if [ -n "$artifact_replica_bucket_name" ]; then echo "TF_VAR_artifact_replica_bucket_name=$artifact_replica_bucket_name" >>"$GITHUB_ENV"; fi
          if [ -n "$artifact_bucket_force_destroy" ]; then echo "TF_VAR_artifact_bucket_force_destroy=$artifact_bucket_force_destroy" >>"$GITHUB_ENV"; fi
          if [ -n "$artifact_replica_bucket_force_destroy" ]; then echo "TF_VAR_artifact_replica_bucket_force_destroy=$artifact_replica_bucket_force_destroy" >>"$GITHUB_ENV"; fi
          if [ -n "$artifact_bucket_server_side_encryption" ]; then echo "TF_VAR_artifact_bucket_server_side_encryption=$artifact_bucket_server_side_encryption" >>"$GITHUB_ENV"; fi
          if [ -n "$primary_restore_snapshot_id" ]; then echo "TF_VAR_bootstrap_primary_restore_snapshot_id=$primary_restore_snapshot_id" >>"$GITHUB_ENV"; fi
          if [ -n "$climbmix_dataset_base_url" ]; then echo "TF_VAR_climbmix_browser_dataset_base_url=$climbmix_dataset_base_url" >>"$GITHUB_ENV"; fi
          if [ -n "$next_disaster_recovery_region" ]; then echo "TF_VAR_disaster_recovery_region=$next_disaster_recovery_region" >>"$GITHUB_ENV"; fi

          if [ "$auth_connector_kind" = "github" ] || [ "$auth_connector_kind" = "oidc" ] || [ "$auth_connector_kind" = "oauth" ]; then
            {
              echo "AUTH_CLIENT_ID_RESOLVED=$resolved_auth_client_id"
              echo "AUTH_CLIENT_SECRET_RESOLVED=$resolved_auth_client_secret"
            } >>"$GITHUB_ENV"
          fi

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: guard canonical bootstrap naming
        shell: bash
        run: |
          set -euo pipefail

          canonical_bootstrap_name="${STACK_NAME}-bootstrap"
          bootstrap_rows="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Application,Values=burn-dragon-p2p" \
              "Name=tag:Environment,Values=${DEPLOY_ENVIRONMENT}" \
              "Name=tag:Name,Values=*bootstrap*" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --output json | jq -r '
              [
                .Reservations[].Instances[]
                | {
                    name: ([.Tags[]? | select(.Key == "Name") | .Value][0] // ""),
                    id: .InstanceId,
                    state: .State.Name
                  }
                | select(.name != "")
                | [.name, .id, .state]
                | @tsv
              ] | .[]
            ')"

          if [ -z "$bootstrap_rows" ]; then
            exit 0
          fi

          bootstrap_count="$(printf '%s\n' "$bootstrap_rows" | sed '/^$/d' | wc -l | tr -d ' ')"
          unexpected_rows="$(printf '%s\n' "$bootstrap_rows" | awk -F '\t' -v expected="$canonical_bootstrap_name" '$1 != expected')"

          if [ "$bootstrap_count" -gt 1 ] || [ -n "$unexpected_rows" ]; then
            echo "detected conflicting bootstrap instances for Application=burn-dragon-p2p Environment=${DEPLOY_ENVIRONMENT}" >&2
            printf '%s\n' "$bootstrap_rows" | awk -F '\t' '{printf "  - name=%s id=%s state=%s\n", $1, $2, $3}' >&2
            echo "Expected exactly one bootstrap instance named ${canonical_bootstrap_name}." >&2
            echo "Terminate or migrate the legacy instance(s) before running restore again." >&2
            exit 1
          fi

      - name: seed bootstrap auth secrets in ssm parameter store
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUTH_CLIENT_ID_RESOLVED:-}" ] || [ -z "${AUTH_CLIENT_SECRET_RESOLVED:-}" ]; then
            echo "auth connector does not require client credentials; skipping SSM auth secret sync"
            exit 0
          fi

          aws ssm put-parameter \
            --region "$AWS_REGION" \
            --type SecureString \
            --overwrite \
            --name "${SECRET_PARAMETER_PREFIX}/auth_client_id" \
            --value "$AUTH_CLIENT_ID_RESOLVED"

          aws ssm put-parameter \
            --region "$AWS_REGION" \
            --type SecureString \
            --overwrite \
            --name "${SECRET_PARAMETER_PREFIX}/auth_client_secret" \
            --value "$AUTH_CLIENT_SECRET_RESOLVED"

      - name: setup rust toolchain
        if: ${{ github.event.inputs.plan_only != 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: restore edge build cache
        if: ${{ github.event.inputs.plan_only != 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ runner.temp }}/target-edge-binaries
          key: burn-dragon-edge-binaries-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.github/workflows/deploy-burn-dragon-p2p-aws.yml', '.github/workflows/restore-burn-dragon-p2p-aws.yml') }}
          restore-keys: |
            burn-dragon-edge-binaries-${{ runner.os }}-

      - name: build edge binaries on runner
        if: ${{ github.event.inputs.plan_only != 'true' }}
        id: edge_binaries
        shell: bash
        run: |
          set -euo pipefail

          edge_target_dir="${RUNNER_TEMP}/target-edge-binaries"
          bootstrap_binary_path=""
          bootstrap_binary_sha256=""
          if [ "${TF_VAR_bootstrap_install_source}" = "git" ]; then
            bootstrap_auth_feature="auth-static"
            case "${AUTH_CONNECTOR_KIND}" in
              github) bootstrap_auth_feature="auth-github" ;;
              oidc) bootstrap_auth_feature="auth-oidc" ;;
              oauth) bootstrap_auth_feature="auth-oauth" ;;
              external) bootstrap_auth_feature="auth-external" ;;
            esac

            bootstrap_root="${RUNNER_TEMP}/bootstrap-install"
            rm -rf "$bootstrap_root"
            CARGO_NET_GIT_FETCH_WITH_CLI=true CARGO_TARGET_DIR="$edge_target_dir" cargo install \
              --force \
              --locked \
              --root "$bootstrap_root" \
              --git "https://github.com/aberration-technology/burn_p2p.git" \
              --rev "${TF_VAR_bootstrap_git_ref}" \
              burn_p2p_bootstrap \
              --bin burn-p2p-bootstrap \
              --no-default-features \
              --features "admin-http,metrics,metrics-indexer,artifact-publish,artifact-download,artifact-fs,artifact-s3,browser-edge,browser-join,${bootstrap_auth_feature},rbac,social"
            bootstrap_binary_path="${bootstrap_root}/bin/burn-p2p-bootstrap"
            bootstrap_binary_sha256="$(sha256sum "$bootstrap_binary_path" | awk '{print $1}')"
          fi

          CARGO_TARGET_DIR="$edge_target_dir" cargo build \
            --manifest-path "${GITHUB_WORKSPACE}/Cargo.toml" \
            --locked \
            -p burn_dragon_p2p \
            --bin burn_dragon_p2p_native \
            --no-default-features \
            --features native \
            --release

          head_mirror_binary_path="${edge_target_dir}/release/burn_dragon_p2p_native"
          head_mirror_binary_sha256="$(sha256sum "$head_mirror_binary_path" | awk '{print $1}')"

          {
            echo "bootstrap_binary_path=${bootstrap_binary_path}"
            echo "bootstrap_binary_sha256=${bootstrap_binary_sha256}"
            echo "head_mirror_binary_path=${head_mirror_binary_path}"
            echo "head_mirror_binary_sha256=${head_mirror_binary_sha256}"
          } >>"$GITHUB_OUTPUT"

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: prepare terraform backend
        shell: bash
        run: |
          set -euo pipefail

          account_id="$(aws sts get-caller-identity --query Account --output text)"
          state_bucket="burn-dragon-p2p-tfstate-${account_id}-${AWS_REGION}"
          state_key="deploy/aws/${STACK_NAME}.tfstate"

          if ! aws s3api head-bucket --bucket "$state_bucket" >/dev/null 2>&1; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$state_bucket"
            else
              aws s3api create-bucket \
                --bucket "$state_bucket" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "$state_bucket" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$state_bucket" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "$state_bucket" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          backend_config="$RUNNER_TEMP/terraform-backend.hcl"
          cat >"$backend_config" <<EOF
          bucket = "$state_bucket"
          key    = "$state_key"
          region = "$AWS_REGION"
          encrypt = true
          EOF

          echo "TF_BACKEND_CONFIG=$backend_config" >>"$GITHUB_ENV"
          echo "TF_STATE_BUCKET=$state_bucket" >>"$GITHUB_ENV"
          echo "TF_STATE_KEY=$state_key" >>"$GITHUB_ENV"

      - name: terraform init
        run: terraform -chdir="$TF_ROOT" init -input=false -reconfigure -backend-config="$TF_BACKEND_CONFIG"

      - name: terraform workspace
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="$TF_ROOT" workspace select "$TF_WORKSPACE_NAME" || \
          terraform -chdir="$TF_ROOT" workspace new "$TF_WORKSPACE_NAME"

      - name: terraform validate
        run: terraform -chdir="$TF_ROOT" validate

      - name: terraform plan
        shell: bash
        run: |
          set -euo pipefail
          plan_args=(-input=false -out=tfplan)
          if [ "${{ github.event.inputs.force_replace_bootstrap }}" = "true" ]; then
            plan_args+=(-replace=aws_instance.bootstrap)
          fi
          terraform -chdir="$TF_ROOT" plan "${plan_args[@]}"

      - name: terraform apply
        if: ${{ github.event.inputs.plan_only != 'true' }}
        run: terraform -chdir="$TF_ROOT" apply -input=false -auto-approve tfplan

      - name: capture outputs
        if: ${{ github.event.inputs.plan_only != 'true' }}
        id: outputs
        shell: bash
        run: |
          set -euo pipefail
          edge_url="$(terraform -chdir="$TF_ROOT" output -raw edge_url)"
          browser_app_url="$(terraform -chdir="$TF_ROOT" output -raw browser_app_url)"
          bootstrap_config_json_b64="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_config_json | base64 -w0)"
          caddyfile_b64="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_caddyfile | base64 -w0)"
          bootstrap_head_mirror_config_b64="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_head_mirror_config | base64 -w0)"
          bootstrap_head_mirror_auth_script_b64="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_head_mirror_fetch_auth_script | base64 -w0)"
          bootstrap_head_mirror_service_unit_b64="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_head_mirror_service_unit | base64 -w0)"
          public_ip="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_public_ip)"
          instance_id="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Name,Values=${STACK_NAME}-bootstrap" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[] | sort_by(@, &LaunchTime)[-1].InstanceId' \
            --output text 2>/dev/null || true)"
          if [ -z "$instance_id" ] || [ "$instance_id" = "None" ]; then
            instance_id="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_instance_id 2>/dev/null || true)"
          fi
          if [ -z "$instance_id" ] || [ "$instance_id" = "None" ]; then
            if [ -n "$public_ip" ] && [ "$public_ip" != "None" ]; then
              instance_id="$(aws ec2 describe-instances \
                --region "$AWS_REGION" \
                --filters \
                  "Name=ip-address,Values=${public_ip}" \
                  "Name=instance-state-name,Values=pending,running,stopping,stopped" \
                --query 'Reservations[].Instances[] | sort_by(@, &LaunchTime)[-1].InstanceId' \
                --output text 2>/dev/null || true)"
            fi
          fi
          seed_tcp="$(terraform -chdir="$TF_ROOT" output -raw seed_node_tcp_multiaddr)"
          seed_quic="$(terraform -chdir="$TF_ROOT" output -raw seed_node_quic_multiaddr)"
          redis_endpoint="$(terraform -chdir="$TF_ROOT" output -raw control_plane_redis_primary_endpoint)"
          control_plane_state_backend="$(terraform -chdir="$TF_ROOT" output -raw control_plane_state_backend)"
          bootstrap_state_storage_mode="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_state_storage_mode)"
          control_plane_dashboard_name="$(terraform -chdir="$TF_ROOT" output -raw control_plane_dashboard_name)"
          control_plane_dashboard_url="$(terraform -chdir="$TF_ROOT" output -raw control_plane_dashboard_url)"
          artifact_bucket_name="$(terraform -chdir="$TF_ROOT" output -raw artifact_bucket_name)"
          artifact_bucket_uri="$(terraform -chdir="$TF_ROOT" output -raw artifact_bucket_uri)"
          dataset_bucket_name="$(terraform -chdir="$TF_ROOT" output -raw dataset_bucket_name)"
          dataset_bucket_uri="$(terraform -chdir="$TF_ROOT" output -raw dataset_bucket_uri)"
          dataset_bucket_path_prefix="$(terraform -chdir="$TF_ROOT" output -raw dataset_bucket_path_prefix)"
          dataset_distribution_domain_name="$(terraform -chdir="$TF_ROOT" output -raw dataset_distribution_domain_name)"
          dataset_distribution_id="$(terraform -chdir="$TF_ROOT" output -raw dataset_distribution_id)"
          managed_climbmix_browser_dataset_base_url="$(terraform -chdir="$TF_ROOT" output -raw managed_climbmix_browser_dataset_base_url)"
          disaster_recovery_region="$(terraform -chdir="$TF_ROOT" output -raw disaster_recovery_region)"
          artifact_replica_bucket_name="$(terraform -chdir="$TF_ROOT" output -raw artifact_replica_bucket_name)"
          artifact_replica_bucket_uri="$(terraform -chdir="$TF_ROOT" output -raw artifact_replica_bucket_uri)"
          managed_trainer_asg_name="$(terraform -chdir="$TF_ROOT" output -raw managed_trainer_asg_name)"
          managed_trainer_desired_capacity="$(terraform -chdir="$TF_ROOT" output -raw managed_trainer_desired_capacity)"
          bootstrap_head_mirror_auth_bundle_parameter_name="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_head_mirror_auth_bundle_parameter_name)"

          {
            echo "edge_url=$edge_url"
            echo "browser_app_url=$browser_app_url"
            echo "bootstrap_config_json_b64=$bootstrap_config_json_b64"
            echo "caddyfile_b64=$caddyfile_b64"
            echo "bootstrap_head_mirror_config_b64=$bootstrap_head_mirror_config_b64"
            echo "bootstrap_head_mirror_auth_script_b64=$bootstrap_head_mirror_auth_script_b64"
            echo "bootstrap_head_mirror_service_unit_b64=$bootstrap_head_mirror_service_unit_b64"
            echo "public_ip=$public_ip"
            echo "instance_id=$instance_id"
            echo "seed_tcp=$seed_tcp"
            echo "seed_quic=$seed_quic"
            echo "redis_endpoint=$redis_endpoint"
            echo "control_plane_state_backend=$control_plane_state_backend"
            echo "bootstrap_state_storage_mode=$bootstrap_state_storage_mode"
            echo "control_plane_dashboard_name=$control_plane_dashboard_name"
            echo "control_plane_dashboard_url=$control_plane_dashboard_url"
            echo "artifact_bucket_name=$artifact_bucket_name"
            echo "artifact_bucket_uri=$artifact_bucket_uri"
            echo "dataset_bucket_name=$dataset_bucket_name"
            echo "dataset_bucket_uri=$dataset_bucket_uri"
            echo "dataset_bucket_path_prefix=$dataset_bucket_path_prefix"
            echo "dataset_distribution_domain_name=$dataset_distribution_domain_name"
            echo "dataset_distribution_id=$dataset_distribution_id"
            echo "managed_climbmix_browser_dataset_base_url=$managed_climbmix_browser_dataset_base_url"
            echo "disaster_recovery_region=$disaster_recovery_region"
            echo "artifact_replica_bucket_name=$artifact_replica_bucket_name"
            echo "artifact_replica_bucket_uri=$artifact_replica_bucket_uri"
            echo "managed_trainer_asg_name=$managed_trainer_asg_name"
            echo "managed_trainer_desired_capacity=$managed_trainer_desired_capacity"
            echo "bootstrap_head_mirror_auth_bundle_parameter_name=$bootstrap_head_mirror_auth_bundle_parameter_name"
          } >>"$GITHUB_OUTPUT"

      - name: sync bootstrap runtime config and restart services
        if: ${{ github.event.inputs.plan_only != 'true' }}
        shell: bash
        env:
          BOOTSTRAP_INSTANCE_ID: ${{ steps.outputs.outputs.instance_id }}
          ARTIFACT_BUCKET_NAME: ${{ steps.outputs.outputs.artifact_bucket_name }}
          BOOTSTRAP_CONFIG_JSON_B64: ${{ steps.outputs.outputs.bootstrap_config_json_b64 }}
          CADDYFILE_B64: ${{ steps.outputs.outputs.caddyfile_b64 }}
          BOOTSTRAP_HEAD_MIRROR_CONFIG_B64: ${{ steps.outputs.outputs.bootstrap_head_mirror_config_b64 }}
          BOOTSTRAP_HEAD_MIRROR_AUTH_SCRIPT_B64: ${{ steps.outputs.outputs.bootstrap_head_mirror_auth_script_b64 }}
          BOOTSTRAP_HEAD_MIRROR_SERVICE_UNIT_B64: ${{ steps.outputs.outputs.bootstrap_head_mirror_service_unit_b64 }}
          BOOTSTRAP_INSTALL_SOURCE: ${{ env.TF_VAR_bootstrap_install_source }}
          BOOTSTRAP_CRATE_VERSION: ${{ env.TF_VAR_bootstrap_crate_version }}
          BOOTSTRAP_GIT_REPOSITORY: https://github.com/aberration-technology/burn_p2p.git
          BOOTSTRAP_GIT_REF: ${{ env.TF_VAR_bootstrap_git_ref }}
          BOOTSTRAP_BINARY_PATH: ${{ steps.edge_binaries.outputs.bootstrap_binary_path }}
          BOOTSTRAP_BINARY_SHA256: ${{ steps.edge_binaries.outputs.bootstrap_binary_sha256 }}
          DRAGON_GIT_REPOSITORY: ${{ env.TF_VAR_dragon_git_repository }}
          DRAGON_GIT_REF: ${{ env.TF_VAR_dragon_git_ref }}
          HEAD_MIRROR_BINARY_PATH: ${{ steps.edge_binaries.outputs.head_mirror_binary_path }}
          HEAD_MIRROR_BINARY_SHA256: ${{ steps.edge_binaries.outputs.head_mirror_binary_sha256 }}
          AUTH_CONNECTOR_KIND: ${{ env.AUTH_CONNECTOR_KIND }}
          BOOTSTRAP_REINSTALL: "false"
          HEAD_MIRROR_REINSTALL: "false"
          RUNTIME_CONFIG_PREFIX: runtime-config/bootstrap/${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          /home/runner/work/burn_dragon/burn_dragon/scripts/sync-bootstrap-runtime-config.sh

      - name: ensure bootstrap edge service is enabled and active
        if: ${{ github.event.inputs.plan_only != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          instance_id="${{ steps.outputs.outputs.instance_id }}"

          command_id="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$instance_id" \
            --document-name AWS-RunShellScript \
            --comment "ensure burn_dragon bootstrap edge service is active" \
            --parameters 'commands=[
              "set -eu",
              "[ -x /usr/local/bin/burn-dragon-p2p-sync-secrets ] || { echo missing /usr/local/bin/burn-dragon-p2p-sync-secrets >&2; ls -l /usr/local/bin/burn-dragon-p2p-sync-secrets >&2 || true; exit 1; }",
              "[ -x /usr/local/bin/burn-p2p-bootstrap ] || { echo missing /usr/local/bin/burn-p2p-bootstrap >&2; ls -l /usr/local/bin/burn-p2p-bootstrap >&2 || true; exit 1; }",
              "systemctl daemon-reload",
              "systemctl enable caddy",
              "systemctl restart caddy",
              "systemctl reset-failed burn-p2p-bootstrap || true",
              "systemctl enable burn-p2p-bootstrap",
              "systemctl restart burn-p2p-bootstrap",
              "systemctl is-enabled burn-p2p-bootstrap",
              "systemctl is-active caddy",
              "systemctl is-active burn-p2p-bootstrap",
              "journalctl -u caddy -u burn-p2p-bootstrap --no-pager -n 120 || true"
            ]' \
            --query 'Command.CommandId' \
            --output text)"

          for attempt in $(seq 1 30); do
            invocation_status="$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "$instance_id" \
              --query 'Status' \
              --output text 2>/dev/null || true)"
            case "$invocation_status" in
              Success)
                break
                ;;
              Cancelled|TimedOut|Failed|Cancelling)
                echo "bootstrap edge enable/start failed with status ${invocation_status}" >&2
                aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$command_id" \
                  --instance-id "$instance_id" \
                  --output json || true
                exit 1
                ;;
            esac
            sleep 5
          done

          if [ "${invocation_status:-}" != "Success" ]; then
            echo "timed out waiting for bootstrap edge enable/start" >&2
            aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "$instance_id" \
              --output json || true
            exit 1
          fi

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$instance_id" \
            --output json

      - name: wait for bootstrap api/auth edge https health
        if: ${{ github.event.inputs.plan_only != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          edge_url="${{ steps.outputs.outputs.edge_url }}"
          for attempt in $(seq 1 40); do
            if curl --fail --silent --show-error --location \
              --connect-timeout 5 \
              --max-time 10 \
              "$edge_url/portal/snapshot" >/dev/null; then
              exit 0
            fi
            sleep 15
          done
          echo "edge did not become healthy: $edge_url" >&2
          exit 1

      - name: verify browser metrics catchup api is enabled
        if: ${{ github.event.inputs.plan_only != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          edge_url="${{ steps.outputs.outputs.edge_url }}"
          experiment_id="${MANAGED_TRAINER_EXPERIMENT_ID:-nca-prepretraining}"
          curl --fail --silent --show-error --location \
            --connect-timeout 5 \
            --max-time 20 \
            "$edge_url/metrics/catchup/${experiment_id}" >/dev/null

      - name: seed managed trainer auth bundle in ssm parameter store
        if: ${{ github.event.inputs.plan_only != 'true' && env.TF_VAR_managed_trainer_desired_capacity != '0' }}
        shell: bash
        env:
          DRAGON_NATIVE_BINARY: ${{ steps.edge_binaries.outputs.head_mirror_binary_path }}
        run: |
          set -euo pipefail
          bundle_json="${TRAINER_AUTH_BUNDLE_JSON:-}"

          if [ "${MANAGED_TRAINER_AUTH_MODE:-disabled}" = "bootstrap_static_principal" ]; then
            tmpdir="$(mktemp -d)"
            config_path="$tmpdir/trainer-auth-config.toml"
            bundle_path="$tmpdir/auth-bundle.json"
            cat <<EOF | sed 's/^            //' >"$config_path"
            training_config_paths = []
            storage_root = "$tmpdir/storage"
            app_semver = "$TF_VAR_managed_trainer_crate_version"

            [network]
            edge_base_url = "${{ steps.outputs.outputs.edge_url }}"
            seed_node_urls = [
              "${{ steps.outputs.outputs.seed_tcp }}",
              "${{ steps.outputs.outputs.seed_quic }}",
            ]

            [manifest]
            project_family_id = "$TF_VAR_project_family_id"
            network_id = "$TF_VAR_network_id"
            study_id = "$TF_VAR_study_id"
            experiment_id = "$MANAGED_TRAINER_EXPERIMENT_ID"
            revision_id = "$MANAGED_TRAINER_REVISION_ID"
            display_name = "burn_dragon managed $TF_VAR_managed_trainer_experiment_kind trainer auth seed"
            description = "managed trainer auth seed"
            protocol_major = 0
            authority_public_keys = []
            bootstrap_addrs = []
            EOF

            dragon_native_cmd=()
            if [ -n "${DRAGON_NATIVE_BINARY:-}" ] && [ -x "${DRAGON_NATIVE_BINARY}" ]; then
              dragon_native_cmd=("${DRAGON_NATIVE_BINARY}")
            else
              dragon_native_cmd=(cargo run --locked -p burn_dragon_p2p --bin burn_dragon_p2p_native --no-default-features --features native --)
            fi
            trusted_callback_args=()
            if [ -n "${BROWSER_CANARY_CALLBACK_TOKEN:-}" ]; then
              trusted_callback_args+=(--trusted-callback-token "$BROWSER_CANARY_CALLBACK_TOKEN")
            fi

            for attempt in $(seq 1 10); do
              if "${dragon_native_cmd[@]}" \
                enroll-static-principal \
                --config "$config_path" \
                --experiment-kind "$TF_VAR_managed_trainer_experiment_kind" \
                --backend "$TF_VAR_managed_trainer_backend" \
                --principal-id "$MANAGED_TRAINER_PRINCIPAL_ID" \
                --principal-hint "$MANAGED_TRAINER_PRINCIPAL_ID" \
                --target-artifact-hash "$TF_VAR_native_target_artifact_hash" \
                "${trusted_callback_args[@]}" \
                --auth-bundle-out "$bundle_path" \
                --output-format json; then
                bundle_json="$(cat "$bundle_path")"
                break
              fi
              sleep 15
            done
          fi

          if [ -z "$bundle_json" ]; then
            echo "failed to resolve managed trainer auth bundle" >&2
            exit 1
          fi

          aws ssm put-parameter \
            --region "$AWS_REGION" \
            --type SecureString \
            --tier Advanced \
            --overwrite \
            --name "$TF_VAR_managed_trainer_auth_bundle_parameter_name" \
            --value "$bundle_json"

      - name: seed bootstrap head mirror auth bundle in ssm parameter store
        if: ${{ github.event.inputs.plan_only != 'true' }}
        shell: bash
        env:
          DRAGON_NATIVE_BINARY: ${{ steps.edge_binaries.outputs.head_mirror_binary_path }}
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          config_path="$tmpdir/head-mirror-auth-config.toml"
          bundle_path="$tmpdir/auth-bundle.json"
          cat <<EOF | sed 's/^          //' >"$config_path"
          training_config_paths = []
          storage_root = "$tmpdir/storage"
          app_semver = "$TF_VAR_dragon_crate_version"

          [network]
          edge_base_url = "${{ steps.outputs.outputs.edge_url }}"
          seed_node_urls = [
            "${{ steps.outputs.outputs.seed_tcp }}",
            "${{ steps.outputs.outputs.seed_quic }}",
          ]

          [manifest]
          project_family_id = "$TF_VAR_project_family_id"
          network_id = "$TF_VAR_network_id"
          study_id = "$TF_VAR_study_id"
          experiment_id = "$BOOTSTRAP_HEAD_MIRROR_EXPERIMENT_ID"
          revision_id = "$BOOTSTRAP_HEAD_MIRROR_REVISION_ID"
          display_name = "burn_dragon bootstrap nca head mirror auth seed"
          description = "bootstrap head mirror auth seed"
          protocol_major = 0
          authority_public_keys = []
          bootstrap_addrs = []
          EOF

          dragon_native_cmd=()
          if [ -n "${DRAGON_NATIVE_BINARY:-}" ] && [ -x "${DRAGON_NATIVE_BINARY}" ]; then
            dragon_native_cmd=("${DRAGON_NATIVE_BINARY}")
          else
            dragon_native_cmd=(cargo run --locked -p burn_dragon_p2p --bin burn_dragon_p2p_native --no-default-features --features native --)
          fi
          trusted_callback_args=()
          if [ -n "${BROWSER_CANARY_CALLBACK_TOKEN:-}" ]; then
            trusted_callback_args+=(--trusted-callback-token "$BROWSER_CANARY_CALLBACK_TOKEN")
          fi

          for attempt in $(seq 1 10); do
            if "${dragon_native_cmd[@]}" \
              enroll-static-principal \
              --config "$config_path" \
              --experiment-kind nca \
              --backend cpu \
              --principal-id "$BOOTSTRAP_HEAD_MIRROR_PRINCIPAL_ID" \
              --principal-hint "$BOOTSTRAP_HEAD_MIRROR_PRINCIPAL_ID" \
              --target-artifact-hash "$TF_VAR_native_target_artifact_hash" \
              "${trusted_callback_args[@]}" \
              --auth-bundle-out "$bundle_path" \
              --output-format json; then
              aws ssm put-parameter \
                --region "$AWS_REGION" \
                --type SecureString \
                --tier Advanced \
                --overwrite \
                --name "$TF_VAR_bootstrap_head_mirror_auth_bundle_parameter_name" \
                --value "$(cat "$bundle_path")"
              "${dragon_native_cmd[@]}" \
                admin-rollout-profile \
                --config "$config_path" \
                --experiment-kind nca \
                --backend cpu \
                --auth-bundle "$bundle_path" \
                --output-format json >/tmp/bootstrap-head-mirror-admin-rollout.json
              cat /tmp/bootstrap-head-mirror-admin-rollout.json
              exit 0
            fi
            sleep 15
          done

          echo "failed to resolve bootstrap head mirror auth bundle" >&2
          exit 1

      - name: restart bootstrap head mirror after auth seed
        if: ${{ github.event.inputs.plan_only != 'true' }}
        shell: bash
        env:
          BOOTSTRAP_INSTANCE_ID: ${{ steps.outputs.outputs.instance_id }}
        run: |
          set -euo pipefail
          command_id="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$BOOTSTRAP_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "restart burn_dragon bootstrap head mirror" \
            --parameters 'commands=[
              "set -eu",
              "/usr/local/bin/burn-dragon-p2p-fetch-head-mirror-auth-bundle",
              "systemctl reset-failed burn-dragon-p2p-head-mirror || true",
              "systemctl restart burn-dragon-p2p-head-mirror",
              "systemctl is-active burn-dragon-p2p-head-mirror",
              "journalctl -u burn-dragon-p2p-head-mirror --no-pager -n 120 || true"
            ]' \
            --query "Command.CommandId" \
            --output text)"

          for attempt in $(seq 1 30); do
            invocation_status="$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "$BOOTSTRAP_INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || true)"
            case "$invocation_status" in
              Success)
                exit 0
                ;;
              Cancelled|TimedOut|Failed|Cancelling)
                aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$command_id" \
                  --instance-id "$BOOTSTRAP_INSTANCE_ID" \
                  --output json || true
                exit 1
                ;;
            esac
            sleep 5
          done

          echo "timed out waiting for bootstrap head mirror restart" >&2
          exit 1

      - name: wait for bootstrap deployment diagnostics to turn ready
        id: deployment_diagnostics
        if: ${{ github.event.inputs.plan_only != 'true' }}
        shell: bash
        env:
          DRAGON_NATIVE_BINARY: ${{ steps.edge_binaries.outputs.head_mirror_binary_path }}
        run: |
          set -euo pipefail
          if [ -z "${DRAGON_NATIVE_BINARY:-}" ] || [ ! -x "${DRAGON_NATIVE_BINARY}" ]; then
            echo "missing burn_dragon_p2p_native binary for deployment diagnostics" >&2
            exit 1
          fi

          tmpdir="$(mktemp -d)"
          config_path="$tmpdir/bootstrap-head-mirror-diag.toml"
          report_path="${RUNNER_TEMP}/bootstrap-deployment-diagnostics.json"
          echo "report_path=$report_path" >>"$GITHUB_OUTPUT"
          cat <<EOF | sed 's/^          //' >"$config_path"
          training_config_paths = []
          storage_root = "$tmpdir/storage"
          app_semver = "$TF_VAR_dragon_crate_version"

          [network]
          edge_base_url = "${{ steps.outputs.outputs.edge_url }}"
          seed_node_urls = [
            "${{ steps.outputs.outputs.seed_tcp }}",
            "${{ steps.outputs.outputs.seed_quic }}",
          ]

          [manifest]
          project_family_id = "$TF_VAR_project_family_id"
          network_id = "$TF_VAR_network_id"
          study_id = "$TF_VAR_study_id"
          experiment_id = "$BOOTSTRAP_HEAD_MIRROR_EXPERIMENT_ID"
          revision_id = "$BOOTSTRAP_HEAD_MIRROR_REVISION_ID"
          display_name = "burn_dragon bootstrap diagnostics"
          description = "bootstrap restore diagnostics"
          protocol_major = 0
          authority_public_keys = []
          bootstrap_addrs = []
          EOF

          auth_flags=()
          case "${AUTH_CONNECTOR_KIND}" in
            github|oidc|oauth)
              auth_flags=(--check-auth-authorize --require-auth-authorize)
              ;;
          esac

          for attempt in $(seq 1 80); do
            if "${DRAGON_NATIVE_BINARY}" \
              deployment-diagnostics \
              --config "$config_path" \
              --experiment-kind nca \
              --backend cpu \
              --check-metrics-catchup \
              --check-artifact-head-view \
              --require-head-published \
              --require-directory-entry-published \
              --require-metrics-catchup \
              --require-artifact-head-view \
              "${auth_flags[@]}" \
              --assert-ready \
              --output "$report_path" \
              --output-format json; then
              cat "$report_path"
              exit 0
            fi
            cat "$report_path" || true
            sleep 10
          done

          echo "bootstrap deployment diagnostics never reached ready" >&2
          cat "$report_path" || true
          exit 1

      - name: summarize deployment diagnostics
        if: ${{ always() && steps.deployment_diagnostics.outputs.report_path != '' }}
        shell: bash
        run: |
          set -euo pipefail
          report_path="${{ steps.deployment_diagnostics.outputs.report_path }}"
          if [ ! -f "$report_path" ]; then
            exit 0
          fi

          python3 - "$report_path" >>"$GITHUB_STEP_SUMMARY" <<'PY'
          import json
          import sys

          report = json.load(open(sys.argv[1]))
          readiness = report.get("readiness") or {}
          profile_resolution = (report.get("profile_resolution") or {}).get("value") or {}
          edge_snapshot = (report.get("edge_snapshot") or {}).get("value") or {}
          artifact_head_view = report.get("artifact_head_view") or {}
          blockers = readiness.get("blocking_issues") or []
          warnings = readiness.get("observed_warnings") or []

          print("## deployment diagnostics")
          print()
          print(f"- Ready: `{readiness.get('ready', False)}`")
          print(f"- Profile source: `{profile_resolution.get('source', 'unknown')}`")
          print(f"- Matching head present: `{edge_snapshot.get('matching_head_present', False)}`")
          print(f"- Matching head id: `{edge_snapshot.get('matching_head_id') or 'none'}`")
          print(f"- Matching directory entry present: `{edge_snapshot.get('matching_directory_entry_present', False)}`")
          print(f"- Artifact head probe ok: `{artifact_head_view.get('ok', False)}`")
          print(f"- Blockers: `{', '.join(blockers) if blockers else 'none'}`")
          print(f"- Warnings: `{', '.join(warnings) if warnings else 'none'}`")
          PY

      - name: upload deployment diagnostics artifact
        if: ${{ always() && steps.deployment_diagnostics.outputs.report_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: burn-dragon-bootstrap-restore-diagnostics
          path: ${{ steps.deployment_diagnostics.outputs.report_path }}
          if-no-files-found: ignore

      - name: setup node for live browser canary
        if: ${{ github.event.inputs.plan_only != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: install chromium for live browser canary
        if: ${{ github.event.inputs.plan_only != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          npx --yes playwright --version
          npx --yes playwright install --with-deps chromium

      - name: run live browser canary
        id: live_browser_canary
        if: ${{ github.event.inputs.plan_only != 'true' }}
        shell: bash
        env:
          BURN_DRAGON_BROWSER_CANARY_SITE_BASE_URL: ${{ steps.outputs.outputs.browser_app_url }}
          BURN_DRAGON_BROWSER_CANARY_EDGE_BASE_URL: ${{ steps.outputs.outputs.edge_url }}
          BURN_DRAGON_BROWSER_CANARY_PRINCIPAL_ID: ${{ env.BROWSER_CANARY_PRINCIPAL_ID }}
          BURN_DRAGON_BROWSER_CANARY_CALLBACK_TOKEN: ${{ env.BROWSER_CANARY_CALLBACK_TOKEN }}
          BURN_DRAGON_BROWSER_CANARY_EXPERIMENT_ID: ${{ env.BROWSER_CANARY_EXPERIMENT_ID }}
          BURN_DRAGON_BROWSER_CANARY_ARTIFACT_DIR: ${{ runner.temp }}/burn-dragon-live-browser-canary
          BURN_DRAGON_BROWSER_CANARY_OUTPUT_JSON: ${{ runner.temp }}/burn-dragon-live-browser-canary/canary-summary.json
        run: |
          set -euo pipefail
          mkdir -p "$BURN_DRAGON_BROWSER_CANARY_ARTIFACT_DIR"
          echo "artifact_dir=$BURN_DRAGON_BROWSER_CANARY_ARTIFACT_DIR" >>"$GITHUB_OUTPUT"
          echo "report_path=$BURN_DRAGON_BROWSER_CANARY_OUTPUT_JSON" >>"$GITHUB_OUTPUT"
          node scripts/live-browser-canary.mjs

      - name: summarize live browser canary
        if: ${{ always() && steps.live_browser_canary.outputs.report_path != '' }}
        shell: bash
        run: |
          set -euo pipefail
          report_path="${{ steps.live_browser_canary.outputs.report_path }}"
          if [ ! -f "$report_path" ]; then
            exit 0
          fi

          python3 - "$report_path" >>"$GITHUB_STEP_SUMMARY" <<'PY'
          import json
          import sys

          report = json.load(open(sys.argv[1]))
          receipt = report.get("receipt_submission") or {}
          control_requests = report.get("quiet_window_control_plane_requests") or []
          artifact_fallback = report.get("artifact_http_fallback_requests") or []

          print("## live browser canary")
          print()
          print(f"- Success: `{report.get('success', False)}`")
          print(f"- Principal id: `{report.get('principal_id', 'n/a')}`")
          print(f"- Signed seed transports: `{', '.join(report.get('signed_seed_transport_preference') or []) or 'none'}`")
          print(f"- Connect clicked: `{report.get('connect_clicked', False)}`")
          print(f"- Training button visible: `{report.get('training_button_visible', False)}`")
          print(f"- Quiet-window control-plane requests: `{len(control_requests)}`")
          print(f"- Edge artifact fallback requests: `{len(artifact_fallback)}`")
          print(f"- Receipt status: `{receipt.get('status', 'n/a')}`")
          print(f"- Error: `{report.get('error') or 'none'}`")
          PY

      - name: upload live browser canary artifact
        if: ${{ always() && steps.live_browser_canary.outputs.artifact_dir != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: burn-dragon-live-browser-canary
          path: ${{ steps.live_browser_canary.outputs.artifact_dir }}
          if-no-files-found: ignore

      - name: publish workflow summary
        env:
          INPUT_PLAN_ONLY: ${{ github.event.inputs.plan_only }}
          OUTPUT_EDGE_URL: ${{ steps.outputs.outputs.edge_url }}
          OUTPUT_BROWSER_APP_URL: ${{ steps.outputs.outputs.browser_app_url }}
          OUTPUT_SEED_TCP: ${{ steps.outputs.outputs.seed_tcp }}
          OUTPUT_SEED_QUIC: ${{ steps.outputs.outputs.seed_quic }}
          OUTPUT_BOOTSTRAP_STATE_STORAGE_MODE: ${{ steps.outputs.outputs.bootstrap_state_storage_mode }}
          OUTPUT_CONTROL_PLANE_STATE_BACKEND: ${{ steps.outputs.outputs.control_plane_state_backend }}
          OUTPUT_REDIS_ENDPOINT: ${{ steps.outputs.outputs.redis_endpoint }}
          OUTPUT_CONTROL_PLANE_DASHBOARD_NAME: ${{ steps.outputs.outputs.control_plane_dashboard_name }}
          OUTPUT_CONTROL_PLANE_DASHBOARD_URL: ${{ steps.outputs.outputs.control_plane_dashboard_url }}
          OUTPUT_ARTIFACT_BUCKET_NAME: ${{ steps.outputs.outputs.artifact_bucket_name }}
          OUTPUT_ARTIFACT_BUCKET_URI: ${{ steps.outputs.outputs.artifact_bucket_uri }}
          OUTPUT_DATASET_BUCKET_NAME: ${{ steps.outputs.outputs.dataset_bucket_name }}
          OUTPUT_DATASET_BUCKET_URI: ${{ steps.outputs.outputs.dataset_bucket_uri }}
          OUTPUT_DATASET_DISTRIBUTION_DOMAIN_NAME: ${{ steps.outputs.outputs.dataset_distribution_domain_name }}
          OUTPUT_MANAGED_CLIMBMIX_BROWSER_DATASET_BASE_URL: ${{ steps.outputs.outputs.managed_climbmix_browser_dataset_base_url }}
          OUTPUT_DISASTER_RECOVERY_REGION: ${{ steps.outputs.outputs.disaster_recovery_region }}
          OUTPUT_ARTIFACT_REPLICA_BUCKET_NAME: ${{ steps.outputs.outputs.artifact_replica_bucket_name }}
          OUTPUT_ARTIFACT_REPLICA_BUCKET_URI: ${{ steps.outputs.outputs.artifact_replica_bucket_uri }}
          OUTPUT_MANAGED_TRAINER_ASG_NAME: ${{ steps.outputs.outputs.managed_trainer_asg_name }}
          OUTPUT_MANAGED_TRAINER_DESIRED_CAPACITY: ${{ steps.outputs.outputs.managed_trainer_desired_capacity }}
          OUTPUT_BOOTSTRAP_HEAD_MIRROR_AUTH_BUNDLE_PARAMETER_NAME: ${{ steps.outputs.outputs.bootstrap_head_mirror_auth_bundle_parameter_name }}
        shell: bash
        run: |
          cat >>"$GITHUB_STEP_SUMMARY" <<EOF
          ## burn_dragon_p2p restore

          - Environment: \`${DEPLOY_ENVIRONMENT}\`
          - Terraform workspace: \`${TF_WORKSPACE_NAME}\`
          - Target AWS region: \`${AWS_REGION}\`
          - Snapshot search region: \`${SNAPSHOT_SEARCH_REGION}\`
          - Bootstrap state storage: \`${TF_VAR_use_retained_bootstrap_data_volume:-false}\`
          - Bootstrap restore snapshot: \`${PRIMARY_RESTORE_SNAPSHOT_ID:-disabled}\`
          - Plan only: \`${INPUT_PLAN_ONLY}\`
          - Auth connector: \`${AUTH_CONNECTOR_KIND}\`
          - GitHub admin logins: \`${ADMIN_LOGINS_CSV:-n/a}\`
          - Secret prefix: \`${SECRET_PARAMETER_PREFIX}\`
          - Bootstrap install source: \`${TF_VAR_bootstrap_install_source}\`
          - Bootstrap crate version: \`${TF_VAR_bootstrap_crate_version}\`
          - Bootstrap git ref override: \`${TF_VAR_bootstrap_git_ref:-n/a}\`
          EOF

          if [ "${INPUT_PLAN_ONLY}" != "true" ]; then
            cat >>"$GITHUB_STEP_SUMMARY" <<EOF
          - Edge URL: ${OUTPUT_EDGE_URL}
          - Browser App URL: \`${OUTPUT_BROWSER_APP_URL:-not-configured}\`
          - Seed TCP: \`${OUTPUT_SEED_TCP}\`
          - Seed QUIC: \`${OUTPUT_SEED_QUIC}\`
          - Bootstrap state storage mode: \`${OUTPUT_BOOTSTRAP_STATE_STORAGE_MODE}\`
          - Control-plane state backend: \`${OUTPUT_CONTROL_PLANE_STATE_BACKEND}\`
          - Redis endpoint: \`${OUTPUT_REDIS_ENDPOINT:-local-file-backed}\`
          - Control plane dashboard: \`${OUTPUT_CONTROL_PLANE_DASHBOARD_NAME:-disabled}\`
          - Control plane dashboard URL: \`${OUTPUT_CONTROL_PLANE_DASHBOARD_URL:-disabled}\`
          - Artifact bucket: \`${OUTPUT_ARTIFACT_BUCKET_NAME}\`
          - Artifact S3 prefix: \`${OUTPUT_ARTIFACT_BUCKET_URI}\`
          - Dataset bucket: \`${OUTPUT_DATASET_BUCKET_NAME}\`
          - Dataset S3 prefix: \`${OUTPUT_DATASET_BUCKET_URI}\`
          - Dataset CDN hostname: \`${OUTPUT_DATASET_DISTRIBUTION_DOMAIN_NAME}\`
          - Managed ClimbMix dataset URL: \`${OUTPUT_MANAGED_CLIMBMIX_BROWSER_DATASET_BASE_URL}\`
          - Next warm DR region: \`${OUTPUT_DISASTER_RECOVERY_REGION:-disabled}\`
          - Next warm DR artifact bucket: \`${OUTPUT_ARTIFACT_REPLICA_BUCKET_NAME:-n/a}\`
          - Next warm DR artifact S3 prefix: \`${OUTPUT_ARTIFACT_REPLICA_BUCKET_URI:-n/a}\`
          - Managed trainer ASG: \`${OUTPUT_MANAGED_TRAINER_ASG_NAME:-disabled}\`
          - Managed trainer desired capacity: \`${OUTPUT_MANAGED_TRAINER_DESIRED_CAPACITY}\`
          - Managed trainer auth mode: \`${MANAGED_TRAINER_AUTH_MODE}\`
          - Managed trainer principal id: \`${MANAGED_TRAINER_PRINCIPAL_ID:-n/a}\`
          - Managed trainer auth bundle parameter: \`${TF_VAR_managed_trainer_auth_bundle_parameter_name:-n/a}\`
          - Bootstrap head mirror principal id: \`${BOOTSTRAP_HEAD_MIRROR_PRINCIPAL_ID}\`
          - Bootstrap head mirror auth bundle parameter: \`${OUTPUT_BOOTSTRAP_HEAD_MIRROR_AUTH_BUNDLE_PARAMETER_NAME:-n/a}\`
          - Browser canary principal id: \`${BROWSER_CANARY_PRINCIPAL_ID}\`
          EOF
          fi
