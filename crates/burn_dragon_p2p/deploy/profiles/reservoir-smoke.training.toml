[dataset]
cache_dir = "./cache/reservoir-smoke"
train_split_ratio = 0.9
type = "nemotron_climb_mix"
max_records = 256

[dataset.tokenizer]
type = "pretokenized"
vocab_size = 50257
eos_id = 50256

[model]
n_layer = 6
n_embd = 96
n_head = 8
latent_total = 192

[model.initialization]
kind = "reservoir"

[model.initialization.reservoir]
seed = 1337
density = 0.08
encoder_value_scale = 0.70
decoder_scale = 1.00

[model.initialization.topology_prior]
kind = "modular_bridges"
community_count = 8
bridge_fraction = 0.03
intra_community_gain = 1.5
inter_community_gain = 0.5
bridge_gain = 1.0

[model.initialization.firing_targets]
kind = "gaussian_estimate"
x_target = 0.12
y_target = 0.05

[training]
block_size = 128
batch_size = 4
max_iters = 32
checkpoint_interval_iters = 4
log_frequency = 1
seed = 1337

[optimizer]
learning_rate = 0.003
weight_decay = 0.0

[generation]
prompt = "1 2 3"
