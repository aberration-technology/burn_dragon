name: Publish Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-readiness.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "xtask/**"
      - "crates/**"

concurrency:
  group: publish-readiness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish-dry-run:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: verify publish readiness chain
        shell: bash
        run: |
          set -euo pipefail
          crates=(
            burn_dragon_tokenizer
            burn_dragon_universality
            burn_dragon_kernel
            burn_dragon_core
            burn_dragon_checkpoint
            burn_dragon_train
            burn_dragon_language
            burn_dragon_p2p
          )

          verify_crate() {
            local crate="$1"
            echo "+ cargo package --manifest-path Cargo.toml -p ${crate} --locked --list"
            cargo package --manifest-path Cargo.toml -p "${crate}" --locked --list >/tmp/${crate}.package.list
            echo "+ cargo check --manifest-path Cargo.toml -p ${crate} --locked"
            cargo check --manifest-path Cargo.toml -p "${crate}" --locked
          }

          for crate in "${crates[@]}"; do
            verify_crate "${crate}"
          done
