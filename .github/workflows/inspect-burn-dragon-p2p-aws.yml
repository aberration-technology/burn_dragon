name: inspect burn_dragon_p2p aws

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment suffix. Example: `production` for the `burn-dragon-p2p-production` GitHub Environment."
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      terraform_workspace:
        description: "Terraform workspace name. Example: `mainnet` or `staging`."
        required: true
        default: mainnet
        type: string
      cleanup_legacy_bootstrap_instances:
        description: "Terminate non-canonical bootstrap instances for this deployment environment before inspection. Use this only for one-time cleanup of legacy stack-name drift."
        required: true
        default: false
        type: boolean
      repair_edge_tls:
        description: "Remove the dead Buypass ACME pin from the live bootstrap Caddyfile before inspection and restart Caddy."
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    environment: burn-dragon-p2p-${{ github.event.inputs.environment }}
    steps:
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.BURN_DRAGON_P2P_AWS_ROLE_ARN }}
          aws-region: ${{ vars.BURN_DRAGON_P2P_AWS_REGION }}

      - name: inspect bootstrap instance
        shell: bash
        env:
          STACK_NAME_VAR: ${{ vars.BURN_DRAGON_P2P_STACK_NAME }}
          AWS_REGION: ${{ vars.BURN_DRAGON_P2P_AWS_REGION }}
          TF_WORKSPACE_NAME: ${{ github.event.inputs.terraform_workspace }}
          EDGE_DOMAIN_NAME: ${{ vars.BURN_DRAGON_P2P_EDGE_DOMAIN_NAME }}
          ROUTE53_ZONE_NAME: ${{ vars.BURN_DRAGON_P2P_ROUTE53_ZONE_NAME }}
          ACME_CONTACT_EMAIL: ${{ vars.BURN_DRAGON_P2P_ACME_CONTACT_EMAIL }}
          DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}
          CLEANUP_LEGACY_BOOTSTRAP_INSTANCES: ${{ github.event.inputs.cleanup_legacy_bootstrap_instances }}
          REPAIR_EDGE_TLS: ${{ github.event.inputs.repair_edge_tls }}
        run: |
          set -euo pipefail

          acme_contact_email="${ACME_CONTACT_EMAIL:-}"
          if [ -z "$acme_contact_email" ] && [ -n "${ROUTE53_ZONE_NAME:-}" ]; then
            acme_contact_email="admin@${ROUTE53_ZONE_NAME%.}"
          fi
          export EDGE_ACME_CONTACT_EMAIL="$acme_contact_email"

          canonical_stack_name="burn-dragon-p2p-${DEPLOY_ENVIRONMENT}"
          if [ -n "${STACK_NAME_VAR:-}" ] && [ "$STACK_NAME_VAR" != "$canonical_stack_name" ]; then
            echo "ignoring legacy stack name override '$STACK_NAME_VAR' and inspecting canonical stack '$canonical_stack_name'" >&2
          fi

          instance_name="${canonical_stack_name}-bootstrap"
          bootstrap_rows="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Application,Values=burn-dragon-p2p" \
              "Name=tag:Environment,Values=${DEPLOY_ENVIRONMENT}" \
              "Name=tag:Name,Values=*bootstrap*" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --output json | jq -r '
              [
                .Reservations[].Instances[]
                | {
                    name: ([.Tags[]? | select(.Key == "Name") | .Value][0] // ""),
                    id: .InstanceId,
                    state: .State.Name
                  }
                | select(.name != "")
                | [.name, .id, .state]
                | @tsv
              ] | .[]
            ')"

          if [ -n "$bootstrap_rows" ]; then
            echo "bootstrap instances for Application=burn-dragon-p2p Environment=${DEPLOY_ENVIRONMENT}:"
            printf '%s\n' "$bootstrap_rows" | awk -F '\t' '{printf "  - name=%s id=%s state=%s\n", $1, $2, $3}'
          fi

          legacy_instance_ids="$(printf '%s\n' "$bootstrap_rows" | awk -F '\t' -v expected="$instance_name" '$1 != "" && $1 != expected {print $2}')"
          if [ -n "$legacy_instance_ids" ] && [ "${CLEANUP_LEGACY_BOOTSTRAP_INSTANCES}" = "true" ]; then
            echo "terminating legacy bootstrap instances:"
            printf '%s\n' "$legacy_instance_ids" | sed 's/^/  - /'
            aws ec2 terminate-instances \
              --region "$AWS_REGION" \
              --instance-ids $legacy_instance_ids \
              >/dev/null
          fi

          instance_id="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Name,Values=${instance_name}" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)"

          if [ -z "$instance_id" ] || [ "$instance_id" = "None" ]; then
            echo "bootstrap instance not found for tag Name=${instance_name}" >&2
            exit 1
          fi

          legacy_stack_name="dragon-p2p-prod"
          printf '%s\n' "resource inventory"
          for stack in "$canonical_stack_name" "$legacy_stack_name"; do
            echo "::group::stack inventory ${stack}"

            echo "ec2 instances"
            aws ec2 describe-instances \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
              --query 'Reservations[].Instances[].{name: Tags[?Key==`Name`]|[0].Value,id: InstanceId,state: State.Name}' \
              --output json

            echo "elastic ips"
            aws ec2 describe-addresses \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'Addresses[].{name: Tags[?Key==`Name`]|[0].Value,allocation_id: AllocationId,public_ip: PublicIp}' \
              --output json

            echo "vpcs"
            aws ec2 describe-vpcs \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'Vpcs[].{name: Tags[?Key==`Name`]|[0].Value,id: VpcId}' \
              --output json

            echo "subnets"
            aws ec2 describe-subnets \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'Subnets[].{name: Tags[?Key==`Name`]|[0].Value,id: SubnetId}' \
              --output json

            echo "internet gateways"
            aws ec2 describe-internet-gateways \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'InternetGateways[].{name: Tags[?Key==`Name`]|[0].Value,id: InternetGatewayId}' \
              --output json

            echo "route tables"
            aws ec2 describe-route-tables \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'RouteTables[].{name: Tags[?Key==`Name`]|[0].Value,id: RouteTableId}' \
              --output json

            echo "security groups"
            aws ec2 describe-security-groups \
              --region "$AWS_REGION" \
              --output json | jq --arg stack "$stack" '
                [
                  .SecurityGroups[]
                  | {
                      name: ([.Tags[]? | select(.Key == "Name") | .Value][0] // .GroupName),
                      id: .GroupId
                    }
                  | select(.name | contains($stack))
                ]
              '

            echo "volumes"
            aws ec2 describe-volumes \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'Volumes[].{name: Tags[?Key==`Name`]|[0].Value,id: VolumeId,state: State}' \
              --output json

            echo "iam roles"
            aws iam list-roles \
              --query "Roles[?contains(RoleName, \`${stack}\`)].RoleName" \
              --output json

            echo "instance profiles"
            aws iam list-instance-profiles \
              --query "InstanceProfiles[?contains(InstanceProfileName, \`${stack}\`)].InstanceProfileName" \
              --output json

            echo "s3 buckets"
            aws s3api list-buckets \
              --query "Buckets[?contains(Name, \`${stack}\`)].Name" \
              --output json

            echo "::endgroup::"
          done

          echo "::group::shared dataset and dns inventory"
          echo "cloudfront distributions for dataset domain"
          aws cloudfront list-distributions \
            --output json | jq '
              [
                .DistributionList.Items[]
                | {
                    id: .Id,
                    aliases: (.Aliases.Items // []),
                    comment: .Comment,
                    domain_name: .DomainName
                  }
                | select((.aliases | index("datasets.dragon.aberration.technology")) != null)
              ]
            '

          echo "acm certificates for dataset domain"
          aws acm list-certificates \
            --region us-east-1 \
            --certificate-statuses PENDING_VALIDATION ISSUED INACTIVE EXPIRED VALIDATION_TIMED_OUT REVOKED FAILED \
            --query "CertificateSummaryList[?DomainName==\`datasets.dragon.aberration.technology\` || DomainName==\`dragon.aberration.technology\`].{domain: DomainName, arn: CertificateArn}" \
            --output json

          echo "route53 records"
          hosted_zone_id="$(aws route53 list-hosted-zones-by-name --dns-name aberration.technology --query 'HostedZones[0].Id' --output text | sed 's|/hostedzone/||')"
          aws route53 list-resource-record-sets \
            --hosted-zone-id "$hosted_zone_id" \
            --query "ResourceRecordSets[?Name==\`edge.dragon.aberration.technology.\` || Name==\`dragon.aberration.technology.\` || Name==\`datasets.dragon.aberration.technology.\`].[Name,Type,AliasTarget.DNSName,ResourceRecords]" \
            --output json
          echo "::endgroup::"

          echo "instance_id=${instance_id}"
          echo "edge_domain_name=${EDGE_DOMAIN_NAME}"
          echo "terraform_workspace=${TF_WORKSPACE_NAME}"

          echo "describe instances"
          aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --instance-ids "$instance_id" \
            --output json

          echo "instance status"
          aws ec2 describe-instance-status \
            --region "$AWS_REGION" \
            --include-all-instances \
            --instance-ids "$instance_id" \
            --output json || true

          echo "console output"
          aws ec2 get-console-output \
            --region "$AWS_REGION" \
            --instance-id "$instance_id" \
            --latest \
            --output text || true

          echo "ssm registration"
          ssm_status="$(aws ssm describe-instance-information \
            --region "$AWS_REGION" \
            --filters "Key=InstanceIds,Values=$instance_id" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text 2>/dev/null || true)"
          echo "ssm ping status: ${ssm_status:-missing}"

          if [ "${ssm_status:-}" = "Online" ]; then
            if [ "${REPAIR_EDGE_TLS}" = "true" ]; then
              repair_commands_json="$(python3 - <<'PY'
                import json
                import os
                import shlex

                email = (os.environ.get("EDGE_ACME_CONTACT_EMAIL") or "").strip()
                email_env = f"EDGE_ACME_CONTACT_EMAIL={shlex.quote(email)} "
                commands = [
                    "set -eu",
                    email_env + "python3 - <<'PY'\nfrom pathlib import Path\nimport os\np = Path('/etc/caddy/Caddyfile')\ntext = p.read_text()\nold = \"    tls {\\n        ca https://api.buypass.com/acme/directory\\n    }\\n\\n\"\nif old in text:\n    text = text.replace(old, '')\nemail = os.environ.get('EDGE_ACME_CONTACT_EMAIL', '').strip()\nif email:\n    stripped = text.lstrip()\n    if stripped.startswith('{'):\n        block_end = text.find('\\n}\\n')\n        if block_end != -1:\n            block = text[:block_end + 3]\n            if 'email ' not in block:\n                text = text[:block_end] + f'    email {email}\\n' + text[block_end:]\n    else:\n        text = '{\\n    email ' + email + '\\n}\\n\\n' + text\np.write_text(text)\nPY",
                    email_env + "python3 - <<'PY'\nimport shutil\nfrom pathlib import Path\nbase = Path('/var/lib/caddy/.local/share/caddy')\nif base.exists():\n    for pattern in ('acme/acme.zerossl.com-v2-dv90', 'acme/acme-v02.api.letsencrypt.org-directory'):\n        target = base / pattern\n        if target.exists():\n            shutil.rmtree(target)\nPY",
                    "systemctl restart caddy",
                    "systemctl status caddy --no-pager || true",
                    "journalctl -u caddy --no-pager -n 120 || true",
                    "curl -vkI https://127.0.0.1/portal/snapshot || true",
                ]
                print(json.dumps(commands))
                PY
              )"
              repair_command_id="$(aws ssm send-command \
                --region "$AWS_REGION" \
                --instance-ids "$instance_id" \
                --document-name AWS-RunShellScript \
                --comment "repair burn_dragon bootstrap edge tls issuer" \
                --parameters "commands=${repair_commands_json}" \
                --query 'Command.CommandId' \
                --output text)"

              for attempt in $(seq 1 30); do
                repair_invocation_status="$(aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$repair_command_id" \
                  --instance-id "$instance_id" \
                  --query 'Status' \
                  --output text 2>/dev/null || true)"
                case "$repair_invocation_status" in
                  Success|Cancelled|TimedOut|Failed|Cancelling)
                    break
                    ;;
                esac
                sleep 5
              done

              echo "repair tls ssm command output"
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$repair_command_id" \
                --instance-id "$instance_id" \
                --output json || true
            fi

            command_id="$(aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$instance_id" \
              --document-name AWS-RunShellScript \
              --comment "inspect burn_dragon bootstrap host" \
              --parameters 'commands=[
                "set -eu",
                "date -Is",
                "uname -a",
                "cloud-init status --long || true",
                "echo \"--- /etc/burn-dragon-p2p/bootstrap.env ---\"",
                "if [ -f /etc/burn-dragon-p2p/bootstrap.env ]; then awk -F= '\''{ value=$2; gsub(/^\"|\"$/, \"\", value); printf \"%s=<set:%d chars>\\n\", $1, length(value) }'\'' /etc/burn-dragon-p2p/bootstrap.env; else echo missing; fi",
                "echo \"--- /etc/burn-dragon-p2p/bootstrap auth connector ---\"",
                "python3 -c '\''from pathlib import Path; import json; p=Path(\"/etc/burn-dragon-p2p/bootstrap.json\"); cfg=json.loads(p.read_text()) if p.exists() else {}; connector=((cfg.get(\"auth\") or {}).get(\"connector\") or {}); redacted=dict(connector); [redacted.__setitem__(key, \"<redacted>\") for key in (\"client_secret\",) if key in redacted]; print(json.dumps(redacted, indent=2, sort_keys=True))'\'' || true",
                "echo \"--- /etc/caddy/Caddyfile ---\"",
                "sed -n \"1,200p\" /etc/caddy/Caddyfile || true",
                "echo \"--- /etc/systemd/system/burn-p2p-bootstrap.service ---\"",
                "sed -n \"1,200p\" /etc/systemd/system/burn-p2p-bootstrap.service || true",
                "echo \"--- bootstrap binary paths ---\"",
                "ls -l /usr/local/bin/burn-p2p-bootstrap /root/.cargo/bin/burn-p2p-bootstrap || true",
                "readlink -f /usr/local/bin/burn-p2p-bootstrap || true",
                "echo \"--- bootstrap binary stat ---\"",
                "stat /usr/local/bin/burn-p2p-bootstrap /root/.cargo/bin/burn-p2p-bootstrap || true",
                "echo \"--- bootstrap binary file ---\"",
                "file /usr/local/bin/burn-p2p-bootstrap /root/.cargo/bin/burn-p2p-bootstrap || true",
                "echo \"--- bootstrap binary ldd ---\"",
                "ldd /usr/local/bin/burn-p2p-bootstrap || true",
                "echo \"--- bootstrap binary version ---\"",
                "/usr/local/bin/burn-p2p-bootstrap --version || true",
                "echo \"--- caddy adapt ---\"",
                "caddy adapt --config /etc/caddy/Caddyfile --pretty || true",
                "systemctl status caddy --no-pager || true",
                "systemctl status burn-p2p-bootstrap --no-pager || true",
                "journalctl -u caddy -u burn-p2p-bootstrap --no-pager -n 200 || true",
                "tail -n 200 /var/log/cloud-init-output.log || true",
                "ss -ltnup || true",
                "echo \"--- localhost /login/github ---\"",
                "curl -fsS -X POST http://127.0.0.1:8787/login/github -H \"content-type: application/json\" --data \"{\\\"network_id\\\":\\\"burn-dragon-mainnet\\\",\\\"principal_hint\\\":null,\\\"requested_scopes\\\":[\\\"Connect\\\"]}\" || true",
                "curl -v http://127.0.0.1/ || true",
                "curl -vkI https://127.0.0.1/portal/snapshot || true",
                "curl -v http://127.0.0.1:4000/portal/snapshot || true"
              ]' \
              --query 'Command.CommandId' \
              --output text)"

            for attempt in $(seq 1 30); do
              invocation_status="$(aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$command_id" \
                --instance-id "$instance_id" \
                --query 'Status' \
                --output text 2>/dev/null || true)"
              case "$invocation_status" in
                Success|Cancelled|TimedOut|Failed|Cancelling)
                  break
                  ;;
              esac
              sleep 5
            done

            echo "ssm command output"
            aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "$instance_id" \
              --output json || true
          fi
