name: Live Native Training Canary
run-name: Live Native Training Canary ${{ github.event.inputs.agent_task_id || github.run_id }}

on:
  workflow_dispatch:
    inputs:
      agent_task_id:
        description: Optional local agent task id used to discover this run without branch/time polling.
        required: false
        default: ""
        type: string
      environment:
        description: GitHub environment suffix to run against
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      edge_base_url:
        description: Edge base URL
        required: false
        default: https://edge.dragon.aberration.technology
      experiment_kind:
        description: Native experiment kind
        required: false
        default: nca
      experiment_id:
        description: Experiment id to assert canonical progress against
        required: false
        default: nca-prepretraining
      backend:
        description: Native trainer backend
        required: false
        default: cpu
        type: choice
        options:
          - cpu
          - wgpu
      principal_id:
        description: Admitted trainer principal id for the canary
        required: false
        default: native-canary-mainnet-nca
      windows:
        description: Number of canonical windows to publish and observe
        required: false
        default: "1"
      settle_diffusion:
        description: Run bounded diffusion promotion passes from the trainer after publishing
        required: false
        default: "true"
      diffusion_settle_passes:
        description: Initial diffusion promotion passes to run after each window
        required: false
        default: "2"
      serve_after_publish_secs:
        description: Seconds the trainer should stay online after publishing so peers can fetch artifacts
        required: false
        default: "45"
      command_timeout_secs:
        description: Per native command timeout
        required: false
        default: "900"
      canonical_timeout_secs:
        description: Seconds to wait for canonical head advancement after a native training window
        required: false
        default: "480"
      p2p_timeout_secs:
        description: Seconds to wait for the canonical head to be visible through the P2P bootstrap snapshot
        required: false
        default: "300"
      http_attempts:
        description: HTTP fetch attempts for transient edge recovery during deploy or post-restart canaries
        required: false
        default: "15"
      mirror_live_head_to_edge:
        description: Mirror each published canary head into the edge artifact provider before the canary exits
        required: false
        default: "true"
      require_edge_head_provider:
        description: Require the canonical head to be restorable from the connected edge provider
        required: false
        default: "true"
      repair_current_head_to_visible_root:
        description: Reset the current directory head to the latest visible root before training. Use only to unwind a non-durable live head.
        required: false
        default: "false"
      start_validator:
        description: Start a colocated validator during the canary. Leave disabled for the standard trainer-only diffusion deployment.
        required: false
        default: "true"
      training_batch_size:
        description: Native canary batch size override. This is a resource knob and does not alter model compatibility.
        required: false
        default: "1"
      training_max_iters:
        description: Native canary max iteration override. This bounds hosted-runner cost without changing the network profile.
        required: false
        default: "2"
      evaluation_max_batches:
        description: Native canary evaluation batch cap.
        required: false
        default: "1"
      require_canonical_loss_non_regression:
        description: Fail if canonical loss rises across the canary window.
        required: false
        default: "false"
  schedule:
    - cron: "43 */6 * * *"

concurrency:
  group: live-native-training-canary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: burn-dragon-p2p-${{ github.event.inputs.environment || 'production' }}
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      BURN_DRAGON_NATIVE_CANARY_EDGE_BASE_URL: ${{ github.event.inputs.edge_base_url || 'https://edge.dragon.aberration.technology' }}
      BURN_DRAGON_NATIVE_CANARY_EXPERIMENT_KIND: ${{ github.event.inputs.experiment_kind || 'nca' }}
      BURN_DRAGON_NATIVE_CANARY_EXPERIMENT_ID: ${{ github.event.inputs.experiment_id || 'nca-prepretraining' }}
      BURN_DRAGON_NATIVE_CANARY_BACKEND: ${{ github.event.inputs.backend || 'cpu' }}
      BURN_DRAGON_NATIVE_CANARY_PRINCIPAL_ID: ${{ github.event.inputs.principal_id || 'native-canary-mainnet-nca' }}
      BURN_DRAGON_NATIVE_CANARY_CALLBACK_TOKEN: ${{ secrets.BURN_DRAGON_P2P_BROWSER_CANARY_CALLBACK_TOKEN }}
      BURN_DRAGON_NATIVE_CANARY_WINDOWS: ${{ github.event.inputs.windows || '1' }}
      BURN_DRAGON_NATIVE_CANARY_HEAD_SYNC_TIMEOUT_SECS: "300"
      BURN_DRAGON_NATIVE_CANARY_SETTLE_DIFFUSION: ${{ github.event.inputs.settle_diffusion || 'true' }}
      BURN_DRAGON_NATIVE_CANARY_DIFFUSION_SETTLE_PASSES: ${{ github.event.inputs.diffusion_settle_passes || '2' }}
      BURN_DRAGON_NATIVE_CANARY_SERVE_AFTER_PUBLISH_SECS: ${{ github.event.inputs.serve_after_publish_secs || '45' }}
      BURN_DRAGON_NATIVE_CANARY_COMMAND_TIMEOUT_SECS: ${{ github.event.inputs.command_timeout_secs || '1200' }}
      BURN_DRAGON_NATIVE_CANARY_START_VALIDATOR: ${{ github.event.inputs.start_validator || 'true' }}
      BURN_DRAGON_NATIVE_CANARY_TRAINING_BATCH_SIZE: ${{ github.event.inputs.training_batch_size || '1' }}
      BURN_DRAGON_NATIVE_CANARY_TRAINING_MAX_ITERS: ${{ github.event.inputs.training_max_iters || '2' }}
      BURN_DRAGON_NATIVE_CANARY_EVALUATION_MAX_BATCHES: ${{ github.event.inputs.evaluation_max_batches || '1' }}
      BURN_DRAGON_NATIVE_CANARY_REQUIRE_CANONICAL_LOSS_NON_REGRESSION: ${{ github.event.inputs.require_canonical_loss_non_regression || 'false' }}
      BURN_DRAGON_NATIVE_CANARY_CANONICAL_TIMEOUT_SECS: ${{ github.event.inputs.canonical_timeout_secs || '480' }}
      BURN_DRAGON_NATIVE_CANARY_P2P_TIMEOUT_SECS: ${{ github.event.inputs.p2p_timeout_secs || '300' }}
      BURN_DRAGON_NATIVE_CANARY_HTTP_ATTEMPTS: ${{ github.event.inputs.http_attempts || '15' }}
      BURN_DRAGON_NATIVE_CANARY_MIRROR_LIVE_HEAD_TO_EDGE: ${{ github.event.inputs.mirror_live_head_to_edge || 'true' }}
      BURN_DRAGON_NATIVE_CANARY_REQUIRE_EDGE_HEAD_PROVIDER: ${{ github.event.inputs.require_edge_head_provider || 'true' }}
      BURN_DRAGON_NATIVE_CANARY_REPAIR_CURRENT_HEAD_TO_VISIBLE_ROOT: ${{ github.event.inputs.repair_current_head_to_visible_root || 'false' }}
      BURN_DRAGON_NATIVE_CANARY_ARTIFACT_DIR: /tmp/burn-dragon-live-native-training-canary
      BURN_DRAGON_NATIVE_CANARY_OUTPUT_JSON: /tmp/burn-dragon-live-native-training-canary/native-canary-summary.json
      BURN_DRAGON_NATIVE_CANARY_BINARY: target/debug/burn_dragon_p2p_native
      BURN_P2P_ARTIFACT_TRACE: "1"
      BURN_P2P_DIFFUSION_TRACE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: checkout burn_p2p sibling
        uses: actions/checkout@v4
        with:
          repository: aberration-technology/burn_p2p
          ref: 8d289c995ebf3904a49c0c5cc08bbb5dacd18858
          path: burn_p2p-sibling
      - name: link burn_p2p path dependency
        shell: bash
        run: |
          set -euo pipefail
          target="${GITHUB_WORKSPACE}/../burn_p2p"
          rm -rf "$target"
          ln -s "${GITHUB_WORKSPACE}/burn_p2p-sibling" "$target"

      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: build native canary tools
        run: |
          cargo build --locked -p burn_dragon_p2p --bin burn_dragon_p2p_native --no-default-features --features native
          cargo build --locked -p xtask

      - name: run live native training canary
        id: live_native_training_canary
        run: target/debug/xtask run-live-native-training-canary

      - name: summarize live native training canary
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          report_path="${BURN_DRAGON_NATIVE_CANARY_OUTPUT_JSON}"
          if [ ! -f "$report_path" ]; then
            exit 0
          fi
          target/debug/xtask summarize-live-native-training-canary "$report_path" >>"$GITHUB_STEP_SUMMARY"

      - name: upload live native training canary artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: burn-dragon-live-native-training-canary
          path: |
            ${{ env.BURN_DRAGON_NATIVE_CANARY_ARTIFACT_DIR }}
            !${{ env.BURN_DRAGON_NATIVE_CANARY_ARTIFACT_DIR }}/**/*auth-bundle*.json
            !${{ env.BURN_DRAGON_NATIVE_CANARY_ARTIFACT_DIR }}/**/*-storage/**
            !${{ env.BURN_DRAGON_NATIVE_CANARY_ARTIFACT_DIR }}/**/native-github-auth.json
            !${{ env.BURN_DRAGON_NATIVE_CANARY_ARTIFACT_DIR }}/enroll-*.log
          if-no-files-found: ignore
