name: inspect burn_dragon_p2p aws

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment suffix. Example: `production` for the `burn-dragon-p2p-production` GitHub Environment."
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      terraform_workspace:
        description: "Terraform workspace name. Example: `mainnet` or `staging`."
        required: true
        default: mainnet
        type: string
      cleanup_legacy_bootstrap_instances:
        description: "Terminate non-canonical bootstrap instances for this deployment environment before inspection. Use this only for one-time cleanup of legacy stack-name drift."
        required: true
        default: false
        type: boolean
      repair_edge_tls:
        description: "Remove the dead Buypass ACME pin from the live bootstrap Caddyfile before inspection and restart Caddy."
        required: true
        default: false
        type: boolean
      repair_head_mirror_seed_urls:
        description: "Rewrite the live bootstrap head-mirror seed URLs to the instance private bootstrap address and restart the head mirror."
        required: true
        default: false
        type: boolean
      restart_edge_services:
        description: "Restart Caddy and burn-p2p-bootstrap over SSM before inspection. Use this for fast recovery when the edge is unhealthy."
        required: true
        default: false
        type: boolean
      run_bootstrap_start_probe:
        description: "Stop the flapping bootstrap service, run it once in the foreground to capture startup stderr, then restart it."
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    environment: burn-dragon-p2p-${{ github.event.inputs.environment }}
    steps:
      - name: resolve aws session settings
        shell: bash
        env:
          AWS_REGION_VAR: ${{ vars.BURN_DRAGON_P2P_AWS_REGION }}
          AWS_ROLE_ARN_VAR: ${{ vars.BURN_DRAGON_P2P_AWS_ROLE_ARN }}
        run: |
          set -euo pipefail
          : "${AWS_REGION_VAR:?missing BURN_DRAGON_P2P_AWS_REGION}"
          : "${AWS_ROLE_ARN_VAR:?missing BURN_DRAGON_P2P_AWS_ROLE_ARN}"
          {
            echo "AWS_REGION=$AWS_REGION_VAR"
            echo "AWS_ROLE_ARN=$AWS_ROLE_ARN_VAR"
            echo "AWS_ACCOUNT_ID=$(cut -d: -f5 <<<"$AWS_ROLE_ARN_VAR")"
          } >>"$GITHUB_ENV"

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: burn-dragon-inspect-${{ github.run_id }}
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: verify aws account
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          if [ "$account_id" != "$AWS_ACCOUNT_ID" ]; then
            echo "assumed aws account mismatch: expected $AWS_ACCOUNT_ID got $account_id" >&2
            exit 1
          fi

      - name: checkout
        uses: actions/checkout@v4
      - name: checkout burn_p2p sibling
        uses: actions/checkout@v4
        with:
          repository: aberration-technology/burn_p2p
          ref: 5f14d0ebb028fd76878cb2f8ed4fee0c4b3536a8
          path: burn_p2p-sibling
      - name: link burn_p2p path dependency
        shell: bash
        run: |
          set -euo pipefail
          target="${GITHUB_WORKSPACE}/../burn_p2p"
          rm -rf "$target"
          ln -s "${GITHUB_WORKSPACE}/burn_p2p-sibling" "$target"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: inspect bootstrap instance
        id: inspect
        shell: bash
        env:
          STACK_NAME_VAR: ${{ vars.BURN_DRAGON_P2P_STACK_NAME }}
          AWS_REGION: ${{ vars.BURN_DRAGON_P2P_AWS_REGION }}
          TF_WORKSPACE_NAME: ${{ github.event.inputs.terraform_workspace }}
          EDGE_DOMAIN_NAME: ${{ vars.BURN_DRAGON_P2P_EDGE_DOMAIN_NAME }}
          ROUTE53_ZONE_NAME: ${{ vars.BURN_DRAGON_P2P_ROUTE53_ZONE_NAME }}
          ACME_CONTACT_EMAIL: ${{ vars.BURN_DRAGON_P2P_ACME_CONTACT_EMAIL }}
          DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}
          CLEANUP_LEGACY_BOOTSTRAP_INSTANCES: ${{ github.event.inputs.cleanup_legacy_bootstrap_instances }}
          REPAIR_EDGE_TLS: ${{ github.event.inputs.repair_edge_tls }}
          REPAIR_HEAD_MIRROR_SEED_URLS: ${{ github.event.inputs.repair_head_mirror_seed_urls }}
          RESTART_EDGE_SERVICES: ${{ github.event.inputs.restart_edge_services }}
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP}/burn-dragon-inspect"
          mkdir -p "$artifact_dir"
          echo "artifact_dir=$artifact_dir" >>"$GITHUB_OUTPUT"

          canonical_stack_name="burn-dragon-p2p-${DEPLOY_ENVIRONMENT}"
          if [ -n "${STACK_NAME_VAR:-}" ] && [ "$STACK_NAME_VAR" != "$canonical_stack_name" ]; then
            echo "ignoring legacy stack name override '$STACK_NAME_VAR' and inspecting canonical stack '$canonical_stack_name'" >&2
          fi

          instance_name="${canonical_stack_name}-bootstrap"
          bootstrap_rows="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Application,Values=burn-dragon-p2p" \
              "Name=tag:Environment,Values=${DEPLOY_ENVIRONMENT}" \
              "Name=tag:Name,Values=*bootstrap*" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --output json | jq -r '
              [
                .Reservations[].Instances[]
                | {
                    name: ([.Tags[]? | select(.Key == "Name") | .Value][0] // ""),
                    id: .InstanceId,
                    state: .State.Name
                  }
                | select(.name != "")
                | [.name, .id, .state]
                | @tsv
              ] | .[]
            ')"

          if [ -n "$bootstrap_rows" ]; then
            echo "bootstrap instances for Application=burn-dragon-p2p Environment=${DEPLOY_ENVIRONMENT}:"
            printf '%s\n' "$bootstrap_rows" | awk -F '\t' '{printf "  - name=%s id=%s state=%s\n", $1, $2, $3}'
          fi
          printf '%s\n' "$bootstrap_rows" >"$artifact_dir/bootstrap-instances.tsv"

          legacy_instance_ids="$(printf '%s\n' "$bootstrap_rows" | awk -F '\t' -v expected="$instance_name" '$1 != "" && $1 != expected {print $2}')"
          if [ -n "$legacy_instance_ids" ] && [ "${CLEANUP_LEGACY_BOOTSTRAP_INSTANCES}" = "true" ]; then
            echo "terminating legacy bootstrap instances:"
            printf '%s\n' "$legacy_instance_ids" | sed 's/^/  - /'
            aws ec2 terminate-instances \
              --region "$AWS_REGION" \
              --instance-ids $legacy_instance_ids \
              >/dev/null
          fi

          instance_id="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Name,Values=${instance_name}" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)"

          if [ -z "$instance_id" ] || [ "$instance_id" = "None" ]; then
            echo "bootstrap instance not found for tag Name=${instance_name}" >&2
            exit 1
          fi
          echo "instance_id=$instance_id" >>"$GITHUB_OUTPUT"

          legacy_stack_name="dragon-p2p-prod"
          printf '%s\n' "resource inventory"
          for stack in "$canonical_stack_name" "$legacy_stack_name"; do
            echo "::group::stack inventory ${stack}"

            echo "ec2 instances"
            aws ec2 describe-instances \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
              --query 'Reservations[].Instances[].{name: Tags[?Key==`Name`]|[0].Value,id: InstanceId,state: State.Name}' \
              --output json | tee "$artifact_dir/${stack}-ec2-instances.json"

            echo "elastic ips"
            aws ec2 describe-addresses \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'Addresses[].{name: Tags[?Key==`Name`]|[0].Value,allocation_id: AllocationId,public_ip: PublicIp}' \
              --output json | tee "$artifact_dir/${stack}-elastic-ips.json"

            echo "vpcs"
            aws ec2 describe-vpcs \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'Vpcs[].{name: Tags[?Key==`Name`]|[0].Value,id: VpcId}' \
              --output json | tee "$artifact_dir/${stack}-vpcs.json"

            echo "subnets"
            aws ec2 describe-subnets \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'Subnets[].{name: Tags[?Key==`Name`]|[0].Value,id: SubnetId}' \
              --output json | tee "$artifact_dir/${stack}-subnets.json"

            echo "internet gateways"
            aws ec2 describe-internet-gateways \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'InternetGateways[].{name: Tags[?Key==`Name`]|[0].Value,id: InternetGatewayId}' \
              --output json | tee "$artifact_dir/${stack}-internet-gateways.json"

            echo "route tables"
            aws ec2 describe-route-tables \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'RouteTables[].{name: Tags[?Key==`Name`]|[0].Value,id: RouteTableId}' \
              --output json | tee "$artifact_dir/${stack}-route-tables.json"

            echo "security groups"
            aws ec2 describe-security-groups \
              --region "$AWS_REGION" \
              --output json | jq --arg stack "$stack" '
                [
                  .SecurityGroups[]
                  | {
                      name: ([.Tags[]? | select(.Key == "Name") | .Value][0] // .GroupName),
                      id: .GroupId
                    }
                  | select(.name | contains($stack))
                ]
              ' | tee "$artifact_dir/${stack}-security-groups.json"

            echo "volumes"
            aws ec2 describe-volumes \
              --region "$AWS_REGION" \
              --filters "Name=tag:Name,Values=${stack}*" \
              --query 'Volumes[].{name: Tags[?Key==`Name`]|[0].Value,id: VolumeId,state: State}' \
              --output json | tee "$artifact_dir/${stack}-volumes.json"

            echo "iam roles"
            aws iam list-roles \
              --query "Roles[?contains(RoleName, \`${stack}\`)].RoleName" \
              --output json | tee "$artifact_dir/${stack}-iam-roles.json"

            echo "instance profiles"
            aws iam list-instance-profiles \
              --query "InstanceProfiles[?contains(InstanceProfileName, \`${stack}\`)].InstanceProfileName" \
              --output json | tee "$artifact_dir/${stack}-instance-profiles.json"

            echo "s3 buckets"
            aws s3api list-buckets \
              --query "Buckets[?contains(Name, \`${stack}\`)].Name" \
              --output json | tee "$artifact_dir/${stack}-s3-buckets.json"

            echo "::endgroup::"
          done

          echo "::group::shared dataset and dns inventory"
          echo "cloudfront distributions for dataset domain"
          aws cloudfront list-distributions \
            --output json | jq '
              [
                .DistributionList.Items[]
                | {
                    id: .Id,
                    aliases: (.Aliases.Items // []),
                    comment: .Comment,
                    domain_name: .DomainName
                  }
                | select((.aliases | index("datasets.dragon.aberration.technology")) != null)
              ]
            ' | tee "$artifact_dir/shared-cloudfront-distributions.json"

          echo "acm certificates for dataset domain"
          aws acm list-certificates \
            --region us-east-1 \
            --certificate-statuses PENDING_VALIDATION ISSUED INACTIVE EXPIRED VALIDATION_TIMED_OUT REVOKED FAILED \
            --query "CertificateSummaryList[?DomainName==\`datasets.dragon.aberration.technology\` || DomainName==\`dragon.aberration.technology\`].{domain: DomainName, arn: CertificateArn}" \
            --output json | tee "$artifact_dir/shared-acm-certificates.json"

          echo "route53 records"
          hosted_zone_id="$(aws route53 list-hosted-zones-by-name --dns-name aberration.technology --query 'HostedZones[0].Id' --output text | sed 's|/hostedzone/||')"
          aws route53 list-resource-record-sets \
            --hosted-zone-id "$hosted_zone_id" \
            --query "ResourceRecordSets[?Name==\`edge.dragon.aberration.technology.\` || Name==\`dragon.aberration.technology.\` || Name==\`datasets.dragon.aberration.technology.\`].[Name,Type,AliasTarget.DNSName,ResourceRecords]" \
            --output json | tee "$artifact_dir/shared-route53-records.json"
          echo "::endgroup::"

          echo "instance_id=${instance_id}"
          echo "edge_domain_name=${EDGE_DOMAIN_NAME}"
          echo "terraform_workspace=${TF_WORKSPACE_NAME}"

          echo "describe instances"
          aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --instance-ids "$instance_id" \
            --output json | tee "$artifact_dir/instance-describe.json"

          bootstrap_private_ip="$(jq -r '.Reservations[0].Instances[0].PrivateIpAddress // ""' "$artifact_dir/instance-describe.json")"
          echo "bootstrap_private_ip=${bootstrap_private_ip}"
          echo "bootstrap_private_ip=${bootstrap_private_ip}" >>"$GITHUB_OUTPUT"

          echo "instance status"
          aws ec2 describe-instance-status \
            --region "$AWS_REGION" \
            --include-all-instances \
            --instance-ids "$instance_id" \
            --output json | tee "$artifact_dir/instance-status.json" || true

          echo "console output"
          aws ec2 get-console-output \
            --region "$AWS_REGION" \
            --instance-id "$instance_id" \
            --latest \
            --output text | tee "$artifact_dir/console-output.txt" || true

          echo "ssm registration"
          ssm_status="$(aws ssm describe-instance-information \
            --region "$AWS_REGION" \
            --filters "Key=InstanceIds,Values=$instance_id" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text 2>/dev/null || true)"
          echo "ssm ping status: ${ssm_status:-missing}"
          echo "ssm_status=${ssm_status:-missing}" >>"$GITHUB_OUTPUT"

          if [ "${ssm_status:-}" = "Online" ]; then
            if [ "${RESTART_EDGE_SERVICES}" = "true" ]; then
              restart_command_id="$(aws ssm send-command \
                --region "$AWS_REGION" \
                --instance-ids "$instance_id" \
                --document-name AWS-RunShellScript \
                --comment "restart burn_dragon bootstrap edge services" \
                --parameters 'commands=[
                  "set -eu",
                  "systemctl daemon-reload",
                  "systemctl enable caddy",
                  "systemctl restart caddy",
                  "systemctl reset-failed burn-p2p-bootstrap || true",
                  "systemctl enable burn-p2p-bootstrap",
                  "systemctl restart burn-p2p-bootstrap",
                  "systemctl is-active caddy",
                  "systemctl is-active burn-p2p-bootstrap",
                  "curl -fsS http://127.0.0.1:8787/portal/snapshot >/dev/null"
                ]' \
                --query 'Command.CommandId' \
                --output text)"

              for attempt in $(seq 1 30); do
                restart_invocation_status="$(aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$restart_command_id" \
                  --instance-id "$instance_id" \
                  --query 'Status' \
                  --output text 2>/dev/null || true)"
                case "$restart_invocation_status" in
                  Success|Cancelled|TimedOut|Failed|Cancelling)
                    break
                    ;;
                esac
                sleep 5
              done

              echo "restart edge services ssm command output"
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$restart_command_id" \
                --instance-id "$instance_id" \
                --output json | tee "$artifact_dir/restart-edge-services-command.json" || true
              if [ "${restart_invocation_status:-}" != "Success" ]; then
                echo "restart edge services SSM command did not succeed: ${restart_invocation_status:-missing}" >&2
                exit 1
              fi
            fi

            if [ "${REPAIR_EDGE_TLS}" = "true" ]; then
              repair_command_id="$(aws ssm send-command \
                --region "$AWS_REGION" \
                --instance-ids "$instance_id" \
                --document-name AWS-RunShellScript \
                --comment "repair burn_dragon bootstrap edge tls issuer" \
                --parameters 'commands=[
                  "set -eu",
                  "python3 - <<'\''PY'\''\nfrom pathlib import Path\np = Path(\"/etc/caddy/Caddyfile\")\ntext = p.read_text()\nold = \"    tls {\\n        ca https://api.buypass.com/acme/directory\\n    }\\n\\n\"\nif old in text:\n    p.write_text(text.replace(old, \"\"))\nPY",
                  "systemctl restart caddy",
                  "systemctl status caddy --no-pager || true",
                  "curl -vkI https://127.0.0.1/portal/snapshot || true"
                ]' \
                --query 'Command.CommandId' \
                --output text)"

              for attempt in $(seq 1 30); do
                repair_invocation_status="$(aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$repair_command_id" \
                  --instance-id "$instance_id" \
                  --query 'Status' \
                  --output text 2>/dev/null || true)"
                case "$repair_invocation_status" in
                  Success|Cancelled|TimedOut|Failed|Cancelling)
                    break
                    ;;
                esac
                sleep 5
              done

              echo "repair tls ssm command output"
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$repair_command_id" \
                --instance-id "$instance_id" \
                --output json | tee "$artifact_dir/repair-edge-tls-command.json" || true
              if [ "${repair_invocation_status:-}" != "Success" ]; then
                echo "repair edge TLS SSM command did not succeed: ${repair_invocation_status:-missing}" >&2
                exit 1
              fi
            fi

            if [ "${REPAIR_HEAD_MIRROR_SEED_URLS}" = "true" ]; then
              if [ -z "${bootstrap_private_ip:-}" ]; then
                echo "bootstrap private ip is missing; cannot repair head mirror seed urls" >&2
                exit 1
              fi

              BOOTSTRAP_PRIVATE_IP="$bootstrap_private_ip" \
                cargo run -p xtask -- render-head-mirror-seed-repair-commands \
                > /tmp/repair-head-mirror-seed-params.json

              repair_head_mirror_command_id="$(aws ssm send-command \
                --region "$AWS_REGION" \
                --instance-ids "$instance_id" \
                --document-name AWS-RunShellScript \
                --comment "repair burn_dragon bootstrap head mirror seed urls" \
                --parameters file:///tmp/repair-head-mirror-seed-params.json \
                --query 'Command.CommandId' \
                --output text)"

              for attempt in $(seq 1 30); do
                repair_head_mirror_invocation_status="$(aws ssm get-command-invocation \
                  --region "$AWS_REGION" \
                  --command-id "$repair_head_mirror_command_id" \
                  --instance-id "$instance_id" \
                  --query 'Status' \
                  --output text 2>/dev/null || true)"
                case "$repair_head_mirror_invocation_status" in
                  Success|Cancelled|TimedOut|Failed|Cancelling)
                    break
                    ;;
                esac
                sleep 5
              done

              echo "repair head mirror seed urls ssm command output"
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$repair_head_mirror_command_id" \
                --instance-id "$instance_id" \
                --output json | tee "$artifact_dir/repair-head-mirror-seed-urls-command.json" || true
              if [ "${repair_head_mirror_invocation_status:-}" != "Success" ]; then
                echo "repair head mirror seed URLs SSM command did not succeed: ${repair_head_mirror_invocation_status:-missing}" >&2
                exit 1
              fi
            fi

            BURN_DRAGON_INSPECT_RUN_BOOTSTRAP_START_PROBE="${{ github.event.inputs.run_bootstrap_start_probe }}" \
              cargo run -p xtask -- write-bootstrap-inspect-params /tmp/burn-dragon-inspect-params.json

            command_id="$(aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$instance_id" \
              --document-name AWS-RunShellScript \
              --comment "inspect burn_dragon bootstrap host" \
              --parameters file:///tmp/burn-dragon-inspect-params.json \
              --query 'Command.CommandId' \
              --output text)"

            for attempt in $(seq 1 30); do
              invocation_status="$(aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$command_id" \
                --instance-id "$instance_id" \
                --query 'Status' \
                --output text 2>/dev/null || true)"
              case "$invocation_status" in
                Success|Cancelled|TimedOut|Failed|Cancelling)
                  break
                  ;;
              esac
              sleep 5
            done

            echo "ssm command output"
            aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "$instance_id" \
              --output json | tee "$artifact_dir/inspect-command-output.json" || true
            if [ "${invocation_status:-}" != "Success" ]; then
              echo "bootstrap inspection SSM command did not succeed: ${invocation_status:-missing}" >&2
              exit 1
            fi

            cargo run -p xtask -- extract-deployment-diagnostics "$artifact_dir/inspect-command-output.json" "$artifact_dir/bootstrap-deployment-diagnostics.json"
          fi

          printf '%s\n' "${ssm_status:-missing}" >"$artifact_dir/ssm-status.txt"

          cargo run -p xtask -- write-inspection-summary "$artifact_dir"

      - name: summarize inspection
        if: ${{ always() && steps.inspect.outputs.artifact_dir != '' }}
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${{ steps.inspect.outputs.artifact_dir }}"
          summary_path="$artifact_dir/inspection-summary.json"
          if [ ! -f "$summary_path" ]; then
            exit 0
          fi

          cargo run -p xtask -- summarize-inspection "$summary_path" >>"$GITHUB_STEP_SUMMARY"

      - name: upload inspection artifact bundle
        if: ${{ always() && steps.inspect.outputs.artifact_dir != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: burn-dragon-bootstrap-inspection
          path: ${{ steps.inspect.outputs.artifact_dir }}
          if-no-files-found: ignore
