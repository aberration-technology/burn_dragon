name: deploy github pages
run-name: deploy github pages ${{ github.event.inputs.agent_task_id || github.run_id }}

on:
  workflow_dispatch:
    inputs:
      agent_task_id:
        description: Optional local agent task id used to discover this run without branch/time polling.
        required: false
        default: ""
        type: string
      environment:
        description: GitHub environment suffix to deploy
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      edge_base_url:
        description: Optional explicit bootstrap API/auth edge URL baked into the browser shell. Leave empty to derive it from environment variables.
        required: false
        default: ""
        type: string
      seed_node_urls:
        description: Optional comma-separated browser-capable bootstrap multiaddrs baked into the browser shell. Leave empty to derive browser-capable defaults from the resolved edge host.
        required: false
        default: ""
        type: string
      selected_experiment_id:
        description: Default experiment id selected on load.
        required: false
        default: nca-prepretraining
        type: string
      selected_revision_id:
        description: Default revision id selected on load.
        required: false
        default: nca-r1
        type: string
      canary_principal_id:
        description: Optional admitted principal id for the post-deploy live browser canary. Leave empty to use the environment default.
        required: false
        default: ""
        type: string
      require_edge_auth:
        description: Require an authenticated edge session before joining from the published browser shell.
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-dragon-pages-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: burn-dragon-p2p-${{ github.event.inputs.environment }}
    outputs:
      edge_base_url: ${{ steps.resolve_browser_shell_settings.outputs.edge_base_url }}
      site_base_url: ${{ steps.resolve_browser_shell_settings.outputs.browser_app_base_url }}
      selected_experiment_id: ${{ steps.resolve_browser_shell_settings.outputs.selected_experiment_id }}
      selected_revision_id: ${{ steps.resolve_browser_shell_settings.outputs.selected_revision_id }}
      canary_principal_id: ${{ steps.resolve_browser_shell_settings.outputs.canary_principal_id }}
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: checkout burn_p2p sibling
        uses: actions/checkout@v4
        with:
          repository: aberration-technology/burn_p2p
          ref: 8d289c995ebf3904a49c0c5cc08bbb5dacd18858
          path: burn_p2p-sibling
      - name: link burn_p2p path dependency
        shell: bash
        run: |
          set -euo pipefail
          target="${GITHUB_WORKSPACE}/../burn_p2p"
          rm -rf "$target"
          ln -s "${GITHUB_WORKSPACE}/burn_p2p-sibling" "$target"

      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: cache rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: configure pages
        uses: actions/configure-pages@v5

      - name: resolve browser shell settings
        id: resolve_browser_shell_settings
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p xtask -- resolve-pages-deploy-settings-outputs \
            --environment "${{ github.event.inputs.environment }}" \
            --edge-base-url-input "${{ github.event.inputs.edge_base_url }}" \
            --edge-base-url-from-env "${{ vars.BURN_DRAGON_P2P_PAGES_EDGE_BASE_URL }}" \
            --seed-node-urls-input "${{ github.event.inputs.seed_node_urls }}" \
            --seed-node-urls-from-env "${{ vars.BURN_DRAGON_P2P_PAGES_SEED_NODE_URLS }}" \
            --selected-experiment-id-input "${{ github.event.inputs.selected_experiment_id }}" \
            --selected-experiment-id-from-env "${{ vars.BURN_DRAGON_P2P_PAGES_SELECTED_EXPERIMENT_ID }}" \
            --selected-revision-id-input "${{ github.event.inputs.selected_revision_id }}" \
            --selected-revision-id-from-env "${{ vars.BURN_DRAGON_P2P_PAGES_SELECTED_REVISION_ID }}" \
            --canary-principal-id-input "${{ github.event.inputs.canary_principal_id }}" \
            --canary-principal-id-from-env "${{ vars.BURN_DRAGON_P2P_BROWSER_CANARY_PRINCIPAL_ID }}" \
            --browser-app-base-url-from-env "${{ vars.BURN_DRAGON_P2P_BROWSER_APP_BASE_URL }}" \
            --edge-domain-name-from-env "${{ vars.BURN_DRAGON_P2P_EDGE_DOMAIN_NAME }}"
          echo "REQUIRE_EDGE_AUTH=${{ github.event.inputs.require_edge_auth }}" >>"$GITHUB_ENV"

      - name: build browser site artifact
        shell: bash
        run: |
          set -euo pipefail
          args=(run -p xtask -- build-browser-site --out-dir target/browser-site "--require-edge-auth=$REQUIRE_EDGE_AUTH")
          if [ -n "$EDGE_BASE_URL" ]; then
            args+=(--edge-url "$EDGE_BASE_URL")
          fi
          if [ -n "$SEED_NODE_URLS" ]; then
            args+=(--seed-node-url "$SEED_NODE_URLS")
          fi
          if [ -n "$SELECTED_EXPERIMENT_ID" ]; then
            args+=(--selected-experiment-id "$SELECTED_EXPERIMENT_ID")
          fi
          if [ -n "$SELECTED_REVISION_ID" ]; then
            args+=(--selected-revision-id "$SELECTED_REVISION_ID")
          fi
          cargo "${args[@]}"

      - name: run predeploy browser training canary
        id: predeploy_browser_canary
        shell: bash
        env:
          BURN_DRAGON_BROWSER_CANARY_SITE_BASE_URL: ${{ steps.resolve_browser_shell_settings.outputs.browser_app_base_url }}
          BURN_DRAGON_BROWSER_CANARY_EDGE_BASE_URL: ${{ steps.resolve_browser_shell_settings.outputs.edge_base_url }}
          BURN_DRAGON_BROWSER_CANARY_PRINCIPAL_ID: ${{ steps.resolve_browser_shell_settings.outputs.canary_principal_id }}
          BURN_DRAGON_BROWSER_CANARY_CALLBACK_TOKEN: ${{ secrets.BURN_DRAGON_P2P_BROWSER_CANARY_CALLBACK_TOKEN }}
          BURN_DRAGON_BROWSER_CANARY_EXPERIMENT_ID: ${{ steps.resolve_browser_shell_settings.outputs.selected_experiment_id }}
          BURN_DRAGON_BROWSER_CANARY_MIN_ACCEPTED_RECEIPTS: "2"
          BURN_DRAGON_BROWSER_CANARY_TRAIN_TIMEOUT_MS: "300000"
          BURN_DRAGON_BROWSER_CANARY_ARTIFACT_DIR: ${{ runner.temp }}/burn-dragon-pages-predeploy-canary
          BURN_DRAGON_BROWSER_CANARY_OUTPUT_JSON: ${{ runner.temp }}/burn-dragon-pages-predeploy-canary/canary-summary.json
          BURN_DRAGON_PAGES_PREDEPLOY_SITE_DIR: target/browser-site
        run: cargo run -p xtask -- run-pages-predeploy-canary

      - name: summarize predeploy browser canary
        if: ${{ always() && steps.predeploy_browser_canary.outputs.report_path != '' }}
        shell: bash
        run: |
          set -euo pipefail
          report_path="${{ steps.predeploy_browser_canary.outputs.report_path }}"
          if [ ! -f "$report_path" ]; then
            exit 0
          fi
          cargo run -p xtask -- summarize-live-browser-canary "$report_path" >>"$GITHUB_STEP_SUMMARY"

      - name: upload predeploy browser canary artifact
        if: ${{ always() && steps.predeploy_browser_canary.outputs.artifact_dir != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: burn-dragon-pages-predeploy-canary
          path: |
            ${{ steps.predeploy_browser_canary.outputs.artifact_dir }}
            !${{ steps.predeploy_browser_canary.outputs.artifact_dir }}/trace.zip
          if-no-files-found: ignore

      - name: write pages cname
        if: ${{ env.SITE_HOST != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "$SITE_HOST" > target/browser-site/CNAME

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/browser-site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4

  canary:
    needs:
      - build
      - deploy
    uses: ./.github/workflows/live-browser-canary.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      site_base_url: ${{ needs.build.outputs.site_base_url }}
      edge_base_url: ${{ needs.build.outputs.edge_base_url }}
      principal_id: ${{ needs.build.outputs.canary_principal_id }}
      experiment_id: ${{ needs.build.outputs.selected_experiment_id }}
    secrets: inherit
