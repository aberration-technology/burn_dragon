name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy-burn-dragon-p2p-aws.yml"
      - ".github/workflows/restore-burn-dragon-p2p-aws.yml"
      - ".github/workflows/publish-burn-dragon-p2p-dataset.yml"
      - ".github/workflows/deploy-burn-dragon-p2p-pages.yml"
      - ".github/workflows/publish-readiness.yml"
      - ".github/workflows/publish-crates.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "cubecl.toml"
      - "xtask/**"
      - "crates/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy-burn-dragon-p2p-aws.yml"
      - ".github/workflows/restore-burn-dragon-p2p-aws.yml"
      - ".github/workflows/publish-burn-dragon-p2p-dataset.yml"
      - ".github/workflows/deploy-burn-dragon-p2p-pages.yml"
      - ".github/workflows/publish-readiness.yml"
      - ".github/workflows/publish-crates.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "cubecl.toml"
      - "xtask/**"
      - "crates/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --manifest-path Cargo.toml --all --check
      - run: cargo clippy --manifest-path Cargo.toml -p xtask --no-deps -- -D warnings
      - run: cargo clippy --manifest-path Cargo.toml -p burn_dragon_tokenizer -p burn_dragon_universality -p burn_dragon_checkpoint --all-targets --no-deps -- -D warnings
      - run: cargo clippy --manifest-path Cargo.toml -p burn_dragon_train -p burn_dragon_language --all-targets --no-deps -- -D warnings
      - run: cargo clippy --manifest-path Cargo.toml -p burn_dragon_p2p --features native,wgpu --all-targets --no-deps -- -D warnings
      - run: cargo clippy --manifest-path Cargo.toml -p burn_dragon_p2p --target wasm32-unknown-unknown --no-default-features --features wasm-ui,wasm-peer,wgpu --bin burn_dragon_p2p_browser --no-deps -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --manifest-path Cargo.toml --workspace --all-targets --exclude burn_dragon_p2p --exclude xtask -- --test-threads=1
      - run: cargo run --manifest-path Cargo.toml -p xtask -- smoke

  artifact-validation:
    runs-on: ubuntu-latest
    needs: lint
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path Cargo.toml -p xtask -- artifact-check

  browser-site:
    runs-on: ubuntu-latest
    needs: lint
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path Cargo.toml -p xtask -- build-browser-site --out-dir target/browser-site
      - uses: actions/upload-artifact@v4
        with:
          name: burn-dragon-browser-site
          path: target/browser-site
          if-no-files-found: error

  terraform-validate:
    runs-on: ubuntu-latest
    env:
      TF_ROOT: crates/burn_dragon_p2p/deploy/terraform/aws
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
      - run: terraform -chdir="$TF_ROOT" init -backend=false -input=false
      - run: terraform -chdir="$TF_ROOT" validate
