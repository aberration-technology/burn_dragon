name: deploy github pages

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment suffix to deploy
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      edge_base_url:
        description: Optional explicit bootstrap API/auth edge URL baked into the browser shell. Leave empty to derive it from environment variables.
        required: false
        default: ""
        type: string
      seed_node_urls:
        description: Optional comma-separated browser-capable bootstrap multiaddrs baked into the browser shell. Leave empty to derive browser-capable defaults from the resolved edge host.
        required: false
        default: ""
        type: string
      selected_experiment_id:
        description: Default experiment id selected on load.
        required: false
        default: nca-prepretraining
        type: string
      selected_revision_id:
        description: Default revision id selected on load.
        required: false
        default: nca-r1
        type: string
      require_edge_auth:
        description: Require an authenticated edge session before joining from the published browser shell.
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-dragon-pages-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: burn-dragon-p2p-${{ github.event.inputs.environment }}
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: cache rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: configure pages
        uses: actions/configure-pages@v5

      - name: resolve browser shell settings
        shell: bash
        run: |
          set -euo pipefail

          edge_base_url="${{ github.event.inputs.edge_base_url }}"
          seed_node_urls="${{ github.event.inputs.seed_node_urls }}"
          selected_experiment_id="${{ github.event.inputs.selected_experiment_id }}"
          selected_revision_id="${{ github.event.inputs.selected_revision_id }}"
          browser_app_base_url="${{ vars.BURN_DRAGON_P2P_BROWSER_APP_BASE_URL }}"
          edge_domain_name="${{ vars.BURN_DRAGON_P2P_EDGE_DOMAIN_NAME }}"

          if [ -z "$browser_app_base_url" ]; then
            browser_app_base_url="https://dragon.aberration.technology"
          fi
          if [ -z "$edge_base_url" ]; then
            edge_base_url="${{ vars.BURN_DRAGON_P2P_PAGES_EDGE_BASE_URL }}"
          fi
          if [ -z "$edge_base_url" ] && [ -n "$edge_domain_name" ]; then
            edge_base_url="https://${edge_domain_name}"
          fi
          if [ -z "$edge_base_url" ]; then
            edge_base_url="https://edge.dragon.aberration.technology"
          fi
          if [ -z "$seed_node_urls" ]; then
            seed_node_urls="${{ vars.BURN_DRAGON_P2P_PAGES_SEED_NODE_URLS }}"
          fi
          if [ -z "$selected_experiment_id" ]; then
            selected_experiment_id="${{ vars.BURN_DRAGON_P2P_PAGES_SELECTED_EXPERIMENT_ID }}"
          fi
          if [ -z "$selected_experiment_id" ]; then
            selected_experiment_id="nca-prepretraining"
          fi
          if [ -z "$selected_revision_id" ]; then
            selected_revision_id="${{ vars.BURN_DRAGON_P2P_PAGES_SELECTED_REVISION_ID }}"
          fi
          if [ -z "$selected_revision_id" ]; then
            selected_revision_id="nca-r1"
          fi
          if [ -z "$seed_node_urls" ]; then
            seed_node_urls="$(python3 -c 'from urllib.parse import urlparse; import sys; host=urlparse(sys.argv[1]).hostname or "edge.dragon.aberration.technology"; print(f"/dns4/{host}/udp/4001/webrtc-direct,/dns4/{host}/tcp/443/wss")' "$edge_base_url")"
          fi
          IFS=',' read -r -a seed_node_url_array <<<"$seed_node_urls"
          browser_seed_count=0
          browser_capable_seed_count=0
          for seed in "${seed_node_url_array[@]}"; do
            seed="${seed#"${seed%%[![:space:]]*}"}"
            seed="${seed%"${seed##*[![:space:]]}"}"
            if [ -z "$seed" ]; then
              continue
            fi
            browser_seed_count=$((browser_seed_count + 1))
            case "$seed" in
              *webrtc-direct*|*webtransport*|*/wss*|*/ws*)
                browser_capable_seed_count=$((browser_capable_seed_count + 1))
                ;;
            esac
          done
          if [ "$browser_seed_count" -eq 0 ]; then
            echo "browser pages deploy requires at least one seed multiaddr" >&2
            exit 1
          fi
          if [ "$browser_capable_seed_count" -eq 0 ]; then
            echo "browser pages deploy requires at least one browser-capable seed multiaddr (expected webrtc-direct, webtransport, or wss/ws); got: $seed_node_urls" >&2
            exit 1
          fi
          site_host="$(python3 -c 'from urllib.parse import urlparse; import sys; print(urlparse(sys.argv[1]).hostname or "")' "$browser_app_base_url")"

          {
            echo "EDGE_BASE_URL=$edge_base_url"
            echo "SEED_NODE_URLS=$seed_node_urls"
            echo "SELECTED_EXPERIMENT_ID=$selected_experiment_id"
            echo "SELECTED_REVISION_ID=$selected_revision_id"
            echo "REQUIRE_EDGE_AUTH=${{ github.event.inputs.require_edge_auth }}"
            echo "SITE_HOST=$site_host"
          } >>"$GITHUB_ENV"

      - name: build browser site artifact
        shell: bash
        run: |
          set -euo pipefail
          args=(run -p xtask -- build-browser-site --out-dir target/browser-site "--require-edge-auth=$REQUIRE_EDGE_AUTH")
          if [ -n "$EDGE_BASE_URL" ]; then
            args+=(--edge-url "$EDGE_BASE_URL")
          fi
          if [ -n "$SEED_NODE_URLS" ]; then
            args+=(--seed-node-url "$SEED_NODE_URLS")
          fi
          if [ -n "$SELECTED_EXPERIMENT_ID" ]; then
            args+=(--selected-experiment-id "$SELECTED_EXPERIMENT_ID")
          fi
          if [ -n "$SELECTED_REVISION_ID" ]; then
            args+=(--selected-revision-id "$SELECTED_REVISION_ID")
          fi
          cargo "${args[@]}"

      - name: write pages cname
        if: ${{ env.SITE_HOST != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "$SITE_HOST" > target/browser-site/CNAME

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/browser-site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4
