name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy-burn-dragon-p2p-aws.yml"
      - ".github/workflows/restore-burn-dragon-p2p-aws.yml"
      - ".github/workflows/inspect-burn-dragon-p2p-aws.yml"
      - ".github/workflows/cleanup-burn-dragon-p2p-aws.yml"
      - ".github/workflows/live-browser-canary.yml"
      - ".github/workflows/live-native-training-canary.yml"
      - ".github/workflows/publish-burn-dragon-p2p-dataset.yml"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/publish-readiness.yml"
      - ".github/workflows/publish-crates.yml"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "cubecl.toml"
      - "xtask/**"
      - "crates/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy-burn-dragon-p2p-aws.yml"
      - ".github/workflows/restore-burn-dragon-p2p-aws.yml"
      - ".github/workflows/inspect-burn-dragon-p2p-aws.yml"
      - ".github/workflows/cleanup-burn-dragon-p2p-aws.yml"
      - ".github/workflows/live-browser-canary.yml"
      - ".github/workflows/live-native-training-canary.yml"
      - ".github/workflows/publish-burn-dragon-p2p-dataset.yml"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/publish-readiness.yml"
      - ".github/workflows/publish-crates.yml"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "cubecl.toml"
      - "xtask/**"
      - "crates/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - run: scripts/ensure-burn-p2p-sibling.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: bash -n scripts/sync-bootstrap-runtime-config.sh scripts/install_playwright_chromium.sh scripts/run_live_browser_canary.sh scripts/run_pages_predeploy_canary.sh scripts/dispatch_pages_deploy_and_wait.sh scripts/dispatch_native_training_canary_and_wait.sh scripts/resolve_bootstrap_stack_settings.sh
      - run: python3 scripts/test_bootstrap_runtime_sync.py
      - run: python3 scripts/test_bootstrap_instance_selection.py
      - run: python3 scripts/test_bootstrap_head_mirror_seed_urls.py
      - run: python3 scripts/test_head_mirror_admin_capability.py
      - run: python3 scripts/test_cleanup_workflow.py
      - run: python3 scripts/test_deployment_strategy.py
      - run: python3 scripts/test_deployment_version_sync.py
      - run: python3 scripts/test_prod_low_resource_p2p_config.py
      - run: python3 scripts/test_deploy_pages_workflow.py
      - run: python3 scripts/test_resolve_pages_deploy_settings.py
      - run: python3 scripts/test_local_browser_e2e_plan.py
      - run: python3 scripts/test_live_browser_canary_workflow.py
      - run: python3 scripts/test_live_browser_canary_script.py
      - run: python3 scripts/test_live_native_training_canary.py
      - run: python3 scripts/test_browser_transport_terraform.py
      - run: python3 scripts/test_browser_profile_budget.py
      - run: python3 scripts/test_edge_caddyfile.py
      - run: "python3 - <<'PY'\nimport yaml\nfor path in [\n  '.github/workflows/ci.yml',\n  '.github/workflows/deploy-burn-dragon-p2p-aws.yml',\n  '.github/workflows/restore-burn-dragon-p2p-aws.yml',\n  '.github/workflows/inspect-burn-dragon-p2p-aws.yml',\n  '.github/workflows/cleanup-burn-dragon-p2p-aws.yml',\n  '.github/workflows/deploy-pages.yml',\n  '.github/workflows/live-browser-canary.yml',\n  '.github/workflows/live-native-training-canary.yml',\n  '.github/workflows/p2p-validation.yml',\n  '.github/workflows/publish-crates.yml',\n  '.github/workflows/publish-readiness.yml',\n]:\n    yaml.safe_load(open(path))\nprint('workflow-yaml-ok')\nPY"
      - run: node --check scripts/live-browser-canary.mjs
      - run: cargo fmt --manifest-path Cargo.toml --all --check
      - run: cargo clippy --manifest-path Cargo.toml -p xtask --no-deps -- -D warnings
      - run: cargo clippy --manifest-path Cargo.toml -p burn_dragon_tokenizer -p burn_dragon_universality -p burn_dragon_time -p burn_dragon_checkpoint --all-targets --no-deps -- -D warnings
      - run: cargo clippy --manifest-path Cargo.toml -p burn_dragon_train -p burn_dragon_language --all-targets --no-deps -- -D warnings
      - run: cargo clippy --manifest-path Cargo.toml -p burn_dragon_p2p --features native,wgpu --all-targets --no-deps -- -D warnings
      - run: cargo clippy --manifest-path Cargo.toml -p burn_dragon_p2p --target wasm32-unknown-unknown --no-default-features --features wasm-ui,wasm-peer,wgpu --bin burn_dragon_p2p_browser --no-deps -- -D warnings
      - run: cargo check --manifest-path Cargo.toml -p burn_dragon_p2p --features native --bin burn_dragon_p2p_native
      - run: "cargo test --manifest-path Cargo.toml -p burn_dragon_p2p --no-default-features --features native --lib deployment::tests:: -- --nocapture"
        timeout-minutes: 10
      - run: "cargo test --manifest-path Cargo.toml -p burn_dragon_p2p --no-default-features --features native --lib profile::tests::builtin_nca_profile_fallback_materializes_without_local_or_network_profile -- --exact"
        timeout-minutes: 10
      - run: cargo run --manifest-path Cargo.toml -p xtask -- native-smoke
        timeout-minutes: 30
      - run: cargo run --manifest-path Cargo.toml -p xtask -- wasm-smoke
        timeout-minutes: 30

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 180
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - run: scripts/ensure-burn-p2p-sibling.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --manifest-path Cargo.toml -p burn_dragon_checkpoint --all-targets -- --test-threads=1
        timeout-minutes: 15
      - run: cargo test --manifest-path Cargo.toml -p burn_dragon_core --all-targets -- --test-threads=1
        timeout-minutes: 20
      - run: cargo test --manifest-path Cargo.toml -p burn_dragon_kernel --all-targets -- --test-threads=1
        timeout-minutes: 25
      - run: cargo test --manifest-path Cargo.toml -p burn_dragon_language --all-targets -- --test-threads=1
        timeout-minutes: 15
      - run: cargo test --manifest-path Cargo.toml -p burn_dragon_time --all-targets -- --test-threads=1
        timeout-minutes: 5
      - run: cargo test --manifest-path Cargo.toml -p burn_dragon_tokenizer --all-targets -- --test-threads=1
        timeout-minutes: 5
      - run: cargo test --manifest-path Cargo.toml -p burn_dragon_train --all-targets -- --test-threads=1
        timeout-minutes: 15
      - run: cargo test --manifest-path Cargo.toml -p burn_dragon_universality --all-targets -- --test-threads=1
        timeout-minutes: 15
  browser-site:
    runs-on: ubuntu-latest
    needs: lint
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - run: scripts/ensure-burn-p2p-sibling.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path Cargo.toml -p xtask -- build-browser-site --out-dir target/browser-site
      - uses: actions/upload-artifact@v4
        with:
          name: burn-dragon-browser-site
          path: target/browser-site
          if-no-files-found: error

  local-prod-e2e:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - run: scripts/ensure-burn-p2p-sibling.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --manifest-path Cargo.toml -p xtask -- local-browser-e2e
        timeout-minutes: 60

  terraform-validate:
    runs-on: ubuntu-latest
    env:
      TF_ROOT: crates/burn_dragon_p2p/deploy/terraform/aws
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
      - run: terraform -chdir="$TF_ROOT" init -backend=false -input=false
      - run: terraform -chdir="$TF_ROOT" validate

  deploy-production:
    runs-on: ubuntu-latest
    needs:
      - test
      - browser-site
      - local-prod-e2e
      - terraform-validate
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      actions: write
    steps:
      - name: dispatch production deploy workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          current_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${GITHUB_REF_NAME}" --jq '.object.sha')"
          if [[ "${current_main_sha}" != "${GITHUB_SHA}" ]]; then
            echo "skipping production deploy: ${GITHUB_REF_NAME} advanced to ${current_main_sha}; ci validated ${GITHUB_SHA}"
            exit 0
          fi
          gh workflow run .github/workflows/deploy-burn-dragon-p2p-aws.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${GITHUB_REF_NAME}" \
            -f environment=production \
            -f terraform_workspace=mainnet
