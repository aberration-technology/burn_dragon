name: Live Browser Canary

on:
  workflow_call:
    inputs:
      environment:
        required: false
        default: production
        type: string
      site_base_url:
        required: false
        default: https://dragon.aberration.technology
        type: string
      edge_base_url:
        required: false
        default: https://edge.dragon.aberration.technology
        type: string
      principal_id:
        required: false
        default: browser-canary-mainnet-nca
        type: string
      experiment_id:
        required: false
        default: nca-prepretraining
        type: string
    secrets:
      BURN_DRAGON_P2P_BROWSER_CANARY_CALLBACK_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment suffix to run against
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      site_base_url:
        description: Browser site base URL
        required: false
        default: https://dragon.aberration.technology
      edge_base_url:
        description: Edge base URL
        required: false
        default: https://edge.dragon.aberration.technology
      principal_id:
        description: Admitted principal id for the live browser canary
        required: false
        default: browser-canary-mainnet-nca
      experiment_id:
        description: Experiment id to train against
        required: false
        default: nca-prepretraining
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: live-browser-canary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    environment: burn-dragon-p2p-${{ inputs.environment || github.event.inputs.environment || 'production' }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - lane: chromium-auto-connect
            browser: chromium
            transport_mode: auto
            expect_training: "0"
            expect_checkpoint_sync: "0"
            min_accepted_receipts: "0"
            required: "1"
          - lane: chromium-webrtc-direct-connect
            browser: chromium
            transport_mode: webrtc-direct
            expect_training: "0"
            expect_checkpoint_sync: "0"
            min_accepted_receipts: "0"
            required: "1"
          - lane: chromium-webrtc-direct-checkpoint
            browser: chromium
            transport_mode: webrtc-direct
            expect_training: "0"
            expect_checkpoint_sync: "1"
            min_accepted_receipts: "0"
            required: "1"
          - lane: chromium-webrtc-direct-training
            browser: chromium
            transport_mode: webrtc-direct
            expect_training: "1"
            expect_checkpoint_sync: "0"
            min_accepted_receipts: "2"
            required: "1"
          - lane: firefox-auto-connect
            browser: firefox
            transport_mode: auto
            expect_training: "0"
            expect_checkpoint_sync: "0"
            min_accepted_receipts: "0"
            required: "1"
          - lane: firefox-webrtc-direct-connect
            browser: firefox
            transport_mode: webrtc-direct
            expect_training: "0"
            expect_checkpoint_sync: "0"
            min_accepted_receipts: "0"
            required: "1"
    continue-on-error: ${{ matrix.required == '0' }}
    steps:
      - uses: actions/checkout@v4
      - name: checkout burn_p2p sibling
        uses: actions/checkout@v4
        with:
          repository: aberration-technology/burn_p2p
          ref: 68818312c750788e5d034bd96ce2a364921937a8
          path: burn_p2p-sibling
      - name: link burn_p2p path dependency
        shell: bash
        run: |
          set -euo pipefail
          target="${GITHUB_WORKSPACE}/../burn_p2p"
          rm -rf "$target"
          ln -s "${GITHUB_WORKSPACE}/burn_p2p-sibling" "$target"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: install playwright browser
        shell: bash
        env:
          PLAYWRIGHT_BROWSERS: ${{ matrix.browser }}
        run: cargo run -p xtask -- install-playwright-chromium

      - name: run live browser canary
        id: live_browser_canary
        shell: bash
        env:
          BURN_DRAGON_BROWSER_CANARY_SITE_BASE_URL: ${{ inputs.site_base_url || github.event.inputs.site_base_url || 'https://dragon.aberration.technology' }}
          BURN_DRAGON_BROWSER_CANARY_EDGE_BASE_URL: ${{ inputs.edge_base_url || github.event.inputs.edge_base_url || 'https://edge.dragon.aberration.technology' }}
          BURN_DRAGON_BROWSER_CANARY_PRINCIPAL_ID: ${{ inputs.principal_id || github.event.inputs.principal_id || 'browser-canary-mainnet-nca' }}
          BURN_DRAGON_BROWSER_CANARY_CALLBACK_TOKEN: ${{ secrets.BURN_DRAGON_P2P_BROWSER_CANARY_CALLBACK_TOKEN }}
          BURN_DRAGON_BROWSER_CANARY_EXPERIMENT_ID: ${{ inputs.experiment_id || github.event.inputs.experiment_id || 'nca-prepretraining' }}
          BURN_DRAGON_BROWSER_CANARY_BROWSER: ${{ matrix.browser }}
          BURN_DRAGON_BROWSER_CANARY_TRANSPORT_MODE: ${{ matrix.transport_mode }}
          BURN_DRAGON_BROWSER_CANARY_EXPECT_TRAINING: ${{ matrix.expect_training }}
          BURN_DRAGON_BROWSER_CANARY_EXPECT_CHECKPOINT_SYNC: ${{ matrix.expect_checkpoint_sync }}
          BURN_DRAGON_BROWSER_CANARY_MIN_ACCEPTED_RECEIPTS: ${{ matrix.min_accepted_receipts }}
          BURN_DRAGON_BROWSER_CANARY_CONNECT_TIMEOUT_MS: "240000"
          BURN_DRAGON_BROWSER_CANARY_TRAIN_TIMEOUT_MS: "300000"
          BURN_DRAGON_BROWSER_CANARY_ARTIFACT_DIR: ${{ runner.temp }}/burn-dragon-live-browser-canary-${{ matrix.lane }}
          BURN_DRAGON_BROWSER_CANARY_OUTPUT_JSON: ${{ runner.temp }}/burn-dragon-live-browser-canary-${{ matrix.lane }}/canary-summary.json
        run: cargo run -p xtask -- run-live-browser-canary

      - name: summarize live browser canary
        if: ${{ always() && steps.live_browser_canary.outputs.report_path != '' }}
        shell: bash
        run: |
          set -euo pipefail
          report_path="${{ steps.live_browser_canary.outputs.report_path }}"
          if [ ! -f "$report_path" ]; then
            exit 0
          fi
          cargo run -p xtask -- summarize-live-browser-canary "$report_path" >>"$GITHUB_STEP_SUMMARY"

      - name: upload live browser canary artifact
        if: ${{ always() && steps.live_browser_canary.outputs.artifact_dir != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: burn-dragon-live-browser-canary-${{ matrix.lane }}
          path: |
            ${{ steps.live_browser_canary.outputs.artifact_dir }}
            !${{ steps.live_browser_canary.outputs.artifact_dir }}/trace.zip
          if-no-files-found: ignore
