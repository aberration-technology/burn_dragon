name: p2p validation

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Validation suite to run. Example: `smoke` for the normal repo smoke rung, `ruliad-smoke` for the ruliad native training smoke, `ruliad-convergence` for the ignored ruliad/NCA comparison rung, or `nca-edge-drill` / `climbmix-edge-drill` for local browser+native drills."
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - ruliad-smoke
          - ruliad-convergence
          - nca-artifacts
          - nca-runtime-cluster
          - nca-edge-drill
          - climbmix-edge-drill

concurrency:
  group: p2p-validation-${{ github.ref }}-${{ github.event.inputs.suite }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: checkout burn_p2p sibling
        uses: actions/checkout@v4
        with:
          repository: aberration-technology/burn_p2p
          ref: 900a8fbc988edd7db503b1fb1ee2eed29dcc99bc
          path: burn_p2p-sibling
      - name: link burn_p2p path dependency
        shell: bash
        run: |
          set -euo pipefail
          target="${GITHUB_WORKSPACE}/../burn_p2p"
          rm -rf "$target"
          ln -s "${GITHUB_WORKSPACE}/burn_p2p-sibling" "$target"

      - name: setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: cache rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: run selected validation suite
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.suite }}" in
            smoke)
              cargo run --manifest-path Cargo.toml -p xtask -- smoke
              ;;
            ruliad-smoke)
              cargo test --manifest-path Cargo.toml -p burn_dragon_p2p --features native --test native_training ruliad_native_peer_executes_live_source_training_window -- --exact --nocapture
              ;;
            ruliad-convergence)
              cargo test --manifest-path Cargo.toml -p burn_dragon_p2p --features native --test native_training ruliad_native_peer_small_model_converges_over_more_windows -- --ignored --exact --nocapture
              cargo test --manifest-path Cargo.toml -p burn_dragon_p2p --features native --test native_training nca_vs_ruliad_small_model_convergence_report -- --ignored --exact --nocapture
              ;;
            nca-artifacts)
              cargo run --manifest-path Cargo.toml -p xtask -- artifact-check
              ;;
            nca-runtime-cluster)
              cargo test --manifest-path Cargo.toml -p burn_dragon_p2p --features native,wgpu --test native_training nca_native_runtime_cluster_smoke_converges_and_merges_heads -- --ignored --exact --nocapture
              ;;
            nca-edge-drill)
              cargo test --manifest-path Cargo.toml -p burn_dragon_p2p --features native,wgpu --test native_training nca_edge_drill_native_and_browser_github_auth_and_receipts -- --ignored --exact --nocapture
              ;;
            climbmix-edge-drill)
              cargo test --manifest-path Cargo.toml -p burn_dragon_p2p --features native,wgpu --test native_training climbmix_edge_drill_native_and_browser_github_auth_and_receipts -- --ignored --exact --nocapture
              ;;
            *)
              echo "unsupported suite: ${{ github.event.inputs.suite }}" >&2
              exit 1
              ;;
          esac
