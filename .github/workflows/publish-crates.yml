name: Publish Crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run cargo publish as a dry-run instead of publishing to crates.io
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-crates
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: checkout burn_p2p sibling
        uses: actions/checkout@v4
        with:
          repository: aberration-technology/burn_p2p
          ref: f9b097e2f414c51a9e5834964a1b0fab159e918b
          path: burn_p2p-sibling
      - name: link burn_p2p path dependency
        shell: bash
        run: |
          set -euo pipefail
          target="${GITHUB_WORKSPACE}/../burn_p2p"
          rm -rf "$target"
          ln -s "${GITHUB_WORKSPACE}/burn_p2p-sibling" "$target"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: publish crates in dependency order
        run: cargo run -p xtask -- publish-crates --dry-run "${{ github.event.inputs.dry_run }}"
