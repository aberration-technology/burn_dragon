name: Publish Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-readiness.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "xtask/**"
      - "crates/**"

concurrency:
  group: publish-readiness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish-dry-run:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - name: checkout burn_p2p sibling
        uses: actions/checkout@v4
        with:
          repository: aberration-technology/burn_p2p
          ref: 87b9aabd49421088fd050695ee7553175d13eeb1
          path: ../burn_p2p
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: verify publish readiness chain
        run: cargo run -p xtask -- publish-crates --dry-run true
