name: deploy burn_dragon_p2p aws

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment suffix. Example: `production` for the `burn-dragon-p2p-production` GitHub Environment."
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      terraform_workspace:
        description: "Terraform workspace name. Example: `mainnet` or `staging`. This becomes the Terraform state workspace under the AWS stack."
        required: true
        default: mainnet
        type: string
      disaster_recovery_region:
        description: "Optional warm-disaster-recovery AWS region. Example: `us-west-2`. When set, Terraform enables cross-region artifact replication and cross-region copies of retained bootstrap data snapshots into that region."
        required: false
        default: ""
        type: string
      edge_domain_name:
        description: "Public HTTPS hostname for the bootstrap/browser edge. Example: `dragon.aberration.technology`. Clear it to fall back to the GitHub Environment variable, then to the built-in default."
        required: false
        default: dragon.aberration.technology
        type: string
      route53_zone_name:
        description: "Public Route53 hosted zone containing the edge record. Example: `aberration.technology`. Clear it to fall back to the GitHub Environment variable, then to the built-in default."
        required: false
        default: aberration.technology
        type: string
      bootstrap_install_source:
        description: "How to install `burn_p2p_bootstrap` on the bootstrap hosts. Example: `crate` for the published crates.io package or `git` only when intentionally testing an unpublished burn_p2p revision."
        required: true
        default: crate
        type: choice
        options:
          - crate
          - git
      bootstrap_version:
        description: "Published `burn_p2p_bootstrap` crate version used when `bootstrap_install_source=crate`. Example: `0.21.0-pre.12`."
        required: false
        default: 0.21.0-pre.12
        type: string
      bootstrap_git_ref:
        description: "Pinned burn_p2p git ref used when `bootstrap_install_source=git`. Example: `main` or a full commit SHA. Leave empty on the normal crate path."
        required: false
        default: ""
        type: string
      auth_connector_kind:
        description: "Auth connector kind override. Supported values: `github`, `oidc`, `oauth`, `static`, `external`. Clear it to use the GitHub Environment variable, then default to `github`."
        required: false
        default: github
        type: string
      github_admin_logins:
        description: "Comma-separated GitHub username handles granted admin session rights when `auth_connector_kind=github`. Example: `alice,bob`. Leave empty to use the GitHub Environment variable, then default to the triggering GitHub account."
        required: false
        default: ""
        type: string
      climbmix_browser_dataset_base_url:
        description: "Public base URL for the browser ClimbMix shard pool. Example: `https://dragon.aberration.technology/dragon-datasets/climbmix-pretraining/climbmix-r1`. The workflow publishes `${base_url}/fetch-manifest.json` into the initial ClimbMix browser profile."
        required: false
        default: https://dragon.aberration.technology/dragon-datasets/climbmix-pretraining/climbmix-r1
        type: string
      create_artifact_bucket:
        description: "Whether Terraform should create and manage the S3 bucket used for direct Dragon checkpoint and metric publication. Example: keep `true` for the normal path; set `false` only when `artifact_bucket_name` points at an existing bucket you already manage."
        required: true
        default: true
        type: boolean
      artifact_bucket_name:
        description: "Optional S3 bucket name for directly published checkpoints and metrics. Example: `dragon-aberration-technology-artifacts-prod`. Leave empty to auto-derive a stable unique bucket name from the stack, workspace, account, and region. Required when `create_artifact_bucket=false`."
        required: false
        default: ""
        type: string
      artifact_bucket_path_prefix:
        description: "Optional key prefix inside the artifact bucket. Example: `artifacts/burn-dragon-p2p-mainnet/mainnet`. Leave empty to auto-derive `artifacts/<stack>/<workspace>`."
        required: false
        default: ""
        type: string
      create_artifact_replica_bucket:
        description: "Whether Terraform should create and manage the warm-DR replica S3 bucket in `disaster_recovery_region`. Keep `true` for the normal path; set `false` only when `artifact_replica_bucket_name` points at an existing DR bucket you already manage."
        required: true
        default: true
        type: boolean
      artifact_replica_bucket_name:
        description: "Optional S3 bucket name in `disaster_recovery_region` for replicated checkpoints and metrics. Example: `dragon-aberration-technology-artifacts-dr`. Leave empty to auto-derive a stable unique replica bucket name. Required when `disaster_recovery_region` is set and `create_artifact_replica_bucket=false`."
        required: false
        default: ""
        type: string
      managed_trainer_desired_capacity:
        description: "Desired instance count for the optional managed native trainer pool. Example: `1` to keep one managed trainer online. Keep `0` to disable the pool."
        required: false
        default: "0"
        type: string
      managed_trainer_backend:
        description: "Native backend used by the managed trainer pool. Example: `wgpu` for the normal fleet, `cuda` for CUDA trainers, or `cpu` only for explicit debugging."
        required: true
        default: wgpu
        type: choice
        options:
          - wgpu
          - cuda
          - cpu
      managed_trainer_experiment_kind:
        description: "Experiment kind assigned to the managed trainer pool. Example: `nca` for the default warm trainer fleet or `climbmix` when bringing up that experiment."
        required: true
        default: nca
        type: choice
        options:
          - nca
          - climbmix
      force_replace_bootstrap:
        description: "Replace the EC2 bootstrap host during apply. Example: set `true` only for an explicit rebuild. The retained bootstrap data volume is preserved, so normal host replacement keeps bootstrap/auth/publication state."
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-burn-dragon-p2p-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: burn-dragon-p2p-${{ github.event.inputs.environment }}
    env:
      TF_ROOT: crates/burn_dragon_p2p/deploy/terraform/aws
      DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}
      TF_WORKSPACE_NAME: ${{ github.event.inputs.terraform_workspace }}
      AUTH_CLIENT_ID: ${{ secrets.BURN_DRAGON_P2P_AUTH_CLIENT_ID }}
      AUTH_CLIENT_SECRET: ${{ secrets.BURN_DRAGON_P2P_AUTH_CLIENT_SECRET }}
      GITHUB_CLIENT_ID: ${{ secrets.BURN_DRAGON_P2P_GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.BURN_DRAGON_P2P_GITHUB_CLIENT_SECRET }}
      TRAINER_AUTH_BUNDLE_JSON: ${{ secrets.BURN_DRAGON_P2P_TRAINER_AUTH_BUNDLE_JSON }}

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: resolve deployment settings
        shell: bash
        run: |
          set -euo pipefail

          stack_name="${{ vars.BURN_DRAGON_P2P_STACK_NAME }}"
          if [ -z "$stack_name" ]; then
            stack_name="burn-dragon-p2p-${DEPLOY_ENVIRONMENT}"
          fi

          aws_region="${{ vars.BURN_DRAGON_P2P_AWS_REGION }}"
          aws_role_arn="${{ vars.BURN_DRAGON_P2P_AWS_ROLE_ARN }}"
          disaster_recovery_region_input="${{ github.event.inputs.disaster_recovery_region }}"
          disaster_recovery_region_var="${{ vars.BURN_DRAGON_P2P_DISASTER_RECOVERY_REGION }}"
          edge_domain_name_input="${{ github.event.inputs.edge_domain_name }}"
          edge_domain_name_var="${{ vars.BURN_DRAGON_P2P_EDGE_DOMAIN_NAME }}"
          route53_zone_name_input="${{ github.event.inputs.route53_zone_name }}"
          route53_zone_name_var="${{ vars.BURN_DRAGON_P2P_ROUTE53_ZONE_NAME }}"
          network_id="${{ vars.BURN_DRAGON_P2P_NETWORK_ID }}"
          project_family_id="${{ vars.BURN_DRAGON_P2P_PROJECT_FAMILY_ID }}"
          study_id="${{ vars.BURN_DRAGON_P2P_STUDY_ID }}"
          release_train_hash="${{ vars.BURN_DRAGON_P2P_RELEASE_TRAIN_HASH }}"
          auth_connector_kind_input="${{ github.event.inputs.auth_connector_kind }}"
          auth_connector_kind_var="${{ vars.BURN_DRAGON_P2P_AUTH_CONNECTOR_KIND }}"
          auth_authority_name="${{ vars.BURN_DRAGON_P2P_AUTH_AUTHORITY_NAME }}"
          auth_principals_json="${{ vars.BURN_DRAGON_P2P_AUTH_PRINCIPALS_JSON }}"
          auth_authorize_base_url="${{ vars.BURN_DRAGON_P2P_AUTH_AUTHORIZE_BASE_URL }}"
          auth_exchange_url="${{ vars.BURN_DRAGON_P2P_AUTH_EXCHANGE_URL }}"
          auth_token_url="${{ vars.BURN_DRAGON_P2P_AUTH_TOKEN_URL }}"
          auth_api_base_url="${{ vars.BURN_DRAGON_P2P_AUTH_API_BASE_URL }}"
          auth_userinfo_url="${{ vars.BURN_DRAGON_P2P_AUTH_USERINFO_URL }}"
          auth_refresh_url="${{ vars.BURN_DRAGON_P2P_AUTH_REFRESH_URL }}"
          auth_revoke_url="${{ vars.BURN_DRAGON_P2P_AUTH_REVOKE_URL }}"
          auth_jwks_url="${{ vars.BURN_DRAGON_P2P_AUTH_JWKS_URL }}"
          auth_oidc_issuer="${{ vars.BURN_DRAGON_P2P_AUTH_OIDC_ISSUER }}"
          auth_oauth_provider="${{ vars.BURN_DRAGON_P2P_AUTH_OAUTH_PROVIDER }}"
          auth_external_authority="${{ vars.BURN_DRAGON_P2P_AUTH_EXTERNAL_AUTHORITY }}"
          auth_external_trusted_principal_header="${{ vars.BURN_DRAGON_P2P_AUTH_EXTERNAL_TRUSTED_PRINCIPAL_HEADER }}"
          auth_external_trusted_internal_only="${{ vars.BURN_DRAGON_P2P_AUTH_EXTERNAL_TRUSTED_INTERNAL_ONLY }}"
          github_required_org="${{ vars.BURN_DRAGON_P2P_GITHUB_REQUIRED_ORG }}"
          github_required_team="${{ vars.BURN_DRAGON_P2P_GITHUB_REQUIRED_TEAM }}"
          github_required_repo="${{ vars.BURN_DRAGON_P2P_GITHUB_REQUIRED_REPO }}"
          github_admin_required_repo_permission="${{ vars.BURN_DRAGON_P2P_GITHUB_ADMIN_REQUIRED_REPO_PERMISSION }}"
          github_admin_logins_input="${{ github.event.inputs.github_admin_logins }}"
          github_admin_logins_var="${{ vars.BURN_DRAGON_P2P_GITHUB_ADMIN_LOGINS }}"
          climbmix_dataset_base_url_input="${{ github.event.inputs.climbmix_browser_dataset_base_url }}"
          climbmix_dataset_base_url_var="${{ vars.BURN_DRAGON_P2P_CLIMBMIX_BROWSER_DATASET_BASE_URL }}"
          bootstrap_install_source_input="${{ github.event.inputs.bootstrap_install_source }}"
          bootstrap_install_source_var="${{ vars.BURN_DRAGON_P2P_BOOTSTRAP_INSTALL_SOURCE }}"
          bootstrap_version_input="${{ github.event.inputs.bootstrap_version }}"
          bootstrap_version_var="${{ vars.BURN_DRAGON_P2P_BOOTSTRAP_VERSION }}"
          bootstrap_git_ref_input="${{ github.event.inputs.bootstrap_git_ref }}"
          bootstrap_git_ref_var="${{ vars.BURN_DRAGON_P2P_BOOTSTRAP_GIT_REF }}"
          instance_type="${{ vars.BURN_DRAGON_P2P_INSTANCE_TYPE }}"
          root_volume_size_gib="${{ vars.BURN_DRAGON_P2P_ROOT_VOLUME_SIZE_GIB }}"
          data_volume_size_gib="${{ vars.BURN_DRAGON_P2P_DATA_VOLUME_SIZE_GIB }}"
          managed_trainer_desired_capacity_input="${{ github.event.inputs.managed_trainer_desired_capacity }}"
          managed_trainer_desired_capacity_var="${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_DESIRED_CAPACITY }}"
          managed_trainer_backend_input="${{ github.event.inputs.managed_trainer_backend }}"
          managed_trainer_backend_var="${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_BACKEND }}"
          managed_trainer_experiment_kind_input="${{ github.event.inputs.managed_trainer_experiment_kind }}"
          managed_trainer_experiment_kind_var="${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_EXPERIMENT_KIND }}"
          managed_trainer_instance_type="${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_INSTANCE_TYPE }}"
          managed_trainer_min_size="${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_MIN_SIZE }}"
          managed_trainer_max_size="${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_MAX_SIZE }}"
          managed_trainer_target="${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_TARGET }}"
          managed_trainer_crate_version="${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_CRATE_VERSION }}"
          managed_trainer_auth_bundle_parameter_name="${{ vars.BURN_DRAGON_P2P_MANAGED_TRAINER_AUTH_BUNDLE_PARAMETER_NAME }}"
          enable_data_volume_snapshots="${{ vars.BURN_DRAGON_P2P_ENABLE_DATA_VOLUME_SNAPSHOTS }}"
          data_volume_snapshot_retention_days="${{ vars.BURN_DRAGON_P2P_DATA_VOLUME_SNAPSHOT_RETENTION_DAYS }}"
          enable_bootstrap_status_alarms="${{ vars.BURN_DRAGON_P2P_ENABLE_BOOTSTRAP_STATUS_ALARMS }}"
          alarm_sns_topic_arn="${{ vars.BURN_DRAGON_P2P_ALARM_SNS_TOPIC_ARN }}"
          create_artifact_bucket_input="${{ github.event.inputs.create_artifact_bucket }}"
          artifact_bucket_name_input="${{ github.event.inputs.artifact_bucket_name }}"
          artifact_bucket_name_var="${{ vars.BURN_DRAGON_P2P_ARTIFACT_BUCKET_NAME }}"
          artifact_bucket_path_prefix_input="${{ github.event.inputs.artifact_bucket_path_prefix }}"
          artifact_bucket_path_prefix_var="${{ vars.BURN_DRAGON_P2P_ARTIFACT_BUCKET_PATH_PREFIX }}"
          create_artifact_replica_bucket_input="${{ github.event.inputs.create_artifact_replica_bucket }}"
          create_artifact_replica_bucket_var="${{ vars.BURN_DRAGON_P2P_CREATE_ARTIFACT_REPLICA_BUCKET }}"
          artifact_replica_bucket_name_input="${{ github.event.inputs.artifact_replica_bucket_name }}"
          artifact_replica_bucket_name_var="${{ vars.BURN_DRAGON_P2P_ARTIFACT_REPLICA_BUCKET_NAME }}"
          artifact_replica_bucket_force_destroy="${{ vars.BURN_DRAGON_P2P_ARTIFACT_REPLICA_BUCKET_FORCE_DESTROY }}"
          enable_disaster_recovery_snapshot_copies="${{ vars.BURN_DRAGON_P2P_ENABLE_DISASTER_RECOVERY_SNAPSHOT_COPIES }}"
          disaster_recovery_snapshot_retention_days="${{ vars.BURN_DRAGON_P2P_DISASTER_RECOVERY_SNAPSHOT_RETENTION_DAYS }}"
          artifact_bucket_force_destroy="${{ vars.BURN_DRAGON_P2P_ARTIFACT_BUCKET_FORCE_DESTROY }}"
          artifact_bucket_server_side_encryption="${{ vars.BURN_DRAGON_P2P_ARTIFACT_BUCKET_SERVER_SIDE_ENCRYPTION }}"

          : "${aws_region:?missing BURN_DRAGON_P2P_AWS_REGION}"
          : "${aws_role_arn:?missing BURN_DRAGON_P2P_AWS_ROLE_ARN}"
          : "${network_id:?missing BURN_DRAGON_P2P_NETWORK_ID}"
          : "${project_family_id:?missing BURN_DRAGON_P2P_PROJECT_FAMILY_ID}"
          : "${study_id:?missing BURN_DRAGON_P2P_STUDY_ID}"
          : "${release_train_hash:?missing BURN_DRAGON_P2P_RELEASE_TRAIN_HASH}"

          edge_domain_name="$edge_domain_name_input"
          if [ -z "$edge_domain_name" ]; then
            edge_domain_name="$edge_domain_name_var"
          fi
          if [ -z "$edge_domain_name" ]; then
            edge_domain_name="dragon.aberration.technology"
          fi

          route53_zone_name="$route53_zone_name_input"
          if [ -z "$route53_zone_name" ]; then
            route53_zone_name="$route53_zone_name_var"
          fi
          if [ -z "$route53_zone_name" ]; then
            route53_zone_name="aberration.technology"
          fi

          disaster_recovery_region="$disaster_recovery_region_input"
          if [ -z "$disaster_recovery_region" ]; then
            disaster_recovery_region="$disaster_recovery_region_var"
          fi

          secret_parameter_prefix="/${stack_name}/${TF_WORKSPACE_NAME}/bootstrap"
          auth_connector_kind="$auth_connector_kind_input"
          if [ -z "$auth_connector_kind" ]; then
            auth_connector_kind="$auth_connector_kind_var"
          fi
          if [ -z "$auth_connector_kind" ]; then
            auth_connector_kind="github"
          fi
          auth_connector_kind="$(printf '%s' "$auth_connector_kind" | tr '[:upper:]' '[:lower:]' | xargs)"
          case "$auth_connector_kind" in
            github|oidc|oauth|static|external) ;;
            *)
              echo "unsupported auth connector kind: $auth_connector_kind" >&2
              exit 1
              ;;
          esac
          if [ -z "$auth_authority_name" ]; then
            auth_authority_name="burn-dragon-auth"
          fi
          if [ -z "$auth_principals_json" ]; then
            auth_principals_json="[]"
          fi
          if [ -z "$auth_external_trusted_principal_header" ]; then
            auth_external_trusted_principal_header="x-forwarded-user"
          fi
          if [ -z "$auth_external_trusted_internal_only" ]; then
            auth_external_trusted_internal_only="true"
          fi

          resolved_auth_client_id="$AUTH_CLIENT_ID"
          resolved_auth_client_secret="$AUTH_CLIENT_SECRET"
          if [ "$auth_connector_kind" = "github" ]; then
            if [ -z "$resolved_auth_client_id" ]; then
              resolved_auth_client_id="$GITHUB_CLIENT_ID"
            fi
            if [ -z "$resolved_auth_client_secret" ]; then
              resolved_auth_client_secret="$GITHUB_CLIENT_SECRET"
            fi
          fi

          github_admin_logins="$github_admin_logins_input"
          if [ -z "$github_admin_logins" ]; then
            github_admin_logins="$github_admin_logins_var"
          fi
          if [ "$auth_connector_kind" = "github" ] && [ -z "$github_admin_logins" ]; then
            github_admin_logins="${{ github.actor }}"
          fi
          climbmix_dataset_base_url="$climbmix_dataset_base_url_input"
          if [ -z "$climbmix_dataset_base_url" ]; then
            climbmix_dataset_base_url="$climbmix_dataset_base_url_var"
          fi
          if [ -z "$climbmix_dataset_base_url" ]; then
            climbmix_dataset_base_url="https://${edge_domain_name}/dragon-datasets/climbmix-pretraining/climbmix-r1"
          fi

          bootstrap_install_source="$bootstrap_install_source_input"
          if [ -z "$bootstrap_install_source" ]; then
            bootstrap_install_source="$bootstrap_install_source_var"
          fi
          if [ -z "$bootstrap_install_source" ]; then
            bootstrap_install_source="crate"
          fi
          bootstrap_install_source="$(printf '%s' "$bootstrap_install_source" | tr '[:upper:]' '[:lower:]' | xargs)"
          case "$bootstrap_install_source" in
            crate|git) ;;
            *)
              echo "unsupported bootstrap_install_source: $bootstrap_install_source" >&2
              exit 1
              ;;
          esac

          bootstrap_version="$bootstrap_version_input"
          if [ -z "$bootstrap_version" ]; then
            bootstrap_version="$bootstrap_version_var"
          fi
          if [ -z "$bootstrap_version" ]; then
            bootstrap_version="0.21.0-pre.12"
          fi

          bootstrap_git_ref="$bootstrap_git_ref_input"
          if [ -z "$bootstrap_git_ref" ]; then
            bootstrap_git_ref="$bootstrap_git_ref_var"
          fi
          if [ "$bootstrap_install_source" = "git" ] && [ -z "$bootstrap_git_ref" ]; then
            echo "bootstrap_git_ref is required when bootstrap_install_source=git" >&2
            exit 1
          fi

          managed_trainer_desired_capacity="$managed_trainer_desired_capacity_input"
          if [ -z "$managed_trainer_desired_capacity" ]; then
            managed_trainer_desired_capacity="$managed_trainer_desired_capacity_var"
          fi
          if [ -z "$managed_trainer_desired_capacity" ]; then
            managed_trainer_desired_capacity="0"
          fi
          managed_trainer_backend="$managed_trainer_backend_input"
          if [ -z "$managed_trainer_backend" ]; then
            managed_trainer_backend="$managed_trainer_backend_var"
          fi
          if [ -z "$managed_trainer_backend" ]; then
            managed_trainer_backend="wgpu"
          fi
          managed_trainer_backend="$(printf '%s' "$managed_trainer_backend" | tr '[:upper:]' '[:lower:]' | xargs)"
          managed_trainer_experiment_kind="$managed_trainer_experiment_kind_input"
          if [ -z "$managed_trainer_experiment_kind" ]; then
            managed_trainer_experiment_kind="$managed_trainer_experiment_kind_var"
          fi
          if [ -z "$managed_trainer_experiment_kind" ]; then
            managed_trainer_experiment_kind="nca"
          fi
          managed_trainer_experiment_kind="$(printf '%s' "$managed_trainer_experiment_kind" | tr '[:upper:]' '[:lower:]' | xargs)"
          if [ -z "$managed_trainer_target" ]; then
            managed_trainer_target="trainer"
          fi
          if [ -z "$managed_trainer_crate_version" ]; then
            managed_trainer_crate_version="0.21.0-pre.12"
          fi
          if [ -z "$managed_trainer_auth_bundle_parameter_name" ]; then
            managed_trainer_auth_bundle_parameter_name="${secret_parameter_prefix}/trainer_auth_bundle_json"
          fi
          if [ "$managed_trainer_desired_capacity" != "0" ] && [ -z "$TRAINER_AUTH_BUNDLE_JSON" ]; then
            echo "missing BURN_DRAGON_P2P_TRAINER_AUTH_BUNDLE_JSON secret while managed_trainer_desired_capacity=$managed_trainer_desired_capacity" >&2
            exit 1
          fi

          create_artifact_bucket="$create_artifact_bucket_input"
          artifact_bucket_name="$artifact_bucket_name_input"
          if [ -z "$artifact_bucket_name" ]; then
            artifact_bucket_name="$artifact_bucket_name_var"
          fi
          artifact_bucket_path_prefix="$artifact_bucket_path_prefix_input"
          if [ -z "$artifact_bucket_path_prefix" ]; then
            artifact_bucket_path_prefix="$artifact_bucket_path_prefix_var"
          fi
          create_artifact_replica_bucket="$create_artifact_replica_bucket_input"
          if [ -z "$create_artifact_replica_bucket" ]; then
            create_artifact_replica_bucket="$create_artifact_replica_bucket_var"
          fi
          if [ -z "$create_artifact_replica_bucket" ]; then
            create_artifact_replica_bucket="true"
          fi
          artifact_replica_bucket_name="$artifact_replica_bucket_name_input"
          if [ -z "$artifact_replica_bucket_name" ]; then
            artifact_replica_bucket_name="$artifact_replica_bucket_name_var"
          fi
          if [ "$create_artifact_bucket" != "true" ] && [ -z "$artifact_bucket_name" ]; then
            echo "artifact_bucket_name is required when create_artifact_bucket=false" >&2
            exit 1
          fi
          if [ -n "$disaster_recovery_region" ] && [ "$create_artifact_replica_bucket" != "true" ] && [ -z "$artifact_replica_bucket_name" ]; then
            echo "artifact_replica_bucket_name is required when disaster_recovery_region is set and create_artifact_replica_bucket=false" >&2
            exit 1
          fi

          admin_logins_json="$(
            python3 -c 'import json, sys; seen=set(); values=[]; [values.append(login) for token in sys.argv[1].replace("\n", ",").split(",") for login in [token.strip().lower()] if login and login not in seen and not seen.add(login)]; print(json.dumps(values))' "$github_admin_logins"
          )"
          admin_logins_csv="$(
            python3 -c 'import json, sys; print(",".join(json.loads(sys.argv[1])))' "$admin_logins_json"
          )"


          if [ "$auth_connector_kind" = "github" ]; then
            : "${github_required_org:?missing BURN_DRAGON_P2P_GITHUB_REQUIRED_ORG}"
            : "${github_required_repo:?missing BURN_DRAGON_P2P_GITHUB_REQUIRED_REPO}"
            : "${admin_logins_csv:?no admin logins resolved for github deployment}"
            : "${resolved_auth_client_id:?missing BURN_DRAGON_P2P_AUTH_CLIENT_ID or BURN_DRAGON_P2P_GITHUB_CLIENT_ID secret}"
            : "${resolved_auth_client_secret:?missing BURN_DRAGON_P2P_AUTH_CLIENT_SECRET or BURN_DRAGON_P2P_GITHUB_CLIENT_SECRET secret}"
          elif [ "$auth_connector_kind" = "oidc" ] || [ "$auth_connector_kind" = "oauth" ]; then
            : "${resolved_auth_client_id:?missing BURN_DRAGON_P2P_AUTH_CLIENT_ID secret}"
            : "${resolved_auth_client_secret:?missing BURN_DRAGON_P2P_AUTH_CLIENT_SECRET secret}"
          fi

          if [ "$auth_connector_kind" = "oidc" ] && [ -z "$auth_oidc_issuer" ]; then
            echo "missing BURN_DRAGON_P2P_AUTH_OIDC_ISSUER for oidc deployment" >&2
            exit 1
          fi
          if [ "$auth_connector_kind" = "oauth" ] && [ -z "$auth_oauth_provider" ]; then
            echo "missing BURN_DRAGON_P2P_AUTH_OAUTH_PROVIDER for oauth deployment" >&2
            exit 1
          fi
          if [ "$auth_connector_kind" = "external" ] && [ -z "$auth_external_authority" ]; then
            echo "missing BURN_DRAGON_P2P_AUTH_EXTERNAL_AUTHORITY for external deployment" >&2
            exit 1
          fi

          if [ "$auth_connector_kind" != "github" ] && [ -n "$github_admin_logins_input$github_admin_logins_var" ]; then
            echo "github_admin_logins are ignored because auth_connector_kind=$auth_connector_kind"
          fi

          {
            echo "AWS_REGION=$aws_region"
            echo "AWS_ROLE_ARN=$aws_role_arn"
            echo "STACK_NAME=$stack_name"
            echo "EDGE_DOMAIN_NAME=$edge_domain_name"
            echo "ROUTE53_ZONE_NAME=$route53_zone_name"
            echo "SECRET_PARAMETER_PREFIX=$secret_parameter_prefix"
            echo "TF_VAR_aws_region=$aws_region"
            echo "TF_VAR_stack_name=$stack_name"
            echo "TF_VAR_environment_name=${DEPLOY_ENVIRONMENT}"
            echo "TF_VAR_route53_zone_name=$route53_zone_name"
            echo "TF_VAR_edge_domain_name=$edge_domain_name"
            echo "TF_VAR_secret_parameter_prefix=$secret_parameter_prefix"
            echo "TF_VAR_network_id=$network_id"
            echo "TF_VAR_project_family_id=$project_family_id"
            echo "TF_VAR_study_id=$study_id"
            echo "TF_VAR_release_train_hash=$release_train_hash"
            echo "TF_VAR_bootstrap_install_source=$bootstrap_install_source"
            echo "TF_VAR_bootstrap_crate_version=$bootstrap_version"
            echo "TF_VAR_bootstrap_git_ref=$bootstrap_git_ref"
            echo "TF_VAR_create_artifact_bucket=$create_artifact_bucket"
            echo "TF_VAR_managed_trainer_desired_capacity=$managed_trainer_desired_capacity"
            echo "TF_VAR_managed_trainer_backend=$managed_trainer_backend"
            echo "TF_VAR_managed_trainer_experiment_kind=$managed_trainer_experiment_kind"
            echo "TF_VAR_managed_trainer_target=$managed_trainer_target"
            echo "TF_VAR_managed_trainer_crate_version=$managed_trainer_crate_version"
            echo "TF_VAR_managed_trainer_auth_bundle_parameter_name=$managed_trainer_auth_bundle_parameter_name"
            echo "TF_VAR_create_artifact_replica_bucket=$create_artifact_replica_bucket"
            echo "AUTH_CONNECTOR_KIND=$auth_connector_kind"
            echo "TF_VAR_auth_connector_kind=$auth_connector_kind"
            echo "TF_VAR_auth_authority_name=$auth_authority_name"
          } >>"$GITHUB_ENV"
          {
            echo "TF_VAR_auth_principals_json<<__AUTH_PRINCIPALS_JSON__"
            printf '%s\n' "$auth_principals_json"
            echo "__AUTH_PRINCIPALS_JSON__"
          } >>"$GITHUB_ENV"

          if [ "$auth_connector_kind" = "github" ]; then
            {
              echo "TF_VAR_github_required_org=$github_required_org"
              echo "TF_VAR_github_required_team=$github_required_team"
              echo "TF_VAR_github_required_repo=$github_required_repo"
              echo "TF_VAR_github_admin_logins=$admin_logins_json"
              echo "ADMIN_LOGINS_CSV=$admin_logins_csv"
            } >>"$GITHUB_ENV"
          fi

          if [ -n "$auth_authorize_base_url" ]; then echo "TF_VAR_auth_authorize_base_url=$auth_authorize_base_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_exchange_url" ]; then echo "TF_VAR_auth_exchange_url=$auth_exchange_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_token_url" ]; then echo "TF_VAR_auth_token_url=$auth_token_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_api_base_url" ]; then echo "TF_VAR_auth_api_base_url=$auth_api_base_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_userinfo_url" ]; then echo "TF_VAR_auth_userinfo_url=$auth_userinfo_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_refresh_url" ]; then echo "TF_VAR_auth_refresh_url=$auth_refresh_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_revoke_url" ]; then echo "TF_VAR_auth_revoke_url=$auth_revoke_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_jwks_url" ]; then echo "TF_VAR_auth_jwks_url=$auth_jwks_url" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_oidc_issuer" ]; then echo "TF_VAR_auth_oidc_issuer=$auth_oidc_issuer" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_oauth_provider" ]; then echo "TF_VAR_auth_oauth_provider=$auth_oauth_provider" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_external_authority" ]; then echo "TF_VAR_auth_external_authority=$auth_external_authority" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_external_trusted_principal_header" ]; then echo "TF_VAR_auth_external_trusted_principal_header=$auth_external_trusted_principal_header" >>"$GITHUB_ENV"; fi
          if [ -n "$auth_external_trusted_internal_only" ]; then echo "TF_VAR_auth_external_trusted_internal_only=$auth_external_trusted_internal_only" >>"$GITHUB_ENV"; fi
          if [ -n "$github_admin_required_repo_permission" ]; then
            echo "TF_VAR_github_admin_required_repo_permission=$github_admin_required_repo_permission" >>"$GITHUB_ENV"
          fi
          if [ "$auth_connector_kind" = "github" ] || [ "$auth_connector_kind" = "oidc" ] || [ "$auth_connector_kind" = "oauth" ]; then
            {
              echo "AUTH_CLIENT_ID_RESOLVED=$resolved_auth_client_id"
              echo "AUTH_CLIENT_SECRET_RESOLVED=$resolved_auth_client_secret"
            } >>"$GITHUB_ENV"
          fi

          echo "TF_VAR_climbmix_browser_dataset_base_url=$climbmix_dataset_base_url" >>"$GITHUB_ENV"

          if [ -n "$instance_type" ]; then
            echo "TF_VAR_instance_type=$instance_type" >>"$GITHUB_ENV"
          fi

          if [ -n "$root_volume_size_gib" ]; then
            echo "TF_VAR_root_volume_size_gib=$root_volume_size_gib" >>"$GITHUB_ENV"
          fi
          if [ -n "$data_volume_size_gib" ]; then
            echo "TF_VAR_data_volume_size_gib=$data_volume_size_gib" >>"$GITHUB_ENV"
          fi
          if [ -n "$managed_trainer_instance_type" ]; then
            echo "TF_VAR_managed_trainer_instance_type=$managed_trainer_instance_type" >>"$GITHUB_ENV"
          fi
          if [ -n "$managed_trainer_min_size" ]; then
            echo "TF_VAR_managed_trainer_min_size=$managed_trainer_min_size" >>"$GITHUB_ENV"
          fi
          if [ -n "$managed_trainer_max_size" ]; then
            echo "TF_VAR_managed_trainer_max_size=$managed_trainer_max_size" >>"$GITHUB_ENV"
          fi
          if [ -n "$enable_data_volume_snapshots" ]; then
            echo "TF_VAR_enable_data_volume_snapshots=$enable_data_volume_snapshots" >>"$GITHUB_ENV"
          fi
          if [ -n "$data_volume_snapshot_retention_days" ]; then
            echo "TF_VAR_data_volume_snapshot_retention_days=$data_volume_snapshot_retention_days" >>"$GITHUB_ENV"
          fi
          if [ -n "$enable_bootstrap_status_alarms" ]; then
            echo "TF_VAR_enable_bootstrap_status_alarms=$enable_bootstrap_status_alarms" >>"$GITHUB_ENV"
          fi
          if [ -n "$alarm_sns_topic_arn" ]; then
            echo "TF_VAR_alarm_sns_topic_arn=$alarm_sns_topic_arn" >>"$GITHUB_ENV"
          fi
          if [ -n "$artifact_bucket_name" ]; then
            echo "TF_VAR_artifact_bucket_name=$artifact_bucket_name" >>"$GITHUB_ENV"
          fi
          if [ -n "$artifact_bucket_path_prefix" ]; then
            echo "TF_VAR_artifact_bucket_path_prefix=$artifact_bucket_path_prefix" >>"$GITHUB_ENV"
          fi
          if [ -n "$disaster_recovery_region" ]; then
            echo "TF_VAR_disaster_recovery_region=$disaster_recovery_region" >>"$GITHUB_ENV"
          fi
          if [ -n "$artifact_replica_bucket_name" ]; then
            echo "TF_VAR_artifact_replica_bucket_name=$artifact_replica_bucket_name" >>"$GITHUB_ENV"
          fi
          if [ -n "$enable_disaster_recovery_snapshot_copies" ]; then
            echo "TF_VAR_enable_disaster_recovery_snapshot_copies=$enable_disaster_recovery_snapshot_copies" >>"$GITHUB_ENV"
          fi
          if [ -n "$disaster_recovery_snapshot_retention_days" ]; then
            echo "TF_VAR_disaster_recovery_snapshot_retention_days=$disaster_recovery_snapshot_retention_days" >>"$GITHUB_ENV"
          fi
          if [ -n "$artifact_replica_bucket_force_destroy" ]; then
            echo "TF_VAR_artifact_replica_bucket_force_destroy=$artifact_replica_bucket_force_destroy" >>"$GITHUB_ENV"
          fi
          if [ -n "$artifact_bucket_force_destroy" ]; then
            echo "TF_VAR_artifact_bucket_force_destroy=$artifact_bucket_force_destroy" >>"$GITHUB_ENV"
          fi
          if [ -n "$artifact_bucket_server_side_encryption" ]; then
            echo "TF_VAR_artifact_bucket_server_side_encryption=$artifact_bucket_server_side_encryption" >>"$GITHUB_ENV"
          fi

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: seed bootstrap auth secrets in ssm parameter store
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUTH_CLIENT_ID_RESOLVED:-}" ] || [ -z "${AUTH_CLIENT_SECRET_RESOLVED:-}" ]; then
            echo "auth connector does not require client credentials; skipping SSM auth secret sync"
            exit 0
          fi

          aws ssm put-parameter \
            --region "$AWS_REGION" \
            --type SecureString \
            --overwrite \
            --name "${SECRET_PARAMETER_PREFIX}/auth_client_id" \
            --value "$AUTH_CLIENT_ID_RESOLVED"

          aws ssm put-parameter \
            --region "$AWS_REGION" \
            --type SecureString \
            --overwrite \
            --name "${SECRET_PARAMETER_PREFIX}/auth_client_secret" \
            --value "$AUTH_CLIENT_SECRET_RESOLVED"

      - name: seed managed trainer auth bundle in ssm parameter store
        shell: bash
        run: |
          set -euo pipefail
          if [ "${TF_VAR_managed_trainer_desired_capacity:-0}" = "0" ]; then
            echo "managed trainer pool disabled; skipping trainer auth bundle sync"
            exit 0
          fi

          aws ssm put-parameter \
            --region "$AWS_REGION" \
            --type SecureString \
            --overwrite \
            --name "$TF_VAR_managed_trainer_auth_bundle_parameter_name" \
            --value "$TRAINER_AUTH_BUNDLE_JSON"

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: terraform fmt check
        run: terraform -chdir="$TF_ROOT" fmt -check -recursive

      - name: terraform init
        run: terraform -chdir="$TF_ROOT" init -input=false

      - name: terraform workspace
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="$TF_ROOT" workspace select "$TF_WORKSPACE_NAME" || \
          terraform -chdir="$TF_ROOT" workspace new "$TF_WORKSPACE_NAME"

      - name: terraform validate
        run: terraform -chdir="$TF_ROOT" validate

      - name: terraform plan
        shell: bash
        run: |
          set -euo pipefail
          plan_args=(-input=false -out=tfplan)
          if [ "${{ github.event.inputs.force_replace_bootstrap }}" = "true" ]; then
            plan_args+=(-replace=aws_instance.bootstrap)
          fi
          terraform -chdir="$TF_ROOT" plan "${plan_args[@]}"

      - name: terraform apply
        run: terraform -chdir="$TF_ROOT" apply -input=false -auto-approve tfplan

      - name: capture outputs
        id: outputs
        shell: bash
        run: |
          set -euo pipefail
          edge_url="$(terraform -chdir="$TF_ROOT" output -raw edge_url)"
          seed_tcp="$(terraform -chdir="$TF_ROOT" output -raw seed_node_tcp_multiaddr)"
          seed_quic="$(terraform -chdir="$TF_ROOT" output -raw seed_node_quic_multiaddr)"
          public_ip="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_public_ip)"
          instance_id="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_instance_id)"
          secondary_instance_id="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_secondary_instance_id)"
          data_volume_id="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_data_volume_id)"
          secondary_data_volume_id="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_secondary_data_volume_id)"
          data_mount_path="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_data_mount_path)"
          secondary_public_ip="$(terraform -chdir="$TF_ROOT" output -raw bootstrap_secondary_public_ip)"
          redis_endpoint="$(terraform -chdir="$TF_ROOT" output -raw control_plane_redis_primary_endpoint)"
          artifact_bucket_name="$(terraform -chdir="$TF_ROOT" output -raw artifact_bucket_name)"
          artifact_bucket_uri="$(terraform -chdir="$TF_ROOT" output -raw artifact_bucket_uri)"
          disaster_recovery_region="$(terraform -chdir="$TF_ROOT" output -raw disaster_recovery_region)"
          artifact_replica_bucket_name="$(terraform -chdir="$TF_ROOT" output -raw artifact_replica_bucket_name)"
          artifact_replica_bucket_uri="$(terraform -chdir="$TF_ROOT" output -raw artifact_replica_bucket_uri)"
          managed_trainer_asg_name="$(terraform -chdir="$TF_ROOT" output -raw managed_trainer_asg_name)"
          managed_trainer_desired_capacity="$(terraform -chdir="$TF_ROOT" output -raw managed_trainer_desired_capacity)"
          managed_trainer_auth_bundle_parameter_name="$(terraform -chdir="$TF_ROOT" output -raw managed_trainer_auth_bundle_parameter_name)"

          {
            echo "edge_url=$edge_url"
            echo "seed_tcp=$seed_tcp"
            echo "seed_quic=$seed_quic"
            echo "public_ip=$public_ip"
            echo "instance_id=$instance_id"
            echo "secondary_instance_id=$secondary_instance_id"
            echo "data_volume_id=$data_volume_id"
            echo "secondary_data_volume_id=$secondary_data_volume_id"
            echo "data_mount_path=$data_mount_path"
            echo "secondary_public_ip=$secondary_public_ip"
            echo "redis_endpoint=$redis_endpoint"
            echo "artifact_bucket_name=$artifact_bucket_name"
            echo "artifact_bucket_uri=$artifact_bucket_uri"
            echo "disaster_recovery_region=$disaster_recovery_region"
            echo "artifact_replica_bucket_name=$artifact_replica_bucket_name"
            echo "artifact_replica_bucket_uri=$artifact_replica_bucket_uri"
            echo "managed_trainer_asg_name=$managed_trainer_asg_name"
            echo "managed_trainer_desired_capacity=$managed_trainer_desired_capacity"
            echo "managed_trainer_auth_bundle_parameter_name=$managed_trainer_auth_bundle_parameter_name"
          } >>"$GITHUB_OUTPUT"

      - name: wait for browser edge https health
        shell: bash
        run: |
          set -euo pipefail
          edge_url="${{ steps.outputs.outputs.edge_url }}"
          for attempt in $(seq 1 40); do
            if curl --fail --silent --show-error --location "$edge_url/" >/dev/null; then
              exit 0
            fi
            sleep 15
          done
          echo "edge did not become healthy: $edge_url" >&2
          exit 1

      - name: publish workflow summary
        shell: bash
        run: |
          cat >>"$GITHUB_STEP_SUMMARY" <<EOF
          ## burn_dragon_p2p deployment

          - Environment: \`${DEPLOY_ENVIRONMENT}\`
          - Terraform workspace: \`${TF_WORKSPACE_NAME}\`
          - Edge URL: ${{ steps.outputs.outputs.edge_url }}
          - Seed TCP: \`${{ steps.outputs.outputs.seed_tcp }}\`
          - Seed QUIC: \`${{ steps.outputs.outputs.seed_quic }}\`
          - Primary EC2 instance id: \`${{ steps.outputs.outputs.instance_id }}\`
          - Secondary EC2 instance id: \`${{ steps.outputs.outputs.secondary_instance_id }}\`
          - Primary public IP: \`${{ steps.outputs.outputs.public_ip }}\`
          - Secondary public IP: \`${{ steps.outputs.outputs.secondary_public_ip }}\`
          - Primary data volume id: \`${{ steps.outputs.outputs.data_volume_id }}\`
          - Secondary data volume id: \`${{ steps.outputs.outputs.secondary_data_volume_id }}\`
          - Data mount path: \`${{ steps.outputs.outputs.data_mount_path }}\`
          - Shared Redis endpoint: \`${{ steps.outputs.outputs.redis_endpoint }}\`
          - Bootstrap install source: \`${TF_VAR_bootstrap_install_source}\`
          - Bootstrap crate version: \`${TF_VAR_bootstrap_crate_version}\`
          - Bootstrap git ref override: \`${TF_VAR_bootstrap_git_ref:-n/a}\`
          - Managed trainer ASG: \`${{ steps.outputs.outputs.managed_trainer_asg_name || 'disabled' }}\`
          - Managed trainer desired capacity: \`${{ steps.outputs.outputs.managed_trainer_desired_capacity }}\`
          - Managed trainer auth bundle parameter: \`${{ steps.outputs.outputs.managed_trainer_auth_bundle_parameter_name || 'n/a' }}\`
          - Artifact bucket: \`${{ steps.outputs.outputs.artifact_bucket_name }}\`
          - Artifact S3 prefix: \`${{ steps.outputs.outputs.artifact_bucket_uri }}\`
          - Warm DR region: \`${{ steps.outputs.outputs.disaster_recovery_region || 'disabled' }}\`
          - Warm DR artifact bucket: \`${{ steps.outputs.outputs.artifact_replica_bucket_name || 'n/a' }}\`
          - Warm DR artifact S3 prefix: \`${{ steps.outputs.outputs.artifact_replica_bucket_uri || 'n/a' }}\`
          - Auth connector: \`${AUTH_CONNECTOR_KIND}\`
          - GitHub admin logins: \`${ADMIN_LOGINS_CSV:-n/a}\`
          - Secret prefix: \`${SECRET_PARAMETER_PREFIX}\`
          EOF
