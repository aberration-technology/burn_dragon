name: inspect burn_dragon_p2p aws

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment suffix. Example: `production` for the `burn-dragon-p2p-production` GitHub Environment."
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      terraform_workspace:
        description: "Terraform workspace name. Example: `mainnet` or `staging`."
        required: true
        default: mainnet
        type: string
      cleanup_legacy_bootstrap_instances:
        description: "Terminate non-canonical bootstrap instances for this deployment environment before inspection. Use this only for one-time cleanup of legacy stack-name drift."
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    environment: burn-dragon-p2p-${{ github.event.inputs.environment }}
    steps:
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.BURN_DRAGON_P2P_AWS_ROLE_ARN }}
          aws-region: ${{ vars.BURN_DRAGON_P2P_AWS_REGION }}

      - name: inspect bootstrap instance
        shell: bash
        env:
          STACK_NAME_VAR: ${{ vars.BURN_DRAGON_P2P_STACK_NAME }}
          AWS_REGION: ${{ vars.BURN_DRAGON_P2P_AWS_REGION }}
          TF_WORKSPACE_NAME: ${{ github.event.inputs.terraform_workspace }}
          EDGE_DOMAIN_NAME: ${{ vars.BURN_DRAGON_P2P_EDGE_DOMAIN_NAME }}
          DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}
          CLEANUP_LEGACY_BOOTSTRAP_INSTANCES: ${{ github.event.inputs.cleanup_legacy_bootstrap_instances }}
        run: |
          set -euo pipefail

          canonical_stack_name="burn-dragon-p2p-${DEPLOY_ENVIRONMENT}"
          if [ -n "${STACK_NAME_VAR:-}" ] && [ "$STACK_NAME_VAR" != "$canonical_stack_name" ]; then
            echo "ignoring legacy stack name override '$STACK_NAME_VAR' and inspecting canonical stack '$canonical_stack_name'" >&2
          fi

          instance_name="${canonical_stack_name}-bootstrap"
          bootstrap_rows="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Application,Values=burn-dragon-p2p" \
              "Name=tag:Environment,Values=${DEPLOY_ENVIRONMENT}" \
              "Name=tag:Name,Values=*bootstrap*" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --output json | jq -r '
              [
                .Reservations[].Instances[]
                | {
                    name: ([.Tags[]? | select(.Key == "Name") | .Value][0] // ""),
                    id: .InstanceId,
                    state: .State.Name
                  }
                | select(.name != "")
                | [.name, .id, .state]
                | @tsv
              ] | .[]
            ')"

          if [ -n "$bootstrap_rows" ]; then
            echo "bootstrap instances for Application=burn-dragon-p2p Environment=${DEPLOY_ENVIRONMENT}:"
            printf '%s\n' "$bootstrap_rows" | awk -F '\t' '{printf "  - name=%s id=%s state=%s\n", $1, $2, $3}'
          fi

          legacy_instance_ids="$(printf '%s\n' "$bootstrap_rows" | awk -F '\t' -v expected="$instance_name" '$1 != "" && $1 != expected {print $2}')"
          if [ -n "$legacy_instance_ids" ] && [ "${CLEANUP_LEGACY_BOOTSTRAP_INSTANCES}" = "true" ]; then
            echo "terminating legacy bootstrap instances:"
            printf '%s\n' "$legacy_instance_ids" | sed 's/^/  - /'
            aws ec2 terminate-instances \
              --region "$AWS_REGION" \
              --instance-ids $legacy_instance_ids \
              >/dev/null
          fi

          instance_id="$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters \
              "Name=tag:Name,Values=${instance_name}" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)"

          if [ -z "$instance_id" ] || [ "$instance_id" = "None" ]; then
            echo "bootstrap instance not found for tag Name=${instance_name}" >&2
            exit 1
          fi

          legacy_stack_name="dragon-p2p-prod"
          printf '%s\n' "resource inventory"
          python3 - <<'PY'
            import json
            import os
            import subprocess

            region = os.environ["AWS_REGION"]
            env_name = os.environ["DEPLOY_ENVIRONMENT"]
            canonical = f"burn-dragon-p2p-{env_name}"
            legacy = "dragon-p2p-prod"
            stacks = [canonical, legacy]

            def aws_json(args):
                result = subprocess.run(
                    ["aws", *args, "--region", region, "--output", "json"],
                    check=True,
                    capture_output=True,
                    text=True,
                )
                return json.loads(result.stdout)

            def safe_aws_json(args):
                result = subprocess.run(
                    ["aws", *args, "--region", region, "--output", "json"],
                    check=False,
                    capture_output=True,
                    text=True,
                )
                if result.returncode != 0:
                    return None
                return json.loads(result.stdout)

            vpcs = aws_json(["ec2", "describe-vpcs"]).get("Vpcs", [])
            subnets = aws_json(["ec2", "describe-subnets"]).get("Subnets", [])
            igws = aws_json(["ec2", "describe-internet-gateways"]).get("InternetGateways", [])
            route_tables = aws_json(["ec2", "describe-route-tables"]).get("RouteTables", [])
            sgs = aws_json(["ec2", "describe-security-groups"]).get("SecurityGroups", [])
            instances = aws_json(["ec2", "describe-instances"]).get("Reservations", [])
            addresses = aws_json(["ec2", "describe-addresses"]).get("Addresses", [])
            volumes = aws_json(["ec2", "describe-volumes"]).get("Volumes", [])
            roles = aws_json(["iam", "list-roles"]).get("Roles", [])
            profiles = aws_json(["iam", "list-instance-profiles"]).get("InstanceProfiles", [])
            buckets = aws_json(["s3api", "list-buckets"]).get("Buckets", [])
            certs = aws_json(["acm", "list-certificates", "--certificate-statuses", "PENDING_VALIDATION", "ISSUED", "INACTIVE", "EXPIRED", "VALIDATION_TIMED_OUT", "REVOKED", "FAILED"]).get("CertificateSummaryList", [])
            dists = aws_json(["cloudfront", "list-distributions"]).get("DistributionList", {}).get("Items", [])

            def tag_map(tags):
                return {t["Key"]: t["Value"] for t in (tags or [])}

            def name_from_tags(tags):
                return tag_map(tags).get("Name", "")

            def bucket_tags(name):
                payload = safe_aws_json(["s3api", "get-bucket-tagging", "--bucket", name])
                if not payload:
                    return {}
                return tag_map(payload.get("TagSet", []))

            summary = {stack: {
                "vpcs": [],
                "subnets": [],
                "igws": [],
                "route_tables": [],
                "security_groups": [],
                "instances": [],
                "eips": [],
                "volumes": [],
                "iam_roles": [],
                "instance_profiles": [],
                "buckets": [],
                "cloudfront_distributions": [],
                "acm_certificates": [],
            } for stack in stacks}

            for vpc in vpcs:
                name = name_from_tags(vpc.get("Tags"))
                for stack in stacks:
                    if stack and stack in name:
                        summary[stack]["vpcs"].append({"id": vpc["VpcId"], "name": name})

            for subnet in subnets:
                name = name_from_tags(subnet.get("Tags"))
                for stack in stacks:
                    if stack and stack in name:
                        summary[stack]["subnets"].append({"id": subnet["SubnetId"], "name": name})

            for igw in igws:
                name = name_from_tags(igw.get("Tags"))
                for stack in stacks:
                    if stack and stack in name:
                        summary[stack]["igws"].append({"id": igw["InternetGatewayId"], "name": name})

            for rt in route_tables:
                name = name_from_tags(rt.get("Tags"))
                for stack in stacks:
                    if stack and stack in name:
                        summary[stack]["route_tables"].append({"id": rt["RouteTableId"], "name": name})

            for sg in sgs:
                name = name_from_tags(sg.get("Tags")) or sg.get("GroupName", "")
                for stack in stacks:
                    if stack and stack in name:
                        summary[stack]["security_groups"].append({"id": sg["GroupId"], "name": name})

            for reservation in instances:
                for inst in reservation.get("Instances", []):
                    name = name_from_tags(inst.get("Tags"))
                    for stack in stacks:
                        if stack and stack in name:
                            summary[stack]["instances"].append({"id": inst["InstanceId"], "name": name, "state": inst["State"]["Name"]})

            for addr in addresses:
                name = name_from_tags(addr.get("Tags"))
                for stack in stacks:
                    if stack and stack in name:
                        summary[stack]["eips"].append({"allocation_id": addr.get("AllocationId"), "name": name, "public_ip": addr.get("PublicIp")})

            for vol in volumes:
                name = name_from_tags(vol.get("Tags"))
                for stack in stacks:
                    if stack and stack in name:
                        summary[stack]["volumes"].append({"id": vol["VolumeId"], "name": name, "state": vol["State"]})

            for role in roles:
                name = role["RoleName"]
                for stack in stacks:
                    if stack in name:
                        summary[stack]["iam_roles"].append({"name": name})

            for profile in profiles:
                name = profile["InstanceProfileName"]
                for stack in stacks:
                    if stack in name:
                        summary[stack]["instance_profiles"].append({"name": name})

            for bucket in buckets:
                name = bucket["Name"]
                tags = bucket_tags(name)
                stack_tag = tags.get("Stack", "")
                for stack in stacks:
                    if stack in name or stack == stack_tag:
                        summary[stack]["buckets"].append({"name": name, "stack_tag": stack_tag})

            for dist in dists:
                aliases = dist.get("Aliases", {}).get("Items", []) or []
                comment = dist.get("Comment", "")
                for stack in stacks:
                    if stack in comment:
                        summary[stack]["cloudfront_distributions"].append({"id": dist["Id"], "comment": comment, "aliases": aliases})

            for cert in certs:
                domain = cert.get("DomainName", "")
                arn = cert.get("CertificateArn", "")
                for stack in stacks:
                    if stack in arn:
                        summary[stack]["acm_certificates"].append({"domain": domain, "arn": arn})

            print(json.dumps(summary, indent=2, sort_keys=True))
          PY

          echo "instance_id=${instance_id}"
          echo "edge_domain_name=${EDGE_DOMAIN_NAME}"
          echo "terraform_workspace=${TF_WORKSPACE_NAME}"

          echo "describe instances"
          aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --instance-ids "$instance_id" \
            --output json

          echo "instance status"
          aws ec2 describe-instance-status \
            --region "$AWS_REGION" \
            --include-all-instances \
            --instance-ids "$instance_id" \
            --output json || true

          echo "console output"
          aws ec2 get-console-output \
            --region "$AWS_REGION" \
            --instance-id "$instance_id" \
            --latest \
            --output text || true

          echo "ssm registration"
          ssm_status="$(aws ssm describe-instance-information \
            --region "$AWS_REGION" \
            --filters "Key=InstanceIds,Values=$instance_id" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text 2>/dev/null || true)"
          echo "ssm ping status: ${ssm_status:-missing}"

          if [ "${ssm_status:-}" = "Online" ]; then
            command_id="$(aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$instance_id" \
              --document-name AWS-RunShellScript \
              --comment "inspect burn_dragon bootstrap host" \
              --parameters 'commands=[
                "set -eu",
                "date -Is",
                "uname -a",
                "cloud-init status --long || true",
                "systemctl status caddy --no-pager || true",
                "systemctl status burn-p2p-bootstrap --no-pager || true",
                "journalctl -u caddy -u burn-p2p-bootstrap --no-pager -n 200 || true",
                "tail -n 200 /var/log/cloud-init-output.log || true",
                "ss -ltnup || true",
                "curl -vkI https://127.0.0.1/portal/snapshot || true",
                "curl -v http://127.0.0.1:4000/portal/snapshot || true"
              ]' \
              --query 'Command.CommandId' \
              --output text)"

            for attempt in $(seq 1 30); do
              invocation_status="$(aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$command_id" \
                --instance-id "$instance_id" \
                --query 'Status' \
                --output text 2>/dev/null || true)"
              case "$invocation_status" in
                Success|Cancelled|TimedOut|Failed|Cancelling)
                  break
                  ;;
              esac
              sleep 5
            done

            echo "ssm command output"
            aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$command_id" \
              --instance-id "$instance_id" \
              --output json || true
          fi
